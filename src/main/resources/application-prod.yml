spring:
  thymeleaf:
    cache: true

server:
  forward-headers-strategy: native  # Caddy X-Forwarded-Proto 신뢰 (HTTPS 인식)
  servlet:
    session:
      timeout: 30m
      cookie:
        secure: true      # HTTPS 전용
        same-site: strict

logging:
  level:
    com.eactive.resourcehub: WARN
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
