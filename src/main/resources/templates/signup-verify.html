<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="wrap">
    <div class="auth-card card">
        <div class="auth-header">
            <i class="bi bi-envelope-check-fill logo-icon"></i>
            <div class="brand">eActive Resource Hub</div>
            <h1>이메일 인증</h1>
        </div>
        <div class="auth-body">
            <div class="text-center">
                <div class="email-chip">
                    <i class="bi bi-envelope-fill"></i>
                    <span th:text="${pendingEmail}"></span>
                </div>
                <p class="text-muted small mb-2" style="font-size:.84rem;">위 주소로 6자리 인증 코드를 전송했습니다.</p>

                <div class="timer-badge" id="timerWrap" th:data-expire-at="${expireAt}">
                    <i class="bi bi-clock text-muted" style="font-size:.9rem;"></i>
                    <span id="timerDisplay">10:00</span>
                    <span class="text-muted" style="font-size:.72rem; font-weight:400;">남음</span>
                </div>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>
            <div th:if="${infoMessage}" class="alert alert-info d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-info-circle-fill"></i>
                <span th:text="${infoMessage}"></span>
            </div>

            <form th:action="@{/signup/verify}" method="post" id="verifyForm">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-4">
                    <label for="code" class="form-label">인증 코드 (6자리)</label>
                    <input type="text" id="code" name="code"
                           class="form-control code-input"
                           maxlength="6" placeholder="000000" required inputmode="numeric">
                </div>
                <button type="submit" id="verifyBtn" class="btn btn-primary w-100 btn-submit">
                    <i class="bi bi-check-circle-fill me-1"></i>인증하기
                </button>
            </form>

            <hr class="my-3">
            <form th:action="@{/signup/resend}" method="post" class="text-center">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" id="resendBtn" class="btn btn-link btn-sm text-secondary p-0" disabled>
                    <i class="bi bi-arrow-repeat me-1"></i>코드를 받지 못하셨나요? 재발송
                </button>
            </form>
        </div>
    </div>
</div>
<script>
(function() {
    var timerEl = document.getElementById('timerDisplay');
    var timerWrap = document.getElementById('timerWrap');
    var expireAt = parseInt(timerWrap.dataset.expireAt || '0');
    var resendBtn = document.getElementById('resendBtn');

    function tick() {
        var remain = (expireAt - Date.now()) / 1000;
        if (remain <= 0) {
            timerEl.textContent = '만료됨';
            timerWrap.style.background = '#fde8e8';
            timerEl.style.color = '#dc3545';
            resendBtn.disabled = false;
            return;
        }
        var m = Math.floor(remain / 60);
        var s = Math.floor(remain % 60);
        timerEl.textContent = m + ':' + String(s).padStart(2, '0');
        if (remain < 60) {
            timerWrap.style.background = '#fde8e8';
            timerEl.style.color = '#dc3545';
        } else {
            timerWrap.style.background = '';
            timerEl.style.color = '';
        }
        setTimeout(tick, 250);
    }
    tick();
})();
</script>
</body>
</html>
