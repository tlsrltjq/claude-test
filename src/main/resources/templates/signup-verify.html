<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-sm" style="width:100%;max-width:420px;">
        <div class="card-body p-4">
            <h1 class="h4 text-center mb-2">이메일 인증</h1>
            <p class="text-center text-muted small mb-1">
                <strong th:text="${pendingEmail}"></strong> 으로<br>
                6자리 인증 코드를 전송했습니다.
            </p>
            <p class="text-center text-muted small mb-4">
                (로컬 개발 중에는 서버 로그를 확인하세요.)
            </p>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/signup/verify}" th:object="${verifyCodeRequest}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label for="code" class="form-label">인증 코드 (6자리)</label>
                    <input type="text" id="code" th:field="*{code}"
                           class="form-control text-center fs-4"
                           th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"
                           maxlength="6" placeholder="000000" required inputmode="numeric">
                    <div class="invalid-feedback" th:errors="*{code}"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">인증하기</button>
            </form>

            <hr>
            <p class="text-center mb-0 small">
                코드를 받지 못하셨나요? <a th:href="@{/signup}">다시 가입 시도</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
