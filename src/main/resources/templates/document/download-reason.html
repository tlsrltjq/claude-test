<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다운로드 사유 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
    </div>
</nav>

<div class="container mt-4" style="max-width:500px;">
    <h2 class="mb-4">다운로드 사유 입력</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body">
            <p class="text-muted mb-3">
                파일명:
                <strong th:text="${version.originalFileName}"></strong>
            </p>
            <form th:action="@{/documents/{id}/download(id=${version.id})}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label fw-bold">다운로드 사유 *</label>
                    <textarea name="reason" class="form-control" rows="3"
                              placeholder="최소 2자 이상 입력하세요" required minlength="2"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">다운로드</button>
                    <button type="button" class="btn btn-secondary" onclick="history.back()">취소</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
