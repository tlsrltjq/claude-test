<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="error-wrap container">
    <div class="error-card">
        <div class="error-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
        <div class="error-code">500</div>
        <div class="error-title">서버 오류가 발생했습니다</div>
        <div class="error-desc">일시적인 오류입니다. 잠시 후 다시 시도해주세요.</div>
        <div class="d-flex gap-2 justify-content-center">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>이전 페이지
            </a>
            <a th:href="@{/dashboard}" class="btn btn-primary">
                <i class="bi bi-house-fill me-1"></i>홈으로
            </a>
        </div>
    </div>
</div>
</body>
</html>
