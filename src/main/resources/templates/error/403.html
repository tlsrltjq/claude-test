<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; min-height: 100vh; }
        .error-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 3rem 2.5rem; text-align: center; max-width: 420px; width: 100%; }
        .error-icon { width: 80px; height: 80px; border-radius: 50%; background: #fef9e7; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #d97706; margin: 0 auto 1.25rem; }
        .error-code { font-size: 4.5rem; font-weight: 900; color: #d97706; line-height: 1; margin-bottom: .4rem; }
        .error-title { font-size: 1.2rem; font-weight: 700; color: #1e293b; margin-bottom: .6rem; }
        .error-desc { color: #6b7280; font-size: .9rem; margin-bottom: 2rem; }
    </style>
</head>
<body>
<div class="error-wrap container">
    <div class="error-card">
        <div class="error-icon"><i class="bi bi-shield-exclamation"></i></div>
        <div class="error-code">403</div>
        <div class="error-title">접근 권한이 없습니다</div>
        <div class="error-desc" th:text="${message} ?: '이 페이지에 접근할 권한이 없습니다.'"></div>
        <div class="d-flex gap-2 justify-content-center">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>이전 페이지
            </a>
            <a th:href="@{/dashboard}" class="btn btn-primary">
                <i class="bi bi-house-fill me-1"></i>홈으로
            </a>
        </div>
    </div>
</div>
</body>
</html>
