<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex flex-column justify-content-center align-items-center" style="min-height:100vh;">
    <h1 class="display-1 fw-bold text-secondary">404</h1>
    <h2 class="h4 mb-2">페이지를 찾을 수 없습니다</h2>
    <p class="text-muted mb-4" th:text="${message} ?: '요청하신 페이지가 존재하지 않습니다.'"></p>
    <div class="d-flex gap-2">
        <a href="javascript:history.back()" class="btn btn-outline-secondary">이전 페이지</a>
        <a th:href="@{/dashboard}" class="btn btn-primary">홈으로</a>
    </div>
</div>
</body>
</html>
