<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역할 변경 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="topnav navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin}">
            <i class="bi bi-shield-fill me-1"></i>eActive Hub
            <span class="badge bg-warning text-dark ms-1" style="font-size:.65rem">ADMIN</span>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin/employees/{id}(id=${user.id})}" class="btn btn-nav btn-sm">
                <i class="bi bi-arrow-left me-1"></i>직원 상세
            </a>
            <a th:href="@{/admin}" class="btn btn-nav btn-sm">
                <i class="bi bi-speedometer2 me-1"></i>대시보드
            </a>
            <a th:href="@{/admin/certificate}" class="btn btn-nav btn-sm">
                <i class="bi bi-file-earmark-text me-1"></i>재직증명서
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width:520px;">
    <div class="page-header">
        <h4><i class="bi bi-person-gear me-2"></i>역할 변경</h4>
        <p>직원의 시스템 역할을 변경합니다.</p>
    </div>

    <div class="form-card mb-3">
        <div class="card-header-custom"><i class="bi bi-person-circle me-2"></i>직원 정보</div>
        <div class="card-body">
            <div class="user-info-row"><span class="user-info-label">이름</span><strong th:text="${user.name}"></strong></div>
            <div class="user-info-row"><span class="user-info-label">이메일</span><span class="text-muted" th:text="${user.email}"></span></div>
            <div class="user-info-row">
                <span class="user-info-label">현재 역할</span>
                <span th:classappend="${user.role.name() == 'ADMIN'} ? 'role-badge-admin' : (${user.role.name() == 'SALES'} ? 'role-badge-sales' : 'role-badge-emp')"
                      th:text="${user.role.displayName}"></span>
            </div>
        </div>
    </div>

    <div class="form-card">
        <div class="card-header-custom"><i class="bi bi-shield-check me-2"></i>새 역할 선택</div>
        <div class="card-body">
            <div class="alert alert-warning d-flex align-items-center gap-2 mb-3 py-2" style="font-size:.84rem;" id="adminWarning" style="display:none!important;">
                <i class="bi bi-exclamation-triangle-fill"></i>
                ADMIN 역할은 모든 시스템 기능에 접근 가능합니다. 신중하게 부여하세요.
            </div>
            <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" onsubmit="return confirmIfAdmin(this)">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div th:each="r : ${roles}" class="role-option" th:classappend="${r == user.role} ? 'selected'">
                    <input class="form-check-input m-0" type="radio" name="role"
                           th:id="'role_' + ${r.name()}"
                           th:value="${r.name()}"
                           th:checked="${user.role == r}"
                           onchange="handleRoleChange(this)">
                    <label th:for="'role_' + ${r.name()}" th:text="${r.displayName}" class="mb-0 fw-semibold" style="cursor:pointer; flex:1;"></label>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-warning fw-semibold">
                        <i class="bi bi-check-lg me-1"></i>역할 변경
                    </button>
                    <a th:href="@{/admin/employees/{id}(id=${user.id})}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 로딩 스피너 오버레이 -->
<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
    <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
        <span class="visually-hidden">처리 중...</span>
    </div>
</div>
<script>
(function(){
    var p = window.location.pathname;
    // 네비바 active 상태
    document.querySelectorAll('a.btn-nav').forEach(function(el){
        var h = el.getAttribute('href');
        if(!h) return;
        var isRoot = (h==='/admin'||h==='/admin/');
        var active = isRoot ? (p==='/admin'||p==='/admin/') : p.startsWith(h);
        if(active) el.classList.add('active');
    });
    // POST 폼 제출 시 스피너 표시
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function handleRoleChange(radio) {
    document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected'));
    radio.closest('.role-option').classList.add('selected');
    var warning = document.getElementById('adminWarning');
    warning.style.display = radio.value === 'ADMIN' ? '' : 'none';
}
function confirmIfAdmin(form) {
    var role = form.querySelector('select[name=role], input[name=role]:checked');
    if (role && role.value === 'ADMIN') {
        return confirm('ADMIN 역할을 부여하시겠습니까? 모든 관리 기능에 접근 가능해집니다.');
    }
    return true;
}
</script>
</body>
</html>
