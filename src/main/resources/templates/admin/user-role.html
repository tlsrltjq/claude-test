<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역할 변경 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto">
            <a th:href="@{/admin/employees/{id}(id=${user.id})}" class="btn btn-outline-light btn-sm">← 직원 상세</a>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width: 500px;">
    <h2 class="mb-4">역할 변경</h2>

    <div class="card mb-4">
        <div class="card-body">
            <p class="mb-1"><strong>이름:</strong> <span th:text="${user.name}"></span></p>
            <p class="mb-1"><strong>이메일:</strong> <span th:text="${user.email}"></span></p>
            <p class="mb-0"><strong>현재 역할:</strong>
                <span class="badge bg-secondary" th:text="${user.role}"></span>
            </p>
        </div>
    </div>

    <div class="alert alert-warning" id="adminWarning" style="display:none;">
        <strong>주의:</strong> ADMIN 역할을 부여하면 모든 시스템 기능에 접근 가능합니다. 계속하시겠습니까?
    </div>

    <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" onsubmit="return confirmIfAdmin(this)">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
        <div class="mb-3">
            <label class="form-label fw-semibold">새 역할</label>
            <select name="role" class="form-select" id="roleSelect" onchange="checkAdmin(this)">
                <option th:each="r : ${roles}"
                        th:if="${r.name() != 'TEAM_LEADER'}"
                        th:value="${r}"
                        th:text="${r.name() == 'ADMIN' ? '관리자 (ADMIN)' : r.name() == 'SALES' ? '영업부 (SALES)' : '일반 직원 (EMPLOYEE)'}"
                        th:selected="${r == user.role}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">변경</button>
        <a th:href="@{/admin/employees/{id}(id=${user.id})}" class="btn btn-secondary ms-2">취소</a>
    </form>
</div>

<script>
function checkAdmin(select) {
    document.getElementById('adminWarning').style.display =
        select.value === 'ADMIN' ? 'block' : 'none';
}
function confirmIfAdmin(form) {
    var role = form.querySelector('select[name=role]').value;
    if (role === 'ADMIN') {
        return confirm('ADMIN 역할을 부여하시겠습니까? 이 사용자는 모든 관리 기능에 접근할 수 있게 됩니다.');
    }
    return true;
}
</script>
</body>
</html>
