<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승인 대기 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">대시보드</a>
            <a th:href="@{/admin/teams}" class="btn btn-outline-light btn-sm">팀 관리</a>
            <a th:href="@{/admin/employees}" class="btn btn-outline-light btn-sm">직원 목록</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">승인 대기 목록</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(pendingUsers)}" class="alert alert-info">
        승인 대기 중인 사용자가 없습니다.
    </div>

    <div th:each="user : ${pendingUsers}" class="card mb-3">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-5">
                    <strong th:text="${user.name}"></strong>
                    <span class="text-muted small ms-2" th:text="${user.email}"></span><br>
                    <small class="text-muted">가입일: <span th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></span></small>
                </div>

                <!-- 승인 폼 -->
                <div class="col-md-4">
                    <form th:action="@{/admin/users/{id}/approve(id=${user.id})}" method="post" class="row g-1">
                        <div class="col-6">
                            <select name="teamId" class="form-select form-select-sm">
                                <option value="">팀 선택</option>
                                <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}"></option>
                            </select>
                        </div>
                        <div class="col-6">
                            <select name="position" class="form-select form-select-sm">
                                <option th:each="p : ${positions}" th:value="${p}" th:text="${p.displayName}"
                                        th:selected="${p == user.position}"></option>
                            </select>
                        </div>
                        <div class="col-12 mt-1">
                            <button type="submit" class="btn btn-success btn-sm w-100">승인</button>
                        </div>
                    </form>
                </div>

                <!-- 반려 폼 -->
                <div class="col-md-3">
                    <form th:action="@{/admin/users/{id}/reject(id=${user.id})}" method="post">
                        <input type="text" name="reason" class="form-control form-control-sm mb-1" placeholder="반려 사유 (선택)">
                        <button type="submit" class="btn btn-danger btn-sm w-100">반려</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
