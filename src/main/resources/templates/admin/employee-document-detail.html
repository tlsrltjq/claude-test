<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${document.title + ' — eActive Resource Hub'}">문서 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto">
            <a th:href="@{/admin/employees/{id}/documents(id=${user.id})}"
               class="btn btn-outline-light btn-sm">← 문서 목록</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card mb-3">
                <div class="card-header fw-bold" th:text="${document.title}">제목</div>
                <div class="card-body">
                    <table class="table table-sm mb-0">
                        <tr>
                            <th class="text-muted fw-normal" style="width:90px;">직원</th>
                            <td th:text="${user.name + ' (' + (user.team != null ? user.team.name : '-') + ')'}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">문서 종류</th>
                            <td>
                                <span th:switch="${document.documentType.name()}">
                                    <span th:case="'RESUME'">이력서</span>
                                    <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                                    <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                                    <span th:case="'LICENSE'">자격증</span>
                                    <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                                    <span th:case="*">기타</span>
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">현재 버전</th>
                            <td th:text="'v' + ${currentVersion.versionNo}"></td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">파일명</th>
                            <td th:text="${currentVersion.originalFileName}" class="text-break small"></td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">크기</th>
                            <td th:text="${#numbers.formatDecimal(currentVersion.fileSize / 1024.0, 1, 1) + ' KB'}"></td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">업로드일</th>
                            <td th:text="${#temporals.format(currentVersion.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                    </table>
                </div>
                <div class="card-footer d-flex flex-column gap-1" th:if="${currentVersion != null}">
                    <a th:href="@{/documents/{id}/download(id=${currentVersion.id})}"
                       class="btn btn-primary btn-sm w-100">다운로드</a>
                    <form th:action="@{/admin/documents/{id}/delete(id=${document.id})}"
                          method="post" onsubmit="return confirm('문서를 영구 삭제하시겠습니까? 디스크 파일과 모든 버전이 삭제됩니다.')">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-danger btn-sm w-100">문서 삭제</button>
                    </form>
                </div>
            </div>

            <div class="card" th:if="${not #lists.isEmpty(versions)}">
                <div class="card-header fw-bold small">버전 목록</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item small d-flex justify-content-between align-items-center"
                        th:each="v : ${versions}">
                        <span>
                            <span th:text="'v' + ${v.versionNo}" class="fw-bold"></span>
                            <span th:text="${v.originalFileName}" class="text-muted ms-1 text-truncate d-inline-block" style="max-width:120px;vertical-align:middle;"></span>
                        </span>
                        <span th:text="${#temporals.format(v.createdAt, 'MM-dd HH:mm')}" class="text-muted"></span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header fw-bold">미리보기</div>
                <div class="card-body p-2" style="min-height:500px;">
                    <iframe th:if="${previewType == 'pdf'}"
                            th:src="@{/documents/{id}/preview(id=${currentVersion.id})}"
                            width="100%" height="600" style="border:none;"></iframe>
                    <img th:if="${previewType == 'image'}"
                         th:src="@{/documents/{id}/preview(id=${currentVersion.id})}"
                         class="img-fluid" alt="미리보기">
                    <div th:if="${previewType == 'none' or currentVersion == null}"
                         class="d-flex align-items-center justify-content-center h-100 text-muted"
                         style="min-height:200px;">
                        <div class="text-center">
                            <div class="fs-1 mb-2">📄</div>
                            <div>미리보기를 지원하지 않는 파일 형식입니다.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
