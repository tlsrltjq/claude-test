<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가입 허용 이메일 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); padding: .6rem 1rem; }
        .topnav .navbar-brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.35); color: #fff; font-size: .8rem; }
        .btn-nav.active { background: rgba(255,255,255,.22); border-color: #fff; color: #fff; }
        .btn-nav:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.6); color: #fff; }
        .page-header { background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); border-radius: 14px; padding: 1.4rem 1.75rem; color: #fff; margin-bottom: 1.5rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    </style>
</head>
<body>

<nav class="topnav d-flex align-items-center gap-2 mb-0">
    <a class="navbar-brand me-3" href="/admin">eActive Resource Hub</a>
    <a href="/admin/employees" class="btn btn-sm btn-nav">직원 관리</a>
    <a href="/admin/documents/review" class="btn btn-sm btn-nav">문서 검토</a>
    <a href="/admin/documents/expiry" class="btn btn-sm btn-nav">만료 관리</a>
    <a href="/admin/statistics" class="btn btn-sm btn-nav">통계</a>
    <a href="/admin/gc" class="btn btn-sm btn-nav">파일 GC</a>
    <a href="/admin/certificate" class="btn btn-sm btn-nav">재직증명서</a>
    <a href="/admin/allowed-emails" class="btn btn-sm btn-nav active">가입 허용</a>
    <form th:action="@{/logout}" method="post" class="ms-auto">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="btn btn-sm btn-outline-light">로그아웃</button>
    </form>
</nav>

<div class="container py-4" style="max-width:800px;">

    <div class="page-header">
        <h4 class="mb-1"><i class="bi bi-envelope-check me-2"></i>가입 허용 이메일 관리</h4>
        <p class="mb-0 opacity-75" style="font-size:.9rem">
            여기에 등록된 이메일만 회원가입이 가능합니다.
        </p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 이메일 등록 폼 -->
    <div class="card mb-4">
        <div class="card-body p-4">
            <h6 class="fw-bold mb-3"><i class="bi bi-plus-circle me-1 text-primary"></i>이메일 등록</h6>
            <form th:action="@{/admin/allowed-emails}" method="post" class="row g-2 align-items-end">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="col-sm-5">
                    <label class="form-label small fw-semibold">이메일 <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control form-control-sm"
                           placeholder="example@company.com" required autofocus>
                </div>
                <div class="col-sm-5">
                    <label class="form-label small fw-semibold">메모 <span class="text-muted">(선택)</span></label>
                    <input type="text" name="note" class="form-control form-control-sm"
                           placeholder="부서명, 사번 등">
                </div>
                <div class="col-sm-2">
                    <button type="submit" class="btn btn-primary btn-sm w-100">
                        <i class="bi bi-plus me-1"></i>등록
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 등록된 이메일 목록 -->
    <div class="card">
        <div class="card-body p-0">
            <div class="d-flex align-items-center justify-content-between p-3 border-bottom">
                <span class="fw-semibold small">
                    <i class="bi bi-list-check me-1"></i>
                    등록된 이메일
                    <span class="badge bg-primary rounded-pill ms-1" th:text="${#lists.size(allowedEmails)}">0</span>
                </span>
            </div>
            <div th:if="${#lists.isEmpty(allowedEmails)}" class="text-center text-muted py-5">
                <i class="bi bi-inbox" style="font-size:2rem;"></i>
                <p class="mt-2 mb-0 small">등록된 이메일이 없습니다.</p>
            </div>
            <table th:unless="${#lists.isEmpty(allowedEmails)}" class="table table-hover table-sm mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3" style="width:40%">이메일</th>
                        <th style="width:35%">메모</th>
                        <th style="width:18%">등록일</th>
                        <th style="width:7%"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ae : ${allowedEmails}">
                        <td class="ps-3">
                            <span class="fw-semibold" th:text="${ae.email}"></span>
                        </td>
                        <td class="text-muted small" th:text="${ae.note != null ? ae.note : '-'}"></td>
                        <td class="text-muted small"
                            th:text="${#temporals.format(ae.createdAt, 'yyyy-MM-dd')}"></td>
                        <td class="text-end pe-3">
                            <form th:action="@{'/admin/allowed-emails/' + ${ae.id} + '/delete'}"
                                  method="post"
                                  onsubmit="return confirm('이 이메일 등록을 삭제하시겠습니까?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-outline-danger btn-sm py-0 px-2">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
