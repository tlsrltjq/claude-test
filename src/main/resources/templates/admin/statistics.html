<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다운로드 통계 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-bar-chart-line me-2"></i>활동 통계</h1>
          <p class="page-hd-sub">문서 다운로드·업로드 현황 및 TOP 문서·최근 이력을 확인합니다.</p>
        </div>
      </div>

      <!-- 다운로드 통계 카드 -->
      <div class="d-flex align-items-center gap-2 mb-2">
        <i class="bi bi-download text-primary"></i>
        <span class="fw-semibold" style="font-size:.85rem; color:#374151;">다운로드</span>
      </div>
      <div class="row row-cols-2 row-cols-md-4 g-3 mb-4">
        <div class="col">
          <div class="stat-card">
            <div class="stat-icon blue"><i class="bi bi-download"></i></div>
            <div>
              <div class="stat-value text-primary" th:text="${downloadStats.totalCount}">0</div>
              <div class="stat-label">전체</div>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="stat-card">
            <div class="stat-icon green"><i class="bi bi-calendar-check"></i></div>
            <div>
              <div class="stat-value text-success" th:text="${downloadStats.todayCount}">0</div>
              <div class="stat-label">오늘</div>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="stat-card">
            <div class="stat-icon sky"><i class="bi bi-calendar-week"></i></div>
            <div>
              <div class="stat-value" style="color:#0369a1;" th:text="${downloadStats.weekCount}">0</div>
              <div class="stat-label">최근 7일</div>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="stat-card">
            <div class="stat-icon purple"><i class="bi bi-calendar-month"></i></div>
            <div>
              <div class="stat-value" style="color:#6d28d9;" th:text="${downloadStats.monthCount}">0</div>
              <div class="stat-label">이번 달</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 업로드 통계 카드 -->
      <div class="d-flex align-items-center gap-2 mb-2">
        <i class="bi bi-upload text-success"></i>
        <span class="fw-semibold" style="font-size:.85rem; color:#374151;">업로드</span>
      </div>
      <div class="row row-cols-2 row-cols-md-4 g-3 mb-4">
        <div class="col">
          <div class="stat-card">
            <div class="stat-icon green"><i class="bi bi-upload"></i></div>
            <div>
              <div class="stat-value text-success" th:text="${uploadStats.totalCount}">0</div>
              <div class="stat-label">전체</div>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="stat-card">
            <div class="stat-icon green"><i class="bi bi-calendar-check"></i></div>
            <div>
              <div class="stat-value text-success" th:text="${uploadStats.todayCount}">0</div>
              <div class="stat-label">오늘</div>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="stat-card">
            <div class="stat-icon sky"><i class="bi bi-calendar-week"></i></div>
            <div>
              <div class="stat-value" style="color:#0369a1;" th:text="${uploadStats.weekCount}">0</div>
              <div class="stat-label">최근 7일</div>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="stat-card">
            <div class="stat-icon purple"><i class="bi bi-calendar-month"></i></div>
            <div>
              <div class="stat-value" style="color:#6d28d9;" th:text="${uploadStats.monthCount}">0</div>
              <div class="stat-label">이번 달</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 2열 레이아웃 -->
      <div class="row g-4">

        <!-- 왼쪽: TOP 10 -->
        <div class="col-lg-5">
          <div class="table-card h-100">
            <div class="card-header-custom d-flex align-items-center gap-2">
              <i class="bi bi-trophy text-warning"></i>
              TOP 10 다운로드 문서
            </div>
            <div th:if="${#lists.isEmpty(topDocuments)}" class="empty-state">
              <i class="bi bi-file-earmark-x"></i>
              <p>데이터가 없습니다.</p>
            </div>
            <div th:if="${!#lists.isEmpty(topDocuments)}" class="table-responsive">
              <table class="table table-hover mb-0">
                <thead>
                <tr>
                  <th class="text-center" style="width:40px;">#</th>
                  <th>문서</th>
                  <th>소유자</th>
                  <th class="text-end">횟수</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doc, stat : ${topDocuments}">
                  <td class="text-center">
                    <span class="rank-badge"
                          th:classappend="${stat.index == 0 ? ' top1' : (stat.index == 1 ? ' top2' : (stat.index == 2 ? ' top3' : ''))}"
                          th:text="${stat.index + 1}"></span>
                  </td>
                  <td>
                    <div class="fw-semibold text-truncate" style="max-width:160px;"
                         th:text="${doc.documentTitle}"></div>
                    <small class="text-muted text-truncate d-block" style="max-width:160px;"
                           th:text="${doc.originalFileName}"></small>
                  </td>
                  <td>
                    <div class="small fw-medium" th:text="${doc.ownerName}"></div>
                    <small class="text-muted" th:text="${doc.teamName}"></small>
                  </td>
                  <td class="text-end fw-bold" style="color:#1d4ed8;"
                      th:text="${doc.downloadCount}"></td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 오른쪽: 최근 다운로드 이력 -->
        <div class="col-lg-7">
          <div class="table-card h-100">
            <div class="card-header-custom d-flex align-items-center gap-2">
              <i class="bi bi-clock-history text-secondary"></i>
              최근 다운로드 이력
              <span class="badge bg-light text-secondary border ms-1" style="font-size:.7rem;">최대 30건</span>
            </div>
            <div th:if="${#lists.isEmpty(recentDownloads)}" class="empty-state">
              <i class="bi bi-inbox"></i>
              <p>다운로드 이력이 없습니다.</p>
            </div>
            <div th:if="${!#lists.isEmpty(recentDownloads)}" class="scroll-body table-responsive">
              <table class="table table-hover mb-0">
                <thead class="sticky-top" style="top:0;">
                <tr>
                  <th class="text-nowrap">일시</th>
                  <th>다운로더</th>
                  <th>버전 ID</th>
                  <th>사유</th>
                  <th>IP</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${recentDownloads}">
                  <td class="text-nowrap text-muted"
                      th:text="${#temporals.format(log.createdAt, 'MM-dd HH:mm')}"></td>
                  <td class="fw-medium" th:text="${log.user.name}"></td>
                  <td class="text-muted small" th:text="${log.targetId}"></td>
                  <td class="text-truncate" style="max-width:160px;"
                      th:text="${log.reason}"></td>
                  <td class="font-mono text-muted" th:text="${log.ipAddress}"></td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>

      <!-- 최근 업로드 이력 -->
      <div class="table-card mt-4">
        <div class="card-header-custom d-flex align-items-center gap-2">
          <i class="bi bi-cloud-upload text-success"></i>
          최근 업로드 이력
          <span class="badge bg-light text-secondary border ms-1" style="font-size:.7rem;">최대 20건</span>
        </div>
        <div th:if="${#lists.isEmpty(recentUploads)}" class="empty-state">
          <i class="bi bi-inbox"></i>
          <p>업로드 이력이 없습니다.</p>
        </div>
        <div th:if="${!#lists.isEmpty(recentUploads)}" class="scroll-body table-responsive">
          <table class="table table-hover mb-0">
            <thead class="sticky-top" style="top:0;">
            <tr>
              <th class="text-nowrap">일시</th>
              <th>업로더</th>
              <th>대상 ID</th>
              <th>IP</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${recentUploads}">
              <td class="text-nowrap text-muted"
                  th:text="${#temporals.format(log.createdAt, 'MM-dd HH:mm')}"></td>
              <td class="fw-medium" th:text="${log.user.name}"></td>
              <td class="text-muted small" th:text="${log.targetId}"></td>
              <td class="font-mono text-muted" th:text="${log.ipAddress}"></td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
