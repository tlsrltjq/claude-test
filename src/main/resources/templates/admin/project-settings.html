<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인력표 팀 설정 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); }
        .btn-nav { border-color: rgba(255,255,255,.35); color: #fff; font-size: .8rem; }
        .btn-nav.active { background: rgba(255,255,255,.22); border-color: #fff; }
        .btn-nav:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.6); color: #fff; }
        .page-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
            border-radius: 14px; padding: 1.8rem 2rem; color: #fff; margin-bottom: 1.75rem;
        }
        .team-card {
            border: none; border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.07);
            transition: box-shadow .15s;
        }
        .team-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.11); }
        .toggle-row { padding: 1rem 1.5rem; border-bottom: 1px solid #f0f2f5; }
        .toggle-row:last-child { border-bottom: none; }
    </style>
</head>
<body>

<nav class="topnav py-2 px-3 d-flex align-items-center gap-2 flex-wrap">
    <a class="navbar-brand fw-bold text-white me-2" th:href="@{/admin}">
        <i class="bi bi-shield-lock me-1"></i>ADMIN
    </a>
    <a th:href="@{/admin/documents/review}" class="btn btn-outline-light btn-nav btn-sm">
        <i class="bi bi-clipboard-check me-1"></i>문서 검토
    </a>
    <a th:href="@{/admin/teams}" class="btn btn-outline-light btn-nav btn-sm">
        <i class="bi bi-people me-1"></i>팀 관리
    </a>
    <a th:href="@{/admin/employees}" class="btn btn-outline-light btn-nav btn-sm">
        <i class="bi bi-person-lines-fill me-1"></i>직원 관리
    </a>
    <a th:href="@{/admin/statistics}" class="btn btn-outline-light btn-nav btn-sm">
        <i class="bi bi-bar-chart me-1"></i>통계
    </a>
    <a th:href="@{/admin/certificate}" class="btn btn-outline-light btn-nav btn-sm">
        <i class="bi bi-file-earmark-text me-1"></i>재직증명서
    </a>
    <a th:href="@{/admin/teams/project-settings}" class="btn btn-outline-light btn-nav btn-sm active">
        <i class="bi bi-toggles me-1"></i>인력표 팀 설정
    </a>
    <a th:href="@{/dashboard}" class="btn btn-outline-light btn-nav btn-sm">
        <i class="bi bi-house me-1"></i>내화면
    </a>
    <form th:action="@{/logout}" method="post" class="ms-auto">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-light btn-nav btn-sm">
            <i class="bi bi-box-arrow-right me-1"></i>로그아웃
        </button>
    </form>
</nav>

<div class="container-fluid py-4 px-4" style="max-width: 720px;">

    <div class="page-header">
        <h4 class="mb-1"><i class="bi bi-toggles me-2"></i>인력표 팀 노출 설정</h4>
        <small class="opacity-75">인력표(<code>/sales/profiles</code>)에 표시할 팀을 켜고 끕니다.</small>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="team-card card">
        <div class="card-body p-0">
            <div th:each="team : ${teams}" class="toggle-row d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <div th:if="${team.projectTeam}"
                         style="width:10px; height:10px; border-radius:50%; background:#16a34a; flex-shrink:0;"></div>
                    <div th:unless="${team.projectTeam}"
                         style="width:10px; height:10px; border-radius:50%; background:#d1d5db; flex-shrink:0;"></div>
                    <div>
                        <div class="fw-semibold" th:text="${team.name}">팀명</div>
                        <small th:if="${team.projectTeam}" style="color:#16a34a;">인력표에 포함됨</small>
                        <small th:unless="${team.projectTeam}" class="text-muted">인력표에서 제외됨</small>
                    </div>
                </div>
                <form th:action="@{/admin/teams/{id}/toggle-project(id=${team.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            th:class="${team.projectTeam}
                                ? 'btn btn-sm btn-outline-secondary'
                                : 'btn btn-sm btn-success'"
                            th:text="${team.projectTeam} ? '끄기' : '켜기'">
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="mt-3 text-muted" style="font-size:.82rem;">
        <i class="bi bi-info-circle me-1"></i>
        변경사항은 즉시 인력표에 반영됩니다. 전사 인력 목록은 영향받지 않습니다.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
