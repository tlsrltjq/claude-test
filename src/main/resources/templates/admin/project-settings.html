<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인력표 팀 설정 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-toggles me-2"></i>인력표 팀 노출 설정</h1>
          <p class="page-hd-sub">인력표(<code>/sales/profiles</code>)에 표시할 팀을 켜고 끕니다.</p>
        </div>
      </div>

      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="team-card card">
        <div class="card-body p-0">
          <div th:each="team : ${teams}" class="toggle-row d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
              <div th:if="${team.projectTeam}"
                   style="width:10px; height:10px; border-radius:50%; background:#16a34a; flex-shrink:0;"></div>
              <div th:unless="${team.projectTeam}"
                   style="width:10px; height:10px; border-radius:50%; background:#d1d5db; flex-shrink:0;"></div>
              <div>
                <div class="fw-semibold" th:text="${team.name}">팀명</div>
                <small th:if="${team.projectTeam}" style="color:#16a34a;">인력표에 포함됨</small>
                <small th:unless="${team.projectTeam}" class="text-muted">인력표에서 제외됨</small>
              </div>
            </div>
            <form th:action="@{/admin/teams/{id}/toggle-project(id=${team.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit"
                      th:class="${team.projectTeam}
                          ? 'btn btn-sm btn-outline-secondary'
                          : 'btn btn-sm btn-success'"
                      th:text="${team.projectTeam} ? '끄기' : '켜기'">
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="mt-3 text-muted" style="font-size:.82rem;">
        <i class="bi bi-info-circle me-1"></i>
        변경사항은 즉시 인력표에 반영됩니다. 전사 인력 목록은 영향받지 않습니다.
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script th:attr="nonce=${cspNonce}">
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
