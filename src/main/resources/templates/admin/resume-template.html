<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양식 이력서 관리 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-file-earmark-person me-2"></i>양식 이력서 관리</h1>
          <p class="page-hd-sub">직원용 표준 양식 이력서를 관리합니다.</p>
        </div>
      </div>

      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- 현재 활성 양식 -->
      <div class="info-card">
        <div class="card-header-custom"><i class="bi bi-file-check me-2"></i>현재 활성 양식</div>
        <div class="card-body">
          <div th:if="${activeTemplate == null}" class="empty-state">
            <i class="bi bi-file-earmark-x"></i>
            <p>등록된 양식 이력서가 없습니다.</p>
          </div>
          <div th:if="${activeTemplate != null}">
            <div class="info-row">
              <span class="info-label">파일명</span>
              <span class="info-val fw-semibold" th:text="${activeTemplate.fileName}"></span>
            </div>
            <div class="info-row">
              <span class="info-label">업로드일</span>
              <span class="info-val text-muted" th:text="${#temporals.format(activeTemplate.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div class="info-row">
              <span class="info-label">업로더</span>
              <span class="info-val" th:text="${activeTemplate.uploadedBy.name + ' (' + activeTemplate.uploadedBy.email + ')'}"></span>
            </div>
            <div class="info-row">
              <span class="info-label">파일 크기</span>
              <span class="info-val text-muted" th:text="${#numbers.formatDecimal(activeTemplate.fileSize / 1024.0, 1, 'COMMA', 1, 'POINT') + ' KB'}"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- 새 파일 업로드 -->
      <div class="info-card">
        <div class="card-header-custom"><i class="bi bi-cloud-arrow-up me-2"></i>새 양식 업로드</div>
        <div class="card-body">
          <div class="upload-zone">
            <i class="bi bi-file-earmark-arrow-up"></i>
            <p>PDF, DOC, DOCX, HWP, HWPX / 최대 20MB</p>
            <p class="mt-1" style="color:#b0b8c1;">새 파일 업로드 시 기존 양식은 보관 처리됩니다.</p>
          </div>
          <form th:action="@{/admin/resume-template}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <div class="mb-3">
              <input type="file" name="file" class="form-control"
                     accept=".pdf,.doc,.docx,.hwp,.hwpx" required>
            </div>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-upload me-1"></i>업로드
            </button>
          </form>
        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
