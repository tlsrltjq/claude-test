<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양식 이력서 관리 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); padding: .6rem 1rem; }
        .topnav .navbar-brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.35); color: #fff; font-size: .8rem; }
        .btn-nav.active { background: rgba(255,255,255,.22); border-color: #fff; color: #fff; }
        .btn-nav:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.6); color: #fff; }
        .page-header { background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); border-radius: 14px; padding: 1.4rem 1.75rem; color: #fff; margin-bottom: 1.5rem; }
        .page-header h4 { font-weight: 700; margin-bottom: .2rem; }
        .page-header p { margin: 0; opacity: .75; font-size: .9rem; }
        .info-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 1.25rem; }
        .info-card .card-header-custom { background: #1e3a5f; color: #fff; padding: .9rem 1.25rem; font-weight: 600; font-size: .9rem; }
        .info-card .card-body { padding: 1.25rem; }
        .info-row { display: flex; align-items: flex-start; padding: .5rem 0; border-bottom: 1px solid #f0f2f5; gap: .75rem; }
        .info-row:last-child { border-bottom: none; }
        .info-label { min-width: 80px; font-size: .8rem; color: #9ca3af; }
        .info-val { font-size: .88rem; color: #374151; font-weight: 500; }
        .empty-state { text-align: center; padding: 2rem 1rem; color: #9ca3af; }
        .empty-state .bi { font-size: 2rem; display: block; margin-bottom: .5rem; opacity: .4; }
        .upload-zone { border: 2px dashed #d1d5db; border-radius: 10px; padding: 1.25rem; text-align: center; margin-bottom: 1rem; background: #fafafa; }
        .upload-zone .bi { font-size: 2rem; color: #9ca3af; display: block; margin-bottom: .5rem; }
        .upload-zone p { margin: 0; font-size: .82rem; color: #9ca3af; }
    </style>
</head>
<body>
<nav class="topnav navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin}">
            <i class="bi bi-shield-fill me-1"></i>eActive Hub
            <span class="badge bg-warning text-dark ms-1" style="font-size:.65rem">ADMIN</span>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin}" class="btn btn-nav btn-sm">
                <i class="bi bi-speedometer2 me-1"></i>대시보드
            </a>
            <a th:href="@{/dashboard}" class="btn btn-nav btn-sm">
                <i class="bi bi-person me-1"></i>내 화면
            </a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-nav btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width:700px;">
    <div class="page-header">
        <h4><i class="bi bi-file-earmark-person me-2"></i>양식 이력서 관리</h4>
        <p>직원용 표준 양식 이력서를 관리합니다.</p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 현재 활성 양식 -->
    <div class="info-card">
        <div class="card-header-custom"><i class="bi bi-file-check me-2"></i>현재 활성 양식</div>
        <div class="card-body">
            <div th:if="${activeTemplate == null}" class="empty-state">
                <i class="bi bi-file-earmark-x"></i>
                <p>등록된 양식 이력서가 없습니다.</p>
            </div>
            <div th:if="${activeTemplate != null}">
                <div class="info-row">
                    <span class="info-label">파일명</span>
                    <span class="info-val fw-semibold" th:text="${activeTemplate.fileName}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">업로드일</span>
                    <span class="info-val text-muted" th:text="${#temporals.format(activeTemplate.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">업로더</span>
                    <span class="info-val" th:text="${activeTemplate.uploadedBy.name + ' (' + activeTemplate.uploadedBy.email + ')'}"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">파일 크기</span>
                    <span class="info-val text-muted" th:text="${#numbers.formatDecimal(activeTemplate.fileSize / 1024.0, 1, 'COMMA', 1, 'POINT') + ' KB'}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 새 파일 업로드 -->
    <div class="info-card">
        <div class="card-header-custom"><i class="bi bi-cloud-arrow-up me-2"></i>새 양식 업로드</div>
        <div class="card-body">
            <div class="upload-zone">
                <i class="bi bi-file-earmark-arrow-up"></i>
                <p>PDF, DOC, DOCX, HWP, HWPX / 최대 20MB</p>
                <p class="mt-1" style="color:#b0b8c1;">새 파일 업로드 시 기존 양식은 보관 처리됩니다.</p>
            </div>
            <form th:action="@{/admin/resume-template}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-3">
                    <input type="file" name="file" class="form-control"
                           accept=".pdf,.doc,.docx,.hwp,.hwpx" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-upload me-1"></i>업로드
                </button>
            </form>
        </div>
    </div>
</div>

<!-- 로딩 스피너 오버레이 -->
<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
    <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
        <span class="visually-hidden">처리 중...</span>
    </div>
</div>
<script>
(function(){
    var p = window.location.pathname;
    // 네비바 active 상태
    document.querySelectorAll('a.btn-nav').forEach(function(el){
        var h = el.getAttribute('href');
        if(!h) return;
        var isRoot = (h==='/admin'||h==='/admin/');
        var active = isRoot ? (p==='/admin'||p==='/admin/') : p.startsWith(h);
        if(active) el.classList.add('active');
    });
    // POST 폼 제출 시 스피너 표시
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
