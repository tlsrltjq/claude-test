<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양식 이력서 관리 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">관리자 패널</a>
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width:700px;">
    <h2 class="mb-3 h5">양식 이력서 관리</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- 현재 활성 양식 -->
    <div class="card mb-4">
        <div class="card-header fw-bold">현재 활성 양식</div>
        <div class="card-body">
            <div th:if="${activeTemplate == null}" class="text-muted">등록된 양식 이력서가 없습니다.</div>
            <div th:if="${activeTemplate != null}">
                <table class="table table-sm mb-0">
                    <tbody>
                    <tr>
                        <th class="text-muted fw-normal" style="width:120px;">파일명</th>
                        <td th:text="${activeTemplate.fileName}"></td>
                    </tr>
                    <tr>
                        <th class="text-muted fw-normal">업로드일</th>
                        <td th:text="${#temporals.format(activeTemplate.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    </tr>
                    <tr>
                        <th class="text-muted fw-normal">업로더</th>
                        <td th:text="${activeTemplate.uploadedBy.name + ' (' + activeTemplate.uploadedBy.email + ')'}"></td>
                    </tr>
                    <tr>
                        <th class="text-muted fw-normal">파일 크기</th>
                        <td th:text="${#numbers.formatDecimal(activeTemplate.fileSize / 1024.0, 1, 'COMMA', 1, 'POINT') + ' KB'}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 새 파일 업로드 -->
    <div class="card">
        <div class="card-header fw-bold">새 양식 업로드</div>
        <div class="card-body">
            <p class="text-muted small mb-3">
                새 파일을 업로드하면 기존 양식은 보관(ARCHIVED) 상태로 변경됩니다.<br>
                허용 형식: PDF, DOC, DOCX, HWP, HWPX / 최대 20MB
            </p>
            <form th:action="@{/admin/resume-template}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-3">
                    <input type="file" name="file" class="form-control"
                           accept=".pdf,.doc,.docx,.hwp,.hwpx" required>
                </div>
                <button type="submit" class="btn btn-primary">업로드</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
