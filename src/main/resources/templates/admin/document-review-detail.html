<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 검토 상세 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto">
            <a th:href="@{/admin/documents/review}" class="btn btn-outline-light btn-sm">← 검토 목록</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-md-4">
            <div class="card mb-3">
                <div class="card-header fw-bold">문서 정보</div>
                <div class="card-body">
                    <table class="table table-sm mb-0">
                        <tr>
                            <th class="text-muted fw-normal" style="width:90px;">직원</th>
                            <td th:text="${version.document.folder.owner.name}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">팀</th>
                            <td th:text="${version.document.folder.owner.team != null ? version.document.folder.owner.team.name : '-'}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">종류</th>
                            <td>
                                <span th:switch="${version.document.documentType.name()}">
                                    <span th:case="'RESUME'">이력서</span>
                                    <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                                    <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                                    <span th:case="'LICENSE'">자격증</span>
                                    <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                                    <span th:case="*">기타</span>
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">제목</th>
                            <td th:text="${version.document.title}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">버전</th>
                            <td th:text="'v' + ${version.versionNo}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">파일명</th>
                            <td th:text="${version.originalFileName}" class="small text-break"></td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">업로드일</th>
                            <td th:text="${#temporals.format(version.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">상태</th>
                            <td><span class="badge bg-warning text-dark">검토 대기</span></td>
                        </tr>
                    </table>
                </div>
            </div>

            <!-- 승인 버튼 -->
            <form th:action="@{/admin/documents/review/{id}/approve(id=${version.id})}" method="post" class="mb-2">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-success w-100"
                        onclick="return confirm('이 문서를 승인하시겠습니까?')">승인</button>
            </form>

            <!-- 반려 폼 -->
            <div class="card">
                <div class="card-header fw-bold text-danger">반려</div>
                <div class="card-body">
                    <form th:action="@{/admin/documents/review/{id}/reject(id=${version.id})}" method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                        <div class="mb-2">
                            <label class="form-label small">반려 사유 <span class="text-danger">*</span></label>
                            <textarea name="reason" class="form-control form-control-sm" rows="3"
                                      minlength="2" required placeholder="반려 사유를 입력하세요 (최소 2자)"></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 btn-sm">반려</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header fw-bold">미리보기</div>
                <div class="card-body p-2" style="min-height:500px;">
                    <iframe th:if="${previewType == 'pdf'}"
                            th:src="@{/documents/{id}/preview(id=${version.id})}"
                            width="100%" height="600" style="border:none;"></iframe>
                    <img th:if="${previewType == 'image'}"
                         th:src="@{/documents/{id}/preview(id=${version.id})}"
                         class="img-fluid" alt="미리보기">
                    <div th:if="${previewType == 'none'}"
                         class="d-flex align-items-center justify-content-center h-100 text-muted"
                         style="min-height:200px;">
                        <div class="text-center">
                            <div class="fs-1 mb-2">📄</div>
                            <div>미리보기를 지원하지 않는 파일 형식입니다.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
