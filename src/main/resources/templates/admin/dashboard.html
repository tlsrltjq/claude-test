<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드 — eActive Resource Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <!-- Main -->
  <main class="main-content">
    <div class="page-wrap">

      <!-- Alerts -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- Page header -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title">관리자 대시보드</h1>
          <p class="page-hd-sub">eActive Resource Hub 운영 현황</p>
        </div>
      </div>

      <!-- KPI 카드 -->
      <div class="kpi-row">
        <a th:href="@{/admin/employees}" class="kpi-card">
          <div class="kpi-value" th:text="${totalUsers}">0</div>
          <div class="kpi-info">
            <div class="kpi-label">전체 사용자</div>
            <div class="kpi-link">직원 목록 보기 →</div>
          </div>
        </a>
        <a th:href="@{/admin/teams}" class="kpi-card">
          <div class="kpi-value" th:text="${totalTeams}">0</div>
          <div class="kpi-info">
            <div class="kpi-label">전체 팀</div>
            <div class="kpi-link">팀 관리 →</div>
          </div>
        </a>
        <a th:href="@{/admin/documents/review}"
           class="kpi-card"
           th:classappend="${pendingReviewCount > 0} ? 'kpi-alert'">
          <div class="kpi-value" th:text="${pendingReviewCount}">0</div>
          <div class="kpi-info">
            <div class="kpi-label">검토 대기</div>
            <div class="kpi-link">검토하기 →</div>
          </div>
        </a>
      </div>

      <!-- 빠른 메뉴 -->
      <div class="section-hd">빠른 메뉴</div>
      <div class="menu-list">

        <a th:href="@{/admin/employees}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-people"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">직원 관리</div>
            <div class="menu-list-desc">계정·권한·상태 관리</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/admin/teams}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-diagram-3"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">팀 관리</div>
            <div class="menu-list-desc">팀 생성·수정·삭제</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/admin/documents/review}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-file-earmark-check"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">문서 검토</div>
            <div class="menu-list-desc">대기 문서 승인·반려</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/admin/documents/expiry}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-calendar-x"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">만료 현황</div>
            <div class="menu-list-desc">기간 만료 문서 확인</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/admin/statistics}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-bar-chart"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">통계</div>
            <div class="menu-list-desc">업로드·활동 통계</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/admin/certificate}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-file-earmark-text"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">재직증명서</div>
            <div class="menu-list-desc">DOCX·PDF 자동 발급</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/admin/allowed-emails}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-envelope-check"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">가입 허용</div>
            <div class="menu-list-desc">사전등록 이메일 관리</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/admin/teams/project-settings}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-toggles"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">인력표 팀 설정</div>
            <div class="menu-list-desc">팀별 노출 여부 관리</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/dashboard}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-house"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">내 화면</div>
            <div class="menu-list-desc">개인 폴더·설정·이력서</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <a th:href="@{/admin/gc}" class="menu-list-item">
          <div class="menu-list-icon"><i class="bi bi-trash3"></i></div>
          <div class="menu-list-info">
            <div class="menu-list-title">파일 GC</div>
            <div class="menu-list-desc">고아 파일 정리</div>
          </div>
          <i class="bi bi-chevron-right menu-list-arrow"></i>
        </a>

        <form th:action="@{/admin/project-status/sync}" method="post" style="margin:0">
          <input type="hidden" name="_csrf" th:value="${_csrf.token}">
          <button type="submit" class="menu-list-item w-100 text-start border-0 bg-transparent p-0"
                  style="cursor:pointer;">
            <div class="menu-list-icon"><i class="bi bi-arrow-repeat"></i></div>
            <div class="menu-list-info">
              <div class="menu-list-title">프로젝트 상태 동기화</div>
              <div class="menu-list-desc">날짜 기반 상태 즉시 업데이트</div>
            </div>
            <i class="bi bi-play-fill menu-list-arrow text-success"></i>
          </button>
        </form>

      </div><!-- /.menu-list -->

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>

<script th:attr="nonce=${cspNonce}">
(function () {
  document.querySelectorAll('form').forEach(function (f) {
    if ((f.getAttribute('method') || 'get').toLowerCase() !== 'get') {
      f.addEventListener('submit', function () {
        document.getElementById('loadingOverlay').style.display = 'flex';
      });
    }
  });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
