<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin/users/pending}" class="btn btn-outline-warning btn-sm">승인 대기</a>
            <a th:href="@{/admin/teams}" class="btn btn-outline-light btn-sm">팀 관리</a>
            <a th:href="@{/admin/employees}" class="btn btn-outline-light btn-sm">직원 목록</a>
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-sm">내 화면</a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-danger btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">관리자 대시보드</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card text-bg-warning">
                <div class="card-body text-center">
                    <h6 class="card-title">승인 대기</h6>
                    <p class="display-4 fw-bold mb-0" th:text="${pendingCount}">0</p>
                    <a th:href="@{/admin/users/pending}" class="btn btn-dark btn-sm mt-2">처리하기</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-bg-primary">
                <div class="card-body text-center">
                    <h6 class="card-title">전체 사용자</h6>
                    <p class="display-4 fw-bold mb-0" th:text="${totalUsers}">0</p>
                    <a th:href="@{/admin/employees}" class="btn btn-light btn-sm mt-2">목록 보기</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-bg-success">
                <div class="card-body text-center">
                    <h6 class="card-title">전체 팀</h6>
                    <p class="display-4 fw-bold mb-0" th:text="${totalTeams}">0</p>
                    <a th:href="@{/admin/teams}" class="btn btn-light btn-sm mt-2">팀 관리</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
