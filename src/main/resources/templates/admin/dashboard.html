<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
        }
        .btn-nav {
            border-color: rgba(255,255,255,.35);
            color: #fff;
            font-size: .8rem;
        }
        .btn-nav.active { background: rgba(255,255,255,.22); border-color: #fff; color: #fff; }
        .btn-nav:hover {
            background: rgba(255,255,255,.12);
            border-color: rgba(255,255,255,.6);
            color: #fff;
        }
        .page-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
            border-radius: 14px;
            padding: 2rem 2rem 1.6rem;
            color: #fff;
            margin-bottom: 1.75rem;
        }
        .stat-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
        }
        .icon-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .stat-number {
            font-size: 2.6rem;
            font-weight: 700;
            line-height: 1;
        }
        .quick-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.07);
            transition: transform .18s, box-shadow .18s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .quick-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,.13);
            color: inherit;
        }
        .quick-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin: 0 auto 0.9rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg topnav py-2">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-white" th:href="@{/admin}">
            <i class="bi bi-shield-fill me-1"></i>eActive Hub
            <span class="badge bg-warning text-dark ms-1" style="font-size:.65rem">ADMIN</span>
        </a>
        <div class="ms-auto d-flex flex-wrap gap-2">
            <a th:href="@{/admin/documents/review}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-file-earmark-check me-1"></i>문서검토
            </a>
            <a th:href="@{/admin/documents/expiry}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-calendar-x me-1"></i>만료현황
            </a>
            <a th:href="@{/admin/teams}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-diagram-3 me-1"></i>팀관리
            </a>
            <a th:href="@{/admin/employees}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-people me-1"></i>직원목록
            </a>
            <a th:href="@{/admin/statistics}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-bar-chart me-1"></i>통계
            </a>
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-house me-1"></i>내화면
            </a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-nav btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 페이지 헤더 -->
    <div class="page-header">
        <div class="d-flex align-items-center gap-3">
            <div class="icon-circle" style="background:rgba(255,255,255,.15);">
                <i class="bi bi-speedometer2 text-white fs-3"></i>
            </div>
            <div>
                <h3 class="fw-bold mb-0">관리자 대시보드</h3>
                <small class="opacity-75">eActive Resource Hub 운영 현황</small>
            </div>
        </div>
    </div>

    <!-- 통계 카드 3개 -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card h-100">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="icon-circle" style="background:#e8f4ff;">
                            <i class="bi bi-person-fill" style="color:#1e6ec8;"></i>
                        </div>
                        <span class="text-muted fw-semibold">전체 사용자</span>
                    </div>
                    <div class="stat-number text-dark mb-3" th:text="${totalUsers}">0</div>
                    <a th:href="@{/admin/employees}" class="btn btn-primary btn-sm px-3">
                        <i class="bi bi-arrow-right me-1"></i>목록 보기
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card h-100">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="icon-circle" style="background:#eaffef;">
                            <i class="bi bi-people-fill" style="color:#1a8a3a;"></i>
                        </div>
                        <span class="text-muted fw-semibold">전체 팀</span>
                    </div>
                    <div class="stat-number text-dark mb-3" th:text="${totalTeams}">0</div>
                    <a th:href="@{/admin/teams}" class="btn btn-success btn-sm px-3">
                        <i class="bi bi-arrow-right me-1"></i>팀 관리
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card h-100">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="icon-circle" style="background:#fff8e1;">
                            <i class="bi bi-clock-fill" style="color:#e6a700;"></i>
                        </div>
                        <span class="text-muted fw-semibold">검토 대기</span>
                    </div>
                    <div class="stat-number text-dark mb-3" th:text="${pendingReviewCount}">0</div>
                    <a th:href="@{/admin/documents/review}" class="btn btn-warning btn-sm px-3">
                        <i class="bi bi-arrow-right me-1"></i>검토하기
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 빠른 메뉴 -->
    <h6 class="text-muted fw-semibold mb-3 text-uppercase" style="letter-spacing:.05em;">빠른 메뉴</h6>
    <div class="row row-cols-2 row-cols-md-3 g-3 mb-5">
        <div class="col">
            <a th:href="@{/admin/employees}" class="quick-card card">
                <div class="card-body text-center py-4">
                    <div class="quick-icon" style="background:#e8f4ff;">
                        <i class="bi bi-people" style="color:#1e6ec8;"></i>
                    </div>
                    <div class="fw-semibold">직원 관리</div>
                    <small class="text-muted">계정·권한·상태 관리</small>
                </div>
            </a>
        </div>
        <div class="col">
            <a th:href="@{/admin/teams}" class="quick-card card">
                <div class="card-body text-center py-4">
                    <div class="quick-icon" style="background:#eaffef;">
                        <i class="bi bi-diagram-3" style="color:#1a8a3a;"></i>
                    </div>
                    <div class="fw-semibold">팀 관리</div>
                    <small class="text-muted">팀 생성·수정·삭제</small>
                </div>
            </a>
        </div>
        <div class="col">
            <a th:href="@{/admin/documents/review}" class="quick-card card">
                <div class="card-body text-center py-4">
                    <div class="quick-icon" style="background:#fff8e1;">
                        <i class="bi bi-file-earmark-check" style="color:#e6a700;"></i>
                    </div>
                    <div class="fw-semibold">문서 검토</div>
                    <small class="text-muted">대기 문서 승인·반려</small>
                </div>
            </a>
        </div>
        <div class="col">
            <a th:href="@{/admin/documents/expiry}" class="quick-card card">
                <div class="card-body text-center py-4">
                    <div class="quick-icon" style="background:#ffeaea;">
                        <i class="bi bi-calendar-x" style="color:#c0392b;"></i>
                    </div>
                    <div class="fw-semibold">만료 현황</div>
                    <small class="text-muted">기간 만료 문서 확인</small>
                </div>
            </a>
        </div>
        <div class="col">
            <a th:href="@{/admin/statistics}" class="quick-card card">
                <div class="card-body text-center py-4">
                    <div class="quick-icon" style="background:#f3eeff;">
                        <i class="bi bi-bar-chart" style="color:#6f42c1;"></i>
                    </div>
                    <div class="fw-semibold">통계</div>
                    <small class="text-muted">업로드·활동 통계</small>
                </div>
            </a>
        </div>
        <div class="col">
            <a th:href="@{/dashboard}" class="quick-card card">
                <div class="card-body text-center py-4">
                    <div class="quick-icon" style="background:#f0f2f5;">
                        <i class="bi bi-file-earmark-person" style="color:#495057;"></i>
                    </div>
                    <div class="fw-semibold">양식·이력서</div>
                    <small class="text-muted">내 화면으로 이동</small>
                </div>
            </a>
        </div>
    </div>
</div>

<!-- 로딩 스피너 오버레이 -->
<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
    <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
        <span class="visually-hidden">처리 중...</span>
    </div>
</div>
<script>
(function(){
    var p = window.location.pathname;
    // 네비바 active 상태
    document.querySelectorAll('a.btn-nav').forEach(function(el){
        var h = el.getAttribute('href');
        if(!h) return;
        var isRoot = (h==='/admin'||h==='/admin/');
        var active = isRoot ? (p==='/admin'||p==='/admin/') : p.startsWith(h);
        if(active) el.classList.add('active');
    });
    // POST 폼 제출 시 스피너 표시
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
