<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title">직원 목록</h1>
          <p class="page-hd-sub">계정·권한·상태를 관리합니다</p>
        </div>
        <div class="page-hd-actions">
          <span class="badge rounded-pill bg-secondary px-3 py-2" style="font-size:.85rem;">
            총 <span th:text="${totalCount}">0</span>명
          </span>
        </div>
      </div>

      <!-- 필터 바 -->
      <div class="card filter-card mb-3">
        <div class="card-body p-3">
          <form method="get" th:action="@{/admin/employees}" class="row g-2 align-items-center">
            <div class="col-sm-4 col-md-3">
              <div class="input-group input-group-sm">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-search text-muted"></i>
                </span>
                <input type="text" name="q" class="form-control border-start-0"
                       placeholder="이름 또는 이메일" th:value="${q}">
              </div>
            </div>
            <div class="col-auto">
              <select name="position" class="form-select form-select-sm">
                <option value="">전체 직급</option>
                <option th:each="pos : ${positions}"
                        th:value="${pos.name()}"
                        th:text="${pos.displayName}"
                        th:selected="${pos.name() == position}"></option>
              </select>
            </div>
            <div class="col-auto">
              <select name="role" class="form-select form-select-sm">
                <option value="">전체 권한</option>
                <option th:each="r : ${roles}"
                        th:value="${r.name()}"
                        th:text="${r.displayName}"
                        th:selected="${r.name() == role}"></option>
              </select>
            </div>
            <div class="col-auto">
              <select name="teamId" class="form-select form-select-sm">
                <option value="">전체 팀</option>
                <option th:each="team : ${teams}"
                        th:value="${team.id}"
                        th:text="${team.name}"
                        th:selected="${teamId != null and teamId == team.id}"></option>
              </select>
            </div>
            <div class="col-auto d-flex gap-1">
              <button type="submit" class="btn btn-primary btn-sm px-3">
                <i class="bi bi-search me-1"></i>검색
              </button>
              <a th:href="@{/admin/employees}" class="btn btn-outline-secondary btn-sm px-3">
                <i class="bi bi-arrow-counterclockwise me-1"></i>초기화
              </a>
            </div>
          </form>
        </div>
      </div>

      <!-- 테이블 카드 -->
      <div class="table-card card">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
            <tr>
              <th>이름</th>
              <th>이메일</th>
              <th>팀</th>
              <th>직급</th>
              <th>권한</th>
              <th>상태</th>
              <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="emp : ${employees}"
                th:classappend="${emp.status.name() == 'DISABLED'} ? 'opacity-60'">
              <td>
                <div class="d-flex align-items-center gap-2">
                  <span class="avatar-circle"
                        th:text="${#strings.substring(emp.name, 0, 1)}">A</span>
                  <span class="fw-semibold" th:text="${emp.name}"></span>
                </div>
              </td>
              <td class="text-muted small align-middle" th:text="${emp.email}"></td>
              <td class="align-middle" th:text="${emp.team != null ? emp.team.name : '-'}"></td>
              <td class="align-middle" th:text="${emp.position != null ? emp.position.displayName : '-'}"></td>
              <td class="align-middle">
                <span class="badge rounded-pill"
                      th:text="${emp.role.displayName}"
                      th:classappend="${emp.role.name() == 'ADMIN'} ? 'badge-role-admin' : (${emp.role.name() == 'SALES'} ? 'badge-role-sales' : 'badge-role-emp')">
                </span>
              </td>
              <td class="align-middle">
                <span class="badge rounded-pill"
                      th:text="${emp.status.name() == 'ACTIVE'} ? '활성' : '비활성'"
                      th:classappend="${emp.status.name() == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'">
                </span>
              </td>
              <td class="text-nowrap align-middle">
                <a th:href="@{/admin/employees/{id}(id=${emp.id})}"
                   class="btn btn-outline-primary btn-sm">
                  <i class="bi bi-eye me-1"></i>상세
                </a>
                <form th:if="${emp.role.name() != 'ADMIN'}" method="post"
                      th:action="@{/admin/employees/{id}/toggle-status(id=${emp.id})}"
                      class="d-inline">
                  <button type="submit" class="btn btn-sm ms-1"
                          th:classappend="${emp.status.name() == 'ACTIVE'} ? 'btn-outline-danger' : 'btn-outline-success'"
                          th:text="${emp.status.name() == 'ACTIVE'} ? '비활성화' : '활성화'"
                          th:attr="data-name=${emp.name},data-active=${emp.status.name() == 'ACTIVE'}"
                          onclick="if(this.dataset.active==='true' && !confirm(this.dataset.name+' 계정을 비활성화하시겠습니까?')) return false;"></button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(employees)}">
              <td colspan="7" class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-2 d-block mb-2 opacity-40"></i>
                조건에 맞는 직원이 없습니다.
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 페이지네이션 -->
      <nav th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
          <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/employees(page=${currentPage - 1},q=${q},position=${position},role=${role},teamId=${teamId})}">
              <i class="bi bi-chevron-left"></i>
            </a>
          </li>
          <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
              th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link"
               th:href="@{/admin/employees(page=${i},q=${q},position=${position},role=${role},teamId=${teamId})}"
               th:text="${i + 1}"></a>
          </li>
          <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/employees(page=${currentPage + 1},q=${q},position=${position},role=${role},teamId=${teamId})}">
              <i class="bi bi-chevron-right"></i>
            </a>
          </li>
        </ul>
      </nav>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
