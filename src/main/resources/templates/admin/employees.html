<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">대시보드</a>
            <a th:href="@{/admin/users/pending}" class="btn btn-outline-warning btn-sm">승인 대기</a>
            <a th:href="@{/admin/teams}" class="btn btn-outline-light btn-sm">팀 관리</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">직원 목록 (활성)</h2>

    <table class="table table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>이름</th><th>이메일</th><th>팀</th><th>직급</th><th>권한</th><th>개인 폴더</th><th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.email}"></td>
            <td th:text="${emp.team != null ? emp.team.name : '-'}"></td>
            <td th:text="${emp.position != null ? emp.position : '-'}"></td>
            <td>
                <span th:switch="${emp.role.name()}">
                    <span th:case="'ADMIN'" class="badge bg-danger">관리자</span>
                    <span th:case="'TEAM_LEADER'" class="badge bg-warning text-dark">팀장</span>
                    <span th:case="*" class="badge bg-secondary">직원</span>
                </span>
            </td>
            <td>
                <span th:if="${emp.status.name() == 'ACTIVE'}" class="text-success">&#10003;</span>
            </td>
            <td>
                <a th:href="@{/admin/employees/{id}(id=${emp.id})}"
                   class="btn btn-outline-primary btn-sm">상세</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(employees)}">
            <td colspan="7" class="text-center text-muted">활성 직원이 없습니다.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
