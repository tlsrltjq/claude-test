<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title">직원 목록</h1>
          <p class="page-hd-sub">계정·권한·상태를 관리합니다</p>
        </div>
        <div class="page-hd-actions">
          <span class="badge rounded-pill bg-secondary px-3 py-2" style="font-size:.85rem;">
            총 <span th:text="${totalCount}">0</span>명
          </span>
        </div>
      </div>

      <!-- 필터 바 -->
      <div class="filter-bar mb-3">
        <form method="get" th:action="@{/admin/employees}" class="d-contents" style="display:contents">
          <input type="hidden" name="sort"      th:value="${sort}">
          <input type="hidden" name="direction" th:value="${direction}">
          <input type="hidden" name="page"      value="0">
          <i class="bi bi-funnel text-muted" style="flex-shrink:0"></i>
          <div class="input-group input-group-sm" style="width:220px;flex-shrink:0">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" name="q" class="form-control border-start-0"
                   placeholder="이름 또는 이메일" th:value="${q}">
          </div>
          <select name="position" class="form-select form-select-sm" style="width:auto;min-width:100px">
            <option value="">전체 직급</option>
            <option th:each="pos : ${positions}"
                    th:value="${pos.name()}"
                    th:text="${pos.displayName}"
                    th:selected="${pos.name() == position}"></option>
          </select>
          <select name="role" class="form-select form-select-sm" style="width:auto;min-width:100px">
            <option value="">전체 권한</option>
            <option th:each="r : ${roles}"
                    th:value="${r.name()}"
                    th:text="${r.displayName}"
                    th:selected="${r.name() == role}"></option>
          </select>
          <select name="teamId" class="form-select form-select-sm" style="width:auto;min-width:100px">
            <option value="">전체 팀</option>
            <option th:each="team : ${teams}"
                    th:value="${team.id}"
                    th:text="${team.name}"
                    th:selected="${teamId != null and teamId == team.id}"></option>
          </select>
          <button type="submit" class="btn btn-primary btn-sm fw-semibold px-3">검색</button>
          <a th:href="@{/admin/employees}" class="btn btn-outline-secondary btn-sm">초기화</a>
        </form>
      </div>

      <!-- 테이블 카드 -->
      <div class="members-card">
        <div class="table-responsive">
          <table class="table members-table">
            <thead>
            <tr>
              <th>
                <a th:href="@{/admin/employees(q=${q},position=${position},role=${role},teamId=${teamId},sort='name',direction=${sort=='name' and direction=='asc'?'desc':'asc'},page=0)}"
                   th:classappend="${sort=='name'} ? 'sort-btn active' : 'sort-btn'">
                  이름
                  <i th:if="${sort=='name' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='name' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='name'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <th><span class="sort-btn" style="cursor:default">이메일</span></th>
              <th>
                <a th:href="@{/admin/employees(q=${q},position=${position},role=${role},teamId=${teamId},sort='team',direction=${sort=='team' and direction=='asc'?'desc':'asc'},page=0)}"
                   th:classappend="${sort=='team'} ? 'sort-btn active' : 'sort-btn'">
                  팀
                  <i th:if="${sort=='team' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='team' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='team'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <th>
                <a th:href="@{/admin/employees(q=${q},position=${position},role=${role},teamId=${teamId},sort='position',direction=${sort=='position' and direction=='asc'?'desc':'asc'},page=0)}"
                   th:classappend="${sort=='position'} ? 'sort-btn active' : 'sort-btn'">
                  직급
                  <i th:if="${sort=='position' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='position' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='position'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <th>
                <a th:href="@{/admin/employees(q=${q},position=${position},role=${role},teamId=${teamId},sort='role',direction=${sort=='role' and direction=='asc'?'desc':'asc'},page=0)}"
                   th:classappend="${sort=='role'} ? 'sort-btn active' : 'sort-btn'">
                  권한
                  <i th:if="${sort=='role' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='role' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='role'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <th>
                <a th:href="@{/admin/employees(q=${q},position=${position},role=${role},teamId=${teamId},sort='status',direction=${sort=='status' and direction=='asc'?'desc':'asc'},page=0)}"
                   th:classappend="${sort=='status'} ? 'sort-btn active' : 'sort-btn'">
                  상태
                  <i th:if="${sort=='status' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='status' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='status'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="emp : ${employees}"
                th:classappend="${emp.status.name() == 'DISABLED'} ? 'opacity-60'">
              <td class="member-name" th:text="${emp.name}"></td>
              <td class="member-email" th:text="${emp.email}"></td>
              <td>
                <span th:if="${emp.team != null}"
                      class="badge rounded-pill"
                      style="background:#e7f0ff;color:#1d4ed8;font-size:.72rem"
                      th:text="${emp.team.name}"></span>
                <span th:if="${emp.team == null}" class="text-muted">-</span>
              </td>
              <td style="color:#495057;font-size:.82rem"
                  th:text="${emp.position != null ? emp.position.displayName : '-'}"></td>
              <td>
                <span class="badge"
                      th:classappend="${emp.role.name() == 'ADMIN'} ? 'badge-admin' : (${emp.role.name() == 'SALES'} ? 'badge-sales' : 'badge-emp')"
                      th:text="${emp.role.displayName}"
                      style="font-size:.7rem;padding:.22rem .5rem;border-radius:6px"></span>
              </td>
              <td>
                <span class="badge rounded-pill"
                      th:text="${emp.status.name() == 'ACTIVE'} ? '활성' : '비활성'"
                      th:classappend="${emp.status.name() == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'">
                </span>
              </td>
              <td>
                <div class="d-flex gap-1">
                  <a th:href="@{/admin/employees/{id}(id=${emp.id})}"
                     class="btn btn-sm btn-outline-primary" style="font-size:.75rem;border-radius:6px;padding:.2rem .55rem">
                    <i class="bi bi-eye me-1"></i>상세
                  </a>
                  <form th:if="${emp.role.name() != 'ADMIN'}" method="post"
                        th:action="@{/admin/employees/{id}/toggle-status(id=${emp.id})}"
                        class="d-inline">
                    <button type="submit"
                            class="btn btn-sm toggle-status-btn"
                            style="font-size:.75rem;border-radius:6px;padding:.2rem .55rem;min-width:4.5rem"
                            th:classappend="${emp.status.name() == 'ACTIVE'} ? 'btn-outline-danger' : 'btn-outline-success'"
                            th:text="${emp.status.name() == 'ACTIVE'} ? '비활성화' : '활성화'"
                            th:attr="data-name=${emp.name},data-active=${emp.status.name() == 'ACTIVE'}"></button>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(employees)}">
              <td colspan="7" class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-2 d-block mb-2 opacity-40"></i>
                조건에 맞는 직원이 없습니다.
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <!-- 페이지네이션 -->
        <div th:if="${totalPages > 1}"
             class="d-flex justify-content-center align-items-center gap-1 py-3"
             style="border-top:1px solid #f0f1f3">
          <a th:if="${currentPage > 0}"
             th:href="@{/admin/employees(q=${q},position=${position},role=${role},teamId=${teamId},sort=${sort},direction=${direction},page=${currentPage-1})}"
             class="btn btn-outline-secondary btn-sm" style="border-radius:6px;padding:.28rem .65rem">
            <i class="bi bi-chevron-left"></i>
          </a>
          <span th:if="${currentPage == 0}" class="btn btn-outline-secondary btn-sm disabled"
                style="border-radius:6px;padding:.28rem .65rem;opacity:.4">
            <i class="bi bi-chevron-left"></i>
          </span>
          <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:if="${i != currentPage}"
               th:href="@{/admin/employees(q=${q},position=${position},role=${role},teamId=${teamId},sort=${sort},direction=${direction},page=${i})}"
               th:text="${i + 1}"
               class="btn btn-outline-secondary btn-sm"
               style="border-radius:6px;min-width:34px;padding:.28rem .4rem"></a>
            <span th:if="${i == currentPage}" th:text="${i + 1}"
                  class="btn btn-primary btn-sm"
                  style="border-radius:6px;min-width:34px;padding:.28rem .4rem"></span>
          </th:block>
          <a th:if="${currentPage < totalPages - 1}"
             th:href="@{/admin/employees(q=${q},position=${position},role=${role},teamId=${teamId},sort=${sort},direction=${direction},page=${currentPage+1})}"
             class="btn btn-outline-secondary btn-sm" style="border-radius:6px;padding:.28rem .65rem">
            <i class="bi bi-chevron-right"></i>
          </a>
          <span th:if="${currentPage == totalPages - 1}" class="btn btn-outline-secondary btn-sm disabled"
                style="border-radius:6px;padding:.28rem .65rem;opacity:.4">
            <i class="bi bi-chevron-right"></i>
          </span>
        </div>
      </div>


    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script th:attr="nonce=${cspNonce}">
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();

document.querySelectorAll('.toggle-status-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
        if (this.dataset.active === 'true' && !confirm(this.dataset.name + ' 계정을 비활성화하시겠습니까?')) e.preventDefault();
    });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
