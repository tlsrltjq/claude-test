<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">대시보드</a>
            <a th:href="@{/admin/teams}" class="btn btn-outline-light btn-sm">팀 관리</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">직원 목록</h2>
        <small class="text-muted" th:text="'총 ' + ${totalCount} + '명'"></small>
    </div>

    <!-- 검색 폼 -->
    <form method="get" th:action="@{/admin/employees}" class="row g-2 mb-3 align-items-center">
        <div class="col-sm-3">
            <input type="text" name="q" class="form-control form-control-sm"
                   placeholder="이름 또는 이메일" th:value="${q}">
        </div>
        <div class="col-auto">
            <select name="position" class="form-select form-select-sm">
                <option value="">전체 직급</option>
                <option th:each="pos : ${positions}"
                        th:value="${pos.name()}"
                        th:text="${pos.displayName}"
                        th:selected="${pos.name() == position}"></option>
            </select>
        </div>
        <div class="col-auto">
            <select name="role" class="form-select form-select-sm">
                <option value="">전체 권한</option>
                <option th:each="r : ${roles}"
                        th:value="${r.name()}"
                        th:text="${r.displayName}"
                        th:selected="${r.name() == role}"></option>
            </select>
        </div>
        <div class="col-auto">
            <select name="teamId" class="form-select form-select-sm">
                <option value="">전체 팀</option>
                <option th:each="team : ${teams}"
                        th:value="${team.id}"
                        th:text="${team.name}"
                        th:selected="${teamId != null and teamId == team.id}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm">검색</button>
            <a th:href="@{/admin/employees}" class="btn btn-outline-secondary btn-sm ms-1">초기화</a>
        </div>
    </form>

    <table class="table table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>이름</th><th>이메일</th><th>팀</th><th>직급</th><th>권한</th><th>상태</th><th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${employees}"
            th:classappend="${emp.status.name() == 'DISABLED'} ? 'table-secondary text-muted'">
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.email}"></td>
            <td th:text="${emp.team != null ? emp.team.name : '-'}"></td>
            <td th:text="${emp.position != null ? emp.position.displayName : '-'}"></td>
            <td>
                <span th:text="${emp.role.displayName}"
                      th:classappend="${emp.role.name() == 'ADMIN'} ? 'bg-danger' : (${emp.role.name() == 'SALES'} ? 'bg-primary' : 'bg-secondary')"
                      class="badge"></span>
            </td>
            <td>
                <span th:text="${emp.status.name() == 'ACTIVE'} ? '활성' : '비활성'"
                      th:classappend="${emp.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                      class="badge"></span>
            </td>
            <td class="text-nowrap">
                <a th:href="@{/admin/employees/{id}(id=${emp.id})}"
                   class="btn btn-outline-primary btn-sm">상세</a>
                <form th:if="${emp.role.name() != 'ADMIN'}" method="post"
                      th:action="@{/admin/employees/{id}/toggle-status(id=${emp.id})}"
                      class="d-inline">
                    <button type="submit" class="btn btn-sm ms-1"
                            th:classappend="${emp.status.name() == 'ACTIVE'} ? 'btn-outline-danger' : 'btn-outline-success'"
                            th:text="${emp.status.name() == 'ACTIVE'} ? '비활성화' : '활성화'"
                            th:attr="data-name=${emp.name},data-active=${emp.status.name() == 'ACTIVE'}"
                            onclick="if(this.dataset.active==='true' && !confirm(this.dataset.name+' 계정을 비활성화하시겠습니까?')) return false;"></button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(employees)}">
            <td colspan="7" class="text-center text-muted">조건에 맞는 직원이 없습니다.</td>
        </tr>
        </tbody>
    </table>
    <!-- 페이지네이션 -->
    <nav th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/employees(page=${currentPage - 1},q=${q},position=${position},role=${role},teamId=${teamId})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/employees(page=${i},q=${q},position=${position},role=${role},teamId=${teamId})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/employees(page=${currentPage + 1},q=${q},position=${position},role=${role},teamId=${teamId})}">다음</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
