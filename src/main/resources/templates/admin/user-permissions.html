<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권한 관리 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto">
            <a th:href="@{/admin/employees/{id}(id=${user.id})}" class="btn btn-outline-light btn-sm">← 직원 상세</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-1">권한 관리</h2>
    <p class="text-muted mb-4" th:text="${user.name + ' (' + user.email + ') — ' + user.role}"></p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <h5>현재 부여된 권한</h5>
    <div th:if="${#lists.isEmpty(permissions)}" class="alert alert-info mb-4">부여된 권한이 없습니다.</div>
    <table th:if="${!#lists.isEmpty(permissions)}" class="table table-bordered mb-4">
        <thead class="table-dark">
        <tr>
            <th>권한 종류</th>
            <th>대상 폴더 ID</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="perm : ${permissions}">
            <td th:text="${perm.permissionType}"></td>
            <td th:text="${perm.targetId}"></td>
            <td>
                <form th:action="@{/admin/users/{id}/permissions/revoke(id=${user.id})}" method="post" class="d-inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <input type="hidden" name="folderId" th:value="${perm.targetId}">
                    <button type="submit" class="btn btn-outline-danger btn-sm"
                            onclick="return confirm('권한을 회수하시겠습니까?')">회수</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <h5>폴더 접근 권한 부여</h5>
    <div th:if="${#lists.isEmpty(grantableFolders)}" class="alert alert-info">부여 가능한 폴더가 없습니다.</div>
    <form th:if="${!#lists.isEmpty(grantableFolders)}"
          th:action="@{/admin/users/{id}/permissions/grant(id=${user.id})}" method="post">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
        <div class="input-group" style="max-width: 400px;">
            <select name="folderId" class="form-select">
                <option th:each="folder : ${grantableFolders}"
                        th:value="${folder.id}"
                        th:text="${folder.folderName + ' (소유자: ' + folder.owner.name + ')'}"></option>
            </select>
            <button type="submit" class="btn btn-primary">부여</button>
        </div>
    </form>
</div>
</body>
</html>
