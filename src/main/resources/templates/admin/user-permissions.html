<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권한 관리 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); padding: .6rem 1rem; }
        .topnav .navbar-brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.35); color: #fff; font-size: .8rem; }
        .btn-nav:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.6); color: #fff; }
        .page-header { background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); border-radius: 14px; padding: 1.4rem 1.75rem; color: #fff; margin-bottom: 1.5rem; }
        .page-header h4 { font-weight: 700; margin-bottom: .2rem; }
        .page-header p { margin: 0; opacity: .75; font-size: .9rem; }
        .perm-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; height: 100%; }
        .perm-card .card-header-custom { background: #1e3a5f; color: #fff; padding: .9rem 1.25rem; font-weight: 600; font-size: .9rem; }
        .perm-card .card-body { padding: 1.25rem; }
        .perm-row { display: flex; align-items: center; justify-content: space-between; gap: .75rem; padding: .6rem 0; border-bottom: 1px solid #f0f2f5; font-size: .85rem; }
        .perm-row:last-child { border-bottom: none; }
        .empty-state { text-align: center; padding: 2rem 1rem; color: #9ca3af; }
        .empty-state .bi { font-size: 2rem; display: block; margin-bottom: .5rem; opacity: .4; }
        .empty-state p { margin: 0; font-size: .85rem; }
    </style>
</head>
<body>
<nav class="topnav navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin}">
            <i class="bi bi-shield-fill me-1"></i>eActive Hub
            <span class="badge bg-warning text-dark ms-1" style="font-size:.65rem">ADMIN</span>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin/employees/{id}(id=${user.id})}" class="btn btn-nav btn-sm">
                <i class="bi bi-arrow-left me-1"></i>직원 상세
            </a>
            <a th:href="@{/admin}" class="btn btn-nav btn-sm">
                <i class="bi bi-speedometer2 me-1"></i>대시보드
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="page-header">
        <h4><i class="bi bi-key me-2"></i>권한 관리</h4>
        <p th:text="${user.name} + ' (' + ${user.email} + ') — ' + ${user.role.displayName}"></p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- 현재 권한 -->
        <div class="col-md-6">
            <div class="perm-card">
                <div class="card-header-custom"><i class="bi bi-list-check me-2"></i>현재 폴더 접근 권한</div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(permissions)}" class="empty-state">
                        <i class="bi bi-folder-x"></i>
                        <p>부여된 권한이 없습니다.</p>
                    </div>
                    <div th:if="${!#lists.isEmpty(permissions)}">
                        <div th:each="perm : ${permissions}" class="perm-row">
                            <div>
                                <span class="fw-semibold small">폴더 ID: </span>
                                <span class="badge bg-secondary rounded-pill" th:text="${perm.targetId}"></span>
                            </div>
                            <form th:action="@{/admin/users/{id}/permissions/revoke(id=${user.id})}"
                                  method="post" class="d-inline">
                                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                                <input type="hidden" name="folderId" th:value="${perm.targetId}">
                                <button type="submit" class="btn btn-outline-danger btn-sm py-0 px-2"
                                        onclick="return confirm('권한을 회수하시겠습니까?')">
                                    <i class="bi bi-trash me-1"></i>회수
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 권한 부여 -->
        <div class="col-md-6">
            <div class="perm-card">
                <div class="card-header-custom"><i class="bi bi-plus-circle me-2"></i>폴더 접근 권한 부여</div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(grantableFolders)}" class="empty-state">
                        <i class="bi bi-folder-check"></i>
                        <p>부여 가능한 폴더가 없습니다.</p>
                    </div>
                    <form th:if="${!#lists.isEmpty(grantableFolders)}"
                          th:action="@{/admin/users/{id}/permissions/grant(id=${user.id})}"
                          method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                        <label class="form-label small fw-semibold text-muted">폴더 선택</label>
                        <select name="folderId" class="form-select mb-3">
                            <option th:each="folder : ${grantableFolders}"
                                    th:value="${folder.id}"
                                    th:text="${folder.folderName + ' (' + folder.owner.name + ')'}"></option>
                        </select>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-plus-lg me-1"></i>권한 부여
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
