<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 상세 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto">
            <a th:href="@{/admin/employees}" class="btn btn-outline-light btn-sm">← 직원 목록</a>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width:640px;">
    <h2 class="mb-4">직원 상세</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <table class="table table-sm mb-0">
                <tr><th class="text-muted fw-normal" style="width:130px;">이름</th><td th:text="${user.name}"></td></tr>
                <tr><th class="text-muted fw-normal">이메일</th><td th:text="${user.email}"></td></tr>
                <tr><th class="text-muted fw-normal">팀</th><td th:text="${user.team != null ? user.team.name : '-'}"></td></tr>
                <tr><th class="text-muted fw-normal">직급</th><td th:text="${user.position != null ? user.position : '-'}"></td></tr>
                <tr>
                    <th class="text-muted fw-normal">권한</th>
                    <td>
                        <span th:switch="${user.role.name()}">
                            <span th:case="'ADMIN'" class="badge bg-danger">관리자</span>
                            <span th:case="'SALES'" class="badge bg-primary">영업부</span>
                            <span th:case="*" class="badge bg-secondary">직원</span>
                        </span>
                    </td>
                </tr>
                <tr>
                    <th class="text-muted fw-normal">계정 상태</th>
                    <td><span class="badge bg-success" th:text="${user.status}"></span></td>
                </tr>
                <tr>
                    <th class="text-muted fw-normal">이메일 인증</th>
                    <td th:text="${user.emailVerified ? '완료' : '미완료'}"></td>
                </tr>
                <tr>
                    <th class="text-muted fw-normal">개인 폴더</th>
                    <td th:text="${hasFolder ? '생성됨' : '없음'}"></td>
                </tr>
                <tr>
                    <th class="text-muted fw-normal">가입일</th>
                    <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
            </table>
        </div>
    </div>

    <div class="d-flex gap-2 mb-3">
        <a th:href="@{/admin/employees/{id}/documents(id=${user.id})}"
           class="btn btn-outline-secondary btn-sm">문서 목록 보기</a>
        <a th:href="@{/admin/users/{id}/role(id=${user.id})}"
           class="btn btn-outline-warning btn-sm">역할 변경</a>
        <a th:href="@{/admin/users/{id}/permissions(id=${user.id})}"
           class="btn btn-outline-info btn-sm">권한 관리</a>
    </div>

    <div class="card">

        <div class="card-header fw-bold">팀 변경</div>
        <div class="card-body">
            <form th:action="@{/admin/employees/{id}/change-team(id=${user.id})}" method="post"
                  class="d-flex gap-2 align-items-center">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <select name="teamId" class="form-select">
                    <option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}"
                            th:selected="${user.team != null and user.team.id == t.id}"></option>
                </select>
                <button type="submit" class="btn btn-primary text-nowrap">변경</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
