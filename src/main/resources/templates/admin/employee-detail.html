<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${user.name} + ' — 직원 상세'">직원 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
      /* 문서 목록 테이블 — 썸네일을 카드 뷰 크기(140px)에서 행 높이에 맞게 축소 */
      #docTable .doc-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; display: block; }
      #docTable .doc-icon  { width: 36px; height: 36px; font-size: .58rem; }
    </style>
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- 직원 헤더 -->
      <div class="emp-header d-flex align-items-center gap-3 flex-wrap">
        <div class="emp-avatar" th:text="${#strings.substring(user.name, 0, 1)}">홍</div>
        <div class="flex-grow-1 min-w-0">
          <div class="emp-name" th:text="${user.name}"></div>
          <div class="emp-email" th:text="${user.email}"></div>
        </div>
        <div class="d-flex gap-2 align-items-center flex-wrap">
          <span class="badge rounded-pill px-2 py-1"
                th:classappend="${user.role.name() == 'ADMIN'} ? 'badge-role-admin' : (${user.role.name() == 'SALES'} ? 'badge-role-sales' : 'badge-role-emp')"
                th:text="${user.role.displayName}" style="font-size:.78rem;"></span>
          <span class="badge rounded-pill px-2 py-1"
                th:classappend="${user.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                th:text="${user.status.name() == 'ACTIVE'} ? '활성' : '비활성'" style="font-size:.78rem;"></span>
        </div>
      </div>

      <!-- 탭 -->
      <ul class="nav nav-tabs-custom">
        <li class="nav-item">
          <a class="nav-link" th:classappend="${activeTab == 'info'} ? 'active'"
             th:href="@{/admin/employees/{id}(id=${user.id},tab='info')}">
            <i class="bi bi-person-circle me-1"></i>기본 정보
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${activeTab == 'documents'} ? 'active'"
             th:href="@{/admin/employees/{id}(id=${user.id},tab='documents')}">
            <i class="bi bi-folder me-1"></i>문서
            <span th:if="${documents != null and !#lists.isEmpty(documents)}"
                  class="badge bg-secondary rounded-pill ms-1" th:text="${#lists.size(documents)}"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${activeTab == 'role'} ? 'active'"
             th:href="@{/admin/employees/{id}(id=${user.id},tab='role')}">
            <i class="bi bi-person-gear me-1"></i>역할 변경
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${activeTab == 'position'} ? 'active'"
             th:href="@{/admin/employees/{id}(id=${user.id},tab='position')}">
            <i class="bi bi-person-badge me-1"></i>직급 변경
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:classappend="${activeTab == 'team'} ? 'active'"
             th:href="@{/admin/employees/{id}(id=${user.id},tab='team')}">
            <i class="bi bi-people me-1"></i>팀 변경
          </a>
        </li>
      </ul>

      <!-- ══ 탭: 기본 정보 ══ -->
      <div th:if="${activeTab == 'info'}">
        <div class="tab-card">
          <div class="card-header-custom"><i class="bi bi-person-circle me-2"></i>기본 정보</div>
          <div class="card-body">
            <div class="info-row"><span class="info-label">이름</span><span class="info-val" th:text="${user.name}"></span></div>
            <div class="info-row"><span class="info-label">이메일</span><span class="info-val text-muted" th:text="${user.email}"></span></div>
            <div class="info-row"><span class="info-label">팀</span><span class="info-val" th:text="${user.team != null ? user.team.name : '-'}"></span></div>
            <div class="info-row"><span class="info-label">직급</span><span class="info-val" th:text="${user.position != null ? user.position.displayName : '-'}"></span></div>
            <div class="info-row"><span class="info-label">생년월일</span><span class="info-val" th:text="${user.birthDate != null ? #temporals.format(user.birthDate,'yyyy-MM-dd') : '-'}"></span></div>
            <div class="info-row"><span class="info-label">연락처</span><span class="info-val" th:text="${user.phone != null and !user.phone.isEmpty() ? user.phone : '-'}"></span></div>
            <div class="info-row"><span class="info-label">주소</span><span class="info-val" th:text="${user.address != null and !user.address.isEmpty() ? user.address : '-'}"></span></div>
            <div class="info-row">
              <span class="info-label">역할</span>
              <span class="info-val">
                <span th:text="${user.role.displayName}"
                      th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-danger' : (${user.role.name() == 'SALES'} ? 'bg-primary' : 'bg-secondary')"
                      class="badge rounded-pill"></span>
              </span>
            </div>
            <div class="info-row">
              <span class="info-label">계정 상태</span>
              <span class="info-val d-flex align-items-center gap-2">
                <span th:text="${user.status.name() == 'ACTIVE'} ? '활성' : '비활성'"
                      th:classappend="${user.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                      class="badge rounded-pill"></span>
                <form th:if="${user.role.name() != 'ADMIN'}" method="post"
                      th:action="@{/admin/employees/{id}/toggle-status(id=${user.id})}"
                      class="d-inline">
                  <button type="submit" class="btn btn-sm py-0 px-2" id="toggleStatusBtn"
                          th:classappend="${user.status.name() == 'ACTIVE'} ? 'btn-outline-danger' : 'btn-outline-success'"
                          th:text="${user.status.name() == 'ACTIVE'} ? '비활성화' : '활성화'"
                          th:attr="data-active=${user.status.name() == 'ACTIVE'}"></button>
                </form>
              </span>
            </div>
            <div class="info-row"><span class="info-label">가입일</span><span class="info-val text-muted" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></span></div>

            <!-- 삭제 (관리자 제외) -->
            <div th:if="${user.role.name() != 'ADMIN'}" class="mt-4 pt-3" style="border-top:1px solid #f5e5e5">
              <form th:action="@{/admin/employees/{id}/delete(id=${user.id})}" method="post" id="deleteAccountForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-sm btn-danger">
                  <i class="bi bi-trash me-1"></i>계정 완전 삭제
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- ══ 탭: 문서 목록 ══ -->
      <div th:if="${activeTab == 'documents'}">
        <div th:if="${documents == null or #lists.isEmpty(documents)}" class="tab-card">
          <div class="empty-state"><i class="bi bi-file-earmark-x"></i><p>업로드된 문서가 없습니다.</p></div>
        </div>
        <div th:if="${documents != null and !#lists.isEmpty(documents)}" class="tab-card">
          <div class="card-header-custom d-flex align-items-center justify-content-between">
            <span><i class="bi bi-folder-fill me-2"></i>문서 목록</span>
            <span class="badge bg-light text-secondary border" th:text="${#lists.size(documents)} + '건'"></span>
          </div>
          <div class="p-3">
            <div class="input-group input-group-sm mb-3" style="max-width:300px;">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
              <input type="text" id="docSearch" class="form-control border-start-0"
                     placeholder="제목 또는 파일명 검색">
            </div>
          </div>
          <div class="table-responsive">
            <table class="table members-table mb-0" id="docTable">
              <colgroup>
                <col style="width:52px">
                <col>
                <col style="width:90px">
                <col style="width:160px">
                <col style="width:52px">
                <col style="width:90px">
                <col style="width:100px">
                <col style="width:90px">
              </colgroup>
              <thead>
              <tr>
                <th></th>
                <th>제목</th>
                <th>종류</th>
                <th>파일명</th>
                <th>버전</th>
                <th>상태</th>
                <th>업로드일</th>
                <th></th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="doc : ${documents}"
                  th:with="cv=${doc.currentVersion}"
                  th:data-title="${doc.title.toLowerCase()}"
                  th:data-file="${cv != null ? cv.originalFileName.toLowerCase() : ''}">
                <td>
                  <a th:if="${cv != null and cv.previewSupported}" th:href="@{/documents/{id}/preview(id=${cv.id})}" target="_blank">
                    <img th:if="${cv.thumbnailStoragePath != null}"
                         th:src="@{/documents/{id}/thumbnail(id=${cv.id})}"
                         class="doc-thumb" alt=""
                         class="doc-thumb-img"
                    <span th:with="ext=${cv.thumbnailStoragePath != null ? '' : (cv.originalFileName.substring(cv.originalFileName.lastIndexOf('.')+1)).toLowerCase()}"
                          th:if="${cv.thumbnailStoragePath == null}"
                          th:class="'doc-icon ' + (${ext == 'pdf'} ? 'ext-pdf' : (${ext == 'jpg' or ext == 'jpeg' or ext == 'png'} ? 'ext-img' : (${ext == 'docx'} ? 'ext-word' : (${ext == 'hwp' or ext == 'hwpx'} ? 'ext-hwp' : 'ext-etc'))))"
                          th:text="${ext.toUpperCase()}"></span>
                  </a>
                </td>
                <td class="fw-semibold" style="font-size:.83rem;color:var(--tx1)" th:text="${doc.title}"></td>
                <td><span class="badge bg-secondary rounded-pill" style="font-size:.7rem" th:text="${doc.documentType.displayName}"></span></td>
                <td class="text-muted" style="font-size:.75rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                    th:text="${cv != null ? cv.originalFileName : '-'}"></td>
                <td class="text-muted" style="font-size:.75rem" th:text="${cv != null ? 'v' + cv.versionNo : '-'}"></td>
                <td>
                  <span th:if="${cv != null and cv.reviewStatus.name() == 'PENDING_REVIEW'}" class="badge rounded-pill" style="background:#fff3cd; color:#856404; border:1px solid #ffc107; font-size:.7rem;">검토 대기</span>
                  <span th:if="${cv != null and cv.reviewStatus.name() == 'APPROVED'}" class="badge bg-success rounded-pill" style="font-size:.7rem;">승인됨</span>
                  <span th:if="${cv != null and cv.reviewStatus.name() == 'REJECTED'}" class="badge bg-danger rounded-pill" style="font-size:.7rem;">반려됨</span>
                  <span th:if="${cv == null}" class="text-muted small">-</span>
                </td>
                <td class="text-muted" style="font-size:.75rem;white-space:nowrap"
                    th:text="${cv != null ? #temporals.format(cv.createdAt, 'yyyy-MM-dd') : '-'}"></td>
                <td>
                  <div class="d-flex gap-1">
                    <a th:if="${cv != null and cv.previewSupported}" th:href="@{/documents/{id}/preview(id=${cv.id})}"
                       target="_blank" class="btn btn-outline-secondary btn-sm py-0 px-2">
                      <i class="bi bi-eye"></i>
                    </a>
                    <a th:if="${cv != null}" th:href="@{/documents/{id}/download(id=${cv.id})}"
                       class="btn btn-outline-primary btn-sm py-0 px-2">
                      <i class="bi bi-download"></i>
                    </a>
                    <a th:href="@{/admin/employees/{uid}/documents/{did}(uid=${user.id},did=${doc.id})}"
                       class="btn btn-outline-secondary btn-sm py-0 px-2">
                      <i class="bi bi-info-circle"></i>
                    </a>
                  </div>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ══ 탭: 역할 변경 ══ -->
      <div th:if="${activeTab == 'role'}" style="max-width:500px;">
        <div class="tab-card">
          <div class="card-header-custom"><i class="bi bi-person-gear me-2"></i>역할 변경</div>
          <div class="card-body">
            <div class="alert alert-warning d-flex align-items-center gap-2 mb-3" style="font-size:.84rem;">
              <i class="bi bi-exclamation-triangle-fill"></i>역할 변경은 즉시 반영됩니다. ADMIN 권한은 신중하게 부여하세요.
            </div>
            <div class="mb-3">
              <div class="info-row"><span class="info-label">현재 역할</span>
                <span th:text="${user.role.displayName}"
                      th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-danger' : (${user.role.name() == 'SALES'} ? 'bg-primary' : 'bg-secondary')"
                      class="badge rounded-pill"></span>
              </div>
            </div>
            <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post">
              <input type="hidden" name="_csrf" th:value="${_csrf.token}">
              <div th:each="r : ${roles}" class="role-option" th:classappend="${user.role == r} ? 'selected'">
                <input class="form-check-input m-0" type="radio" name="role"
                       th:id="'role_' + ${r.name()}"
                       th:value="${r.name()}"
                       th:checked="${user.role == r}">
                <label th:for="'role_' + ${r.name()}" th:text="${r.displayName}" class="mb-0 fw-semibold" style="cursor:pointer; flex:1;"></label>
              </div>
              <button type="submit" class="btn btn-warning fw-semibold mt-3">
                <i class="bi bi-check-lg me-1"></i>역할 변경
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- ══ 탭: 직급 변경 ══ -->
      <div th:if="${activeTab == 'position'}" style="max-width:480px;">
        <div class="tab-card">
          <div class="card-header-custom"><i class="bi bi-person-badge me-2"></i>직급 변경</div>
          <div class="card-body">
            <div class="info-row mb-3">
              <span class="info-label">현재 직급</span>
              <strong th:text="${user.position != null ? user.position.displayName : '미설정'}"></strong>
            </div>
            <form th:action="@{/admin/employees/{id}/change-position(id=${user.id})}" method="post"
                  class="d-flex gap-2">
              <input type="hidden" name="_csrf" th:value="${_csrf.token}">
              <select name="position" class="form-select">
                <option th:each="pos : ${positions}"
                        th:value="${pos.name()}"
                        th:text="${pos.displayName}"
                        th:selected="${user.position != null and user.position.name() == pos.name()}"></option>
              </select>
              <button type="submit" class="btn btn-primary text-nowrap">
                <i class="bi bi-check-lg me-1"></i>변경
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- ══ 탭: 팀 변경 ══ -->
      <div th:if="${activeTab == 'team'}" style="max-width:480px;">
        <div class="tab-card">
          <div class="card-header-custom"><i class="bi bi-people me-2"></i>팀 변경</div>
          <div class="card-body">
            <div class="info-row mb-3">
              <span class="info-label">현재 팀</span>
              <strong th:text="${user.team != null ? user.team.name : '미배정'}"></strong>
            </div>
            <form th:action="@{/admin/employees/{id}/change-team(id=${user.id})}" method="post"
                  class="d-flex gap-2">
              <input type="hidden" name="_csrf" th:value="${_csrf.token}">
              <select name="teamId" class="form-select">
                <option th:each="t : ${teams}"
                        th:value="${t.id}"
                        th:text="${t.name}"
                        th:selected="${user.team != null and user.team.id == t.id}"></option>
              </select>
              <button type="submit" class="btn btn-primary text-nowrap">
                <i class="bi bi-check-lg me-1"></i>변경
              </button>
            </form>
          </div>
        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script th:attr="nonce=${cspNonce}">
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:attr="nonce=${cspNonce}">
function filterDocs(q) {
    const kw = q.toLowerCase();
    document.querySelectorAll('#docTable tbody tr').forEach(tr => {
        const title = tr.dataset.title || '';
        const file  = tr.dataset.file  || '';
        tr.style.display = (!kw || title.includes(kw) || file.includes(kw)) ? '' : 'none';
    });
}
document.querySelectorAll('.role-option').forEach(opt => {
    opt.addEventListener('click', function() {
        document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        const radio = this.querySelector('input[type=radio]');
        if (radio) radio.checked = true;
    });
});

var toggleBtn = document.getElementById('toggleStatusBtn');
if (toggleBtn) {
    toggleBtn.addEventListener('click', function(e) {
        if (this.dataset.active === 'true' && !confirm('이 계정을 비활성화하시겠습니까?')) e.preventDefault();
    });
}
var deleteAccountForm = document.getElementById('deleteAccountForm');
if (deleteAccountForm) {
    deleteAccountForm.addEventListener('submit', function(e) {
        if (!confirm('정말로 이 계정을 삭제하시겠습니까?\n삭제된 계정은 복구할 수 없습니다.')) e.preventDefault();
    });
}
var docSearch = document.getElementById('docSearch');
if (docSearch) docSearch.addEventListener('input', function() { filterDocs(this.value); });
document.querySelectorAll('img.doc-thumb-img').forEach(function(img) {
    img.addEventListener('error', function() {
        this.style.display = 'none';
        this.nextElementSibling.style.display = 'inline-flex';
    });
});
</script>
</body>
</html>
