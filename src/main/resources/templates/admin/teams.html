<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 관리 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-diagram-3-fill me-2"></i>팀 관리</h1>
          <p class="page-hd-sub">총 <strong th:text="${#lists.size(teams)}">0</strong>개 팀</p>
        </div>
      </div>

      <!-- 플래시 메시지 -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible py-2 mb-3 rounded-3" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible py-2 mb-3 rounded-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="row g-4 align-items-start">

        <!-- ── 좌: 팀 추가 폼 ── -->
        <div class="col-12 col-lg-4">
          <div class="calc-card" style="position:sticky;top:1rem">
            <div class="calc-card-header">
              <span><i class="bi bi-plus-circle-fill"></i>새 팀 추가</span>
            </div>
            <div class="calc-card-body">
              <form th:action="@{/admin/teams}" th:object="${teamRequest}" method="post">
                <div class="mb-3">
                  <label class="field-label">팀 이름 <span class="text-danger">*</span></label>
                  <input type="text" th:field="*{name}" class="form-control form-control-sm"
                         th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                         placeholder="팀 이름을 입력하세요" required>
                  <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                  <label class="field-label">설명 <span class="text-muted fw-normal">(선택)</span></label>
                  <input type="text" th:field="*{description}" class="form-control form-control-sm"
                         placeholder="팀 설명을 입력하세요">
                </div>
                <button type="submit" class="btn btn-primary btn-sm w-100 fw-semibold">
                  <i class="bi bi-plus-lg me-1"></i>팀 추가
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- ── 우: 팀 목록 ── -->
        <div class="col-12 col-lg-8">

          <!-- 빈 상태 -->
          <div th:if="${#lists.isEmpty(teams)}" class="empty-state">
            <i class="bi bi-diagram-3"></i>
            <p>등록된 팀이 없습니다.<br><small class="text-muted">왼쪽 폼으로 첫 번째 팀을 추가해보세요.</small></p>
          </div>

          <!-- 목록 테이블 -->
          <div th:if="${!#lists.isEmpty(teams)}" class="members-card">
            <div class="table-responsive">
              <table class="table members-table mb-0">
                <thead>
                <tr>
                  <th>팀 이름</th>
                  <th>설명</th>
                  <th style="width:90px">생성일</th>
                  <th style="width:110px"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${teams}">
                  <td class="fw-semibold" style="color:var(--tx1)" th:text="${t.name}"></td>
                  <td class="text-muted" style="font-size:.82rem;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                      th:text="${t.description != null and !#strings.isEmpty(t.description) ? t.description : '-'}"></td>
                  <td class="text-muted" style="font-size:.8rem"
                      th:text="${#temporals.format(t.createdAt, 'yy.MM.dd')}"></td>
                  <td>
                    <div class="d-flex gap-1">
                      <a th:href="@{/admin/teams/{id}/edit(id=${t.id})}"
                         class="btn btn-sm btn-outline-primary"
                         style="font-size:.75rem;border-radius:6px;padding:.2rem .55rem">
                        <i class="bi bi-pencil me-1"></i>수정
                      </a>
                      <form th:action="@{/admin/teams/{id}/delete(id=${t.id})}" method="post"
                            class="d-inline" onsubmit="return confirm('팀을 삭제하시겠습니까?')">
                        <button type="submit"
                                class="btn btn-sm btn-outline-danger"
                                style="font-size:.75rem;border-radius:6px;padding:.2rem .55rem">
                          <i class="bi bi-trash"></i>
                        </button>
                      </form>
                    </div>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
