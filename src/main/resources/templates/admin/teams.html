<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 관리 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">대시보드</a>
            <a th:href="@{/admin/employees}" class="btn btn-outline-light btn-sm">직원 목록</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">팀 관리</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-bordered mb-4">
        <thead class="table-dark">
        <tr>
            <th>팀 이름</th><th>설명</th><th>생성일</th><th style="width:160px;">관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${teams}">
            <td th:text="${t.name}"></td>
            <td th:text="${t.description}"></td>
            <td th:text="${#temporals.format(t.createdAt, 'yyyy-MM-dd')}"></td>
            <td class="d-flex gap-1">
                <a th:href="@{/admin/teams/{id}/edit(id=${t.id})}"
                   class="btn btn-outline-primary btn-sm">수정</a>
                <form th:action="@{/admin/teams/{id}/delete(id=${t.id})}" method="post"
                      onsubmit="return confirm('삭제하시겠습니까?')">
                    <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="card">
        <div class="card-header fw-bold">새 팀 추가</div>
        <div class="card-body">
            <form th:action="@{/admin/teams}" th:object="${teamRequest}" method="post" class="row g-2">
                <div class="col-md-4">
                    <input type="text" th:field="*{name}" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           placeholder="팀 이름 *" required>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>
                <div class="col-md-6">
                    <input type="text" th:field="*{description}" class="form-control"
                           placeholder="설명 (선택)">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">추가</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
