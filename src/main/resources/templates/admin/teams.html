<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 관리 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
        }
        .btn-nav {
            border-color: rgba(255,255,255,.35);
            color: #fff;
            font-size: .8rem;
        }
        .btn-nav:hover {
            background: rgba(255,255,255,.12);
            border-color: rgba(255,255,255,.6);
            color: #fff;
        }
        .page-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
            border-radius: 14px;
            padding: 1.75rem 2rem;
            color: #fff;
            margin-bottom: 1.5rem;
        }
        .team-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            transition: transform .18s, box-shadow .18s;
        }
        .team-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,.12);
        }
        .team-icon-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #e8f4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #1e6ec8;
            flex-shrink: 0;
        }
        .add-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
        }
        .add-card .card-header {
            background: #1e3a5f;
            color: #fff;
            border-radius: 14px 14px 0 0 !important;
            font-weight: 600;
            border: none;
        }
        .empty-state {
            border: 2px dashed #dee2e6;
            border-radius: 14px;
            padding: 3rem;
            text-align: center;
            color: #adb5bd;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg topnav py-2">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-white" th:href="@{/admin}">
            <i class="bi bi-shield-fill me-1"></i>eActive Hub
            <span class="badge bg-warning text-dark ms-1" style="font-size:.65rem">ADMIN</span>
        </a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-speedometer2 me-1"></i>대시보드
            </a>
            <a th:href="@{/admin/employees}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-people me-1"></i>직원목록
            </a>
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-house me-1"></i>내화면
            </a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-nav btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- 플래시 메시지 -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 페이지 헤더 -->
    <div class="page-header d-flex align-items-center gap-3">
        <div style="width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;">
            <i class="bi bi-diagram-3-fill fs-4 text-white"></i>
        </div>
        <div>
            <h4 class="fw-bold mb-0">팀 관리</h4>
            <small class="opacity-75">팀 생성·수정·삭제를 관리합니다</small>
        </div>
    </div>

    <!-- 팀 카드 그리드 -->
    <div th:if="${not #lists.isEmpty(teams)}"
         class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3 mb-4">
        <div class="col" th:each="t : ${teams}">
            <div class="card team-card h-100">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="team-icon-circle">
                            <i class="bi bi-diagram-3-fill"></i>
                        </div>
                        <div class="flex-grow-1 min-w-0">
                            <h6 class="fw-bold mb-0 text-truncate" th:text="${t.name}"></h6>
                            <small class="text-muted">
                                <i class="bi bi-calendar3 me-1"></i>
                                <span th:text="${#temporals.format(t.createdAt, 'yyyy-MM-dd')}"></span>
                            </small>
                        </div>
                    </div>
                    <p class="text-muted small mb-3"
                       th:text="${t.description != null and !#strings.isEmpty(t.description) ? t.description : '설명 없음'}"
                       style="min-height:2.4em;"></p>
                    <div class="d-flex gap-2">
                        <a th:href="@{/admin/teams/{id}/edit(id=${t.id})}"
                           class="btn btn-outline-primary btn-sm flex-fill">
                            <i class="bi bi-pencil me-1"></i>수정
                        </a>
                        <form th:action="@{/admin/teams/{id}/delete(id=${t.id})}" method="post"
                              class="flex-fill"
                              onsubmit="return confirm('삭제하시겠습니까?')">
                            <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                                <i class="bi bi-trash me-1"></i>삭제
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 빈 상태 -->
    <div th:if="${#lists.isEmpty(teams)}" class="empty-state mb-4">
        <i class="bi bi-diagram-3 fs-1 d-block mb-3 opacity-40"></i>
        <p class="mb-0 fw-semibold">등록된 팀이 없습니다.</p>
        <small>아래 양식으로 첫 번째 팀을 추가해보세요.</small>
    </div>

    <!-- 새 팀 추가 카드 -->
    <div class="card add-card mb-5">
        <div class="card-header py-3">
            <i class="bi bi-plus-circle me-2"></i>새 팀 추가
        </div>
        <div class="card-body p-4">
            <form th:action="@{/admin/teams}" th:object="${teamRequest}" method="post">
                <div class="row g-3 align-items-start">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small text-muted">팀 이름 <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{name}" class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                               placeholder="팀 이름을 입력하세요" required>
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small text-muted">설명 (선택)</label>
                        <input type="text" th:field="*{description}" class="form-control"
                               placeholder="팀 설명을 입력하세요">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-semibold small text-muted d-none d-md-block">&nbsp;</label>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-plus-lg me-1"></i>추가
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
