<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 검토 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-file-earmark-text me-2"></i>문서 검토 목록</h1>
          <p class="page-hd-sub">검토 대기 중인 문서 버전 목록입니다.</p>
        </div>
        <div class="page-hd-actions">
          <span class="badge bg-warning text-dark px-3 py-2" style="border-radius:20px; font-size:.85rem;">
            <i class="bi bi-hourglass-split me-1"></i>
            검토 대기 <span th:text="${#lists.size(pendingVersions)}">0</span>건
          </span>
        </div>
      </div>

      <!-- 알림 -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-1"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- 빈 상태 -->
      <div th:if="${#lists.isEmpty(pendingVersions)}" class="table-card">
        <div class="empty-state">
          <i class="bi bi-file-earmark-check"></i>
          <p>검토 대기 중인 문서가 없습니다.</p>
        </div>
      </div>

      <!-- 테이블 -->
      <div th:if="${!#lists.isEmpty(pendingVersions)}" class="table-card">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
            <tr>
              <th>직원</th>
              <th>팀</th>
              <th>종류</th>
              <th>제목</th>
              <th>원본 파일명</th>
              <th>버전</th>
              <th>업로드일</th>
              <th>상태</th>
              <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${pendingVersions}">
              <td class="fw-semibold" th:text="${v.document.folder.owner.name}"></td>
              <td th:text="${v.document.folder.owner.team != null ? v.document.folder.owner.team.name : '-'}"></td>
              <td th:text="${v.document.documentType.displayName}"></td>
              <td th:text="${v.document.title}"></td>
              <td class="text-truncate" style="max-width:150px;" th:text="${v.originalFileName}"></td>
              <td>
                <span class="badge bg-secondary rounded-pill" th:text="'v' + ${v.versionNo}"></span>
              </td>
              <td class="text-muted text-nowrap"
                  th:text="${#temporals.format(v.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
              <td>
                <span class="badge rounded-pill px-2 py-1"
                      style="background:#fff3cd; color:#856404; border:1px solid #ffc107; font-size:.72rem;">
                  검토 대기
                </span>
              </td>
              <td>
                <a th:href="@{/admin/documents/review/{id}(id=${v.id})}"
                   class="btn btn-primary btn-sm">
                  <i class="bi bi-pencil-square me-1"></i>검토
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
