<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 검토 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto">
            <a th:href="@{/admin}" class="btn btn-outline-light btn-sm">← 대시보드</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-1">문서 검토 목록</h2>
    <p class="text-muted mb-4">검토 대기 중인 문서 버전 목록입니다.</p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(pendingVersions)}" class="alert alert-info">검토 대기 중인 문서가 없습니다.</div>

    <table th:if="${!#lists.isEmpty(pendingVersions)}" class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>직원</th>
            <th>팀</th>
            <th>종류</th>
            <th>제목</th>
            <th>원본 파일명</th>
            <th>버전</th>
            <th>업로드일</th>
            <th>상태</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="v : ${pendingVersions}">
            <td th:text="${v.document.folder.owner.name}"></td>
            <td th:text="${v.document.folder.owner.team != null ? v.document.folder.owner.team.name : '-'}"></td>
            <td>
                <span th:switch="${v.document.documentType.name()}">
                    <span th:case="'RESUME'">이력서</span>
                    <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                    <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                    <span th:case="'LICENSE'">자격증</span>
                    <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                    <span th:case="*">기타</span>
                </span>
            </td>
            <td th:text="${v.document.title}"></td>
            <td th:text="${v.originalFileName}" class="small text-truncate" style="max-width:150px;"></td>
            <td th:text="'v' + ${v.versionNo}"></td>
            <td th:text="${#temporals.format(v.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td><span class="badge bg-warning text-dark">검토 대기</span></td>
            <td>
                <a th:href="@{/admin/documents/review/{id}(id=${v.id})}"
                   class="btn btn-outline-primary btn-sm">검토</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
