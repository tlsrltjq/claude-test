<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 검토 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-file-earmark-check me-2"></i>문서 검토</h1>
          <p class="page-hd-sub">
            검토 대기
            <strong th:text="${#lists.size(pendingVersions)}">0</strong>건
          </p>
        </div>
      </div>

      <!-- 알림 -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible py-2 mb-3 rounded-3" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible py-2 mb-3 rounded-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- 빈 상태 -->
      <div th:if="${#lists.isEmpty(pendingVersions)}" class="empty-state">
        <i class="bi bi-file-earmark-check"></i>
        <p>검토 대기 중인 문서가 없습니다.</p>
      </div>

      <!-- 목록 -->
      <div th:if="${!#lists.isEmpty(pendingVersions)}" class="table-card">
        <div class="table-card-hd">
          <i class="bi bi-hourglass-split text-warning"></i>
          <span>검토 대기 문서</span>
          <span class="badge bg-warning text-dark ms-1"
                th:text="${#lists.size(pendingVersions)}">0</span>
        </div>
        <div class="table-responsive">
          <table class="table assign-table mb-0">
            <thead>
            <tr>
              <th style="width:38px"></th>
              <th>직원</th>
              <th style="width:120px">종류</th>
              <th>제목</th>
              <th style="width:160px">파일명</th>
              <th style="width:52px">버전</th>
              <th style="width:78px">업로드</th>
              <th style="width:110px"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${pendingVersions}"
                th:with="ext=${v.originalFileName != null ? v.originalFileName.substring(v.originalFileName.lastIndexOf('.')+1).toLowerCase() : 'etc'}">
              <td>
                <span th:class="'doc-list-icon ' + (${ext == 'pdf'} ? 'ext-pdf' : (${ext == 'jpg' or ext == 'jpeg' or ext == 'png'} ? 'ext-img' : (${ext == 'docx'} ? 'ext-word' : (${ext == 'hwp' or ext == 'hwpx'} ? 'ext-hwp' : 'ext-etc'))))"
                      th:text="${ext.toUpperCase()}"></span>
              </td>
              <td>
                <div class="fw-semibold" style="font-size:.85rem;color:var(--tx1)"
                     th:text="${v.document.folder.owner.name}"></div>
                <span th:if="${v.document.folder.owner.team != null}"
                      class="badge rounded-pill"
                      style="background:#e7f0ff;color:#1d4ed8;font-size:.68rem"
                      th:text="${v.document.folder.owner.team.name}"></span>
              </td>
              <td>
                <span class="badge bg-secondary doc-type-badge"
                      th:text="${v.document.documentType.displayName}"></span>
              </td>
              <td class="fw-semibold" style="color:var(--tx1);font-size:.85rem"
                  th:text="${v.document.title}"></td>
              <td class="text-muted"
                  style="font-size:.78rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                  th:text="${v.originalFileName}"></td>
              <td>
                <span class="badge bg-secondary rounded-pill" th:text="'v' + ${v.versionNo}"></span>
              </td>
              <td class="text-muted" style="font-size:.78rem;white-space:nowrap"
                  th:text="${#temporals.format(v.createdAt, 'yy.MM.dd')}"></td>
              <td>
                <div class="d-flex gap-1">
                  <a th:if="${v.previewSupported}"
                     th:href="@{/documents/{id}/preview(id=${v.id})}"
                     target="_blank"
                     class="btn btn-sm btn-outline-secondary"
                     style="font-size:.75rem;border-radius:6px;padding:.2rem .5rem"
                     title="미리보기">
                    <i class="bi bi-eye"></i>
                  </a>
                  <a th:href="@{/admin/documents/review/{id}(id=${v.id})}"
                     class="btn btn-sm btn-primary"
                     style="font-size:.75rem;border-radius:6px;padding:.2rem .55rem">
                    <i class="bi bi-pencil-square me-1"></i>검토
                  </a>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
