<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재직증명서 발급 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-file-earmark-person me-2"></i>재직증명서 발급</h1>
          <p class="page-hd-sub">직원을 선택해 DOCX · PDF 자동 생성</p>
        </div>
        <div class="page-hd-actions" th:if="${available}">
          <span class="badge rounded-pill bg-secondary px-3 py-2" style="font-size:.85rem">
            전체 <span th:text="${users.size()}">0</span>명
          </span>
        </div>
      </div>

      <!-- 서비스 미가동 -->
      <div th:if="${!available}"
           class="alert alert-warning d-flex align-items-center gap-3 rounded-3 mb-0" role="alert">
        <i class="bi bi-exclamation-triangle-fill fs-4 flex-shrink-0"></i>
        <div>
          <div class="fw-semibold mb-1">재직증명서 서비스에 연결할 수 없습니다.</div>
          <code style="font-size:.82rem">docker compose -f docker-compose.prod.yml up -d certificate</code>
        </div>
      </div>

      <!-- 발급 결과 -->
      <div th:if="${result != null}"
           class="alert alert-dismissible d-flex align-items-start gap-2 mb-3 rounded-3"
           th:classappend="${result.failed().isEmpty()} ? 'alert-success' : 'alert-warning'"
           role="alert">
        <i class="bi flex-shrink-0 mt-1"
           th:classappend="${result.failed().isEmpty()} ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
        <div>
          <span class="fw-semibold">발급 완료</span>
          <span class="ms-2">성공 <strong th:text="${result.success().size()}">0</strong>건</span>
          <span th:if="${!result.failed().isEmpty()}" class="ms-2 text-danger">
            / 미등록 <strong th:text="${result.failed().size()}">0</strong>건
            (<span th:text="${#strings.listJoin(result.failed(), ', ')}"></span>)
          </span>
        </div>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
      </div>

      <!-- 메인 레이아웃 -->
      <div th:if="${available}" class="row g-4 align-items-start">

        <!-- ── 좌: 직원 선택 ── -->
        <div class="col-12 col-lg-5">
          <div class="calc-card" style="position:sticky;top:1rem">
            <div class="calc-card-header">
              <span><i class="bi bi-person-check-fill"></i>직원 선택</span>
              <span class="badge bg-primary rounded-pill" id="selBadge"
                    style="font-size:.72rem;min-width:60px;text-align:center">0명 선택</span>
            </div>
            <div class="calc-card-body">

              <div th:if="${users.isEmpty()}" class="text-center text-muted py-4" style="font-size:.88rem">
                <i class="bi bi-inbox d-block mb-1" style="font-size:1.6rem;opacity:.35"></i>
                등록된 직원이 없습니다.
              </div>

              <form th:unless="${users.isEmpty()}"
                    th:action="@{/admin/certificate/generate}" method="post" id="certForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- 이름 검색 -->
                <div class="input-group input-group-sm mb-2">
                  <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-search text-muted"></i>
                  </span>
                  <input type="text" id="empSearch" class="form-control border-start-0"
                         placeholder="이름으로 검색" oninput="filterEmps(this.value)" autocomplete="off">
                </div>

                <!-- 전체 선택 토글 -->
                <div class="d-flex align-items-center justify-content-between mb-2 px-1">
                  <label class="d-flex align-items-center gap-2 mb-0 user-select-none"
                         style="cursor:pointer;font-size:.83rem">
                    <input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)">
                    전체 선택
                  </label>
                  <span class="text-muted" id="filteredLabel" style="font-size:.78rem">총 0명</span>
                </div>

                <!-- 직원 체크리스트 -->
                <div id="empList"
                     style="max-height:300px;overflow-y:auto;border:1px solid #e9ecef;border-radius:8px">
                  <label th:each="u : ${users}"
                         class="emp-item d-flex align-items-center gap-2 px-3 mb-0"
                         style="height:36px;cursor:pointer;font-size:.85rem;border-bottom:1px solid #f5f5f5">
                    <input type="checkbox" name="names" th:value="${u}"
                           class="emp-check" onchange="syncSelectAll();updateCount()">
                    <span class="emp-name" th:text="${u}"></span>
                  </label>
                  <div id="emptySearch" class="text-center text-muted py-3"
                       style="display:none;font-size:.83rem">검색 결과 없음</div>
                </div>

                <!-- 발급 버튼 -->
                <button type="submit" class="btn btn-primary btn-sm w-100 fw-semibold mt-3"
                        id="submitBtn" disabled>
                  <i class="bi bi-file-earmark-arrow-down me-1"></i>
                  <span id="submitLabel">직원을 선택하세요</span>
                </button>
              </form>

            </div>
          </div>
        </div>

        <!-- ── 우: 발급 파일 목록 ── -->
        <div class="col-12 col-lg-7">
          <div class="members-card">
            <div class="d-flex align-items-center justify-content-between px-3 py-2"
                 style="border-bottom:1px solid #f0f1f3">
              <span class="fw-semibold" style="font-size:.9rem">
                <i class="bi bi-folder2-open me-1 text-primary"></i>발급 파일 목록
              </span>
              <span class="badge bg-secondary rounded-pill" th:text="${files.size()} + '개'">0개</span>
            </div>

            <!-- 빈 상태 -->
            <div th:if="${files.isEmpty()}" class="text-center text-muted py-5">
              <i class="bi bi-file-earmark d-block mb-2" style="font-size:2rem;opacity:.35"></i>
              <span style="font-size:.88rem">발급된 파일이 없습니다.</span>
            </div>

            <!-- 파일 테이블 -->
            <div th:if="${!files.isEmpty()}" class="table-responsive">
              <table class="table members-table mb-0">
                <thead>
                <tr>
                  <th style="width:48px"></th>
                  <th>파일명</th>
                  <th style="width:52px"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="f,fs : ${files}">
                  <td>
                    <span th:if="${f.endsWith('.pdf')}"
                          class="doc-list-icon ext-pdf">PDF</span>
                    <span th:unless="${f.endsWith('.pdf')}"
                          class="doc-list-icon ext-word">DOC</span>
                  </td>
                  <td style="font-size:.83rem;color:var(--tx1)">
                    <span th:text="${f}"></span>
                    <span th:if="${fs.first}"
                          class="badge rounded-pill ms-1"
                          style="background:#e7f0ff;color:#1d4ed8;font-size:.65rem">최신</span>
                  </td>
                  <td>
                    <a th:href="@{/admin/certificate/download/{fn}(fn=${f})}"
                       class="btn btn-sm btn-outline-secondary"
                       style="font-size:.75rem;border-radius:6px;padding:.2rem .5rem"
                       title="다운로드">
                      <i class="bi bi-download"></i>
                    </a>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>

<script>
(function () {
  var allItems = document.querySelectorAll('.emp-item');
  var totalCount = allItems.length;
  var filteredLabel = document.getElementById('filteredLabel');
  if (filteredLabel) filteredLabel.textContent = '총 ' + totalCount + '명';

  window.filterEmps = function (q) {
    q = q.trim().toLowerCase();
    var visible = 0;
    allItems.forEach(function (item) {
      var name = item.querySelector('.emp-name').textContent.toLowerCase();
      var show = !q || name.includes(q);
      item.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    if (filteredLabel) filteredLabel.textContent = '총 ' + visible + '명';
    var empty = document.getElementById('emptySearch');
    if (empty) empty.style.display = visible === 0 ? '' : 'none';
    syncSelectAll();
  };

  window.toggleAll = function (checked) {
    allItems.forEach(function (item) {
      if (item.style.display !== 'none') {
        item.querySelector('.emp-check').checked = checked;
      }
    });
    updateCount();
  };

  window.syncSelectAll = function () {
    var visible = Array.from(allItems).filter(function (item) {
      return item.style.display !== 'none';
    });
    var checks = visible.map(function (item) { return item.querySelector('.emp-check'); });
    var sa = document.getElementById('selectAll');
    if (!sa) return;
    var allChecked = checks.length > 0 && checks.every(function (c) { return c.checked; });
    var anyChecked = checks.some(function (c) { return c.checked; });
    sa.checked = allChecked;
    sa.indeterminate = !allChecked && anyChecked;
  };

  window.updateCount = function () {
    var count = document.querySelectorAll('.emp-check:checked').length;
    var badge = document.getElementById('selBadge');
    if (badge) badge.textContent = count + '명 선택';
    var btn = document.getElementById('submitBtn');
    var label = document.getElementById('submitLabel');
    if (btn) btn.disabled = count === 0;
    if (label) label.textContent = count > 0 ? count + '명 재직증명서 발급' : '직원을 선택하세요';
  };

  document.querySelectorAll('form').forEach(function (f) {
    if ((f.getAttribute('method') || 'get').toLowerCase() !== 'get') {
      f.addEventListener('submit', function () {
        document.getElementById('loadingOverlay').style.display = 'flex';
      });
    }
  });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
