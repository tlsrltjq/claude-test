<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재직증명서 발급 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-file-earmark-text me-2"></i>재직증명서 발급</h1>
          <p class="page-hd-sub">직원별 재직증명서 DOCX·PDF 자동 생성</p>
        </div>
      </div>

      <!-- 서비스 미가동 안내 -->
      <div th:if="${!available}" class="alert alert-warning d-flex align-items-center gap-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill fs-5"></i>
        <div>
          재직증명서 서비스에 연결할 수 없습니다.
          <code>docker compose -f docker-compose.prod.yml up -d certificate</code> 명령으로 서비스를 시작하세요.
        </div>
      </div>

      <!-- 결과 알림 -->
      <div th:if="${result != null}" class="alert alert-info">
        <strong>발급 결과:</strong>
        성공 <span th:text="${result.success().size()}" class="fw-bold text-success">0</span>건
        <span th:if="${!result.failed().isEmpty()}">
          / 미등록 <span th:text="${result.failed().size()}" class="fw-bold text-danger">0</span>건
          (<span th:text="${#strings.listJoin(result.failed(), ', ')}"></span>)
        </span>
      </div>

      <!-- 템플릿 생성 결과 -->
      <div th:if="${createMessage != null}"
           th:class="${createMessage.startsWith('오류')} ? 'alert alert-danger' : 'alert alert-success'"
           th:text="${createMessage}">
      </div>

      <div class="row g-4" th:if="${available}">

        <!-- 왼쪽: 발급 -->
        <div class="col-lg-7">

          <!-- 단건 발급 -->
          <div class="card mb-4">
            <div class="card-header py-3">
              <h6 class="mb-0"><i class="bi bi-person-check me-2 text-primary"></i>단건 발급</h6>
            </div>
            <div class="card-body">
              <form th:action="@{/admin/certificate/generate}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="input-group">
                  <select name="name" class="form-select" required>
                    <option value="">직원 선택</option>
                    <option th:each="u : ${users}" th:value="${u}" th:text="${u}"></option>
                  </select>
                  <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-file-earmark-arrow-down me-1"></i>발급
                  </button>
                </div>
                <div class="form-text mt-1">선택한 직원의 재직증명서 DOCX + PDF를 생성합니다.</div>
              </form>
            </div>
          </div>

          <!-- 전체 발급 -->
          <div class="card mb-4">
            <div class="card-header py-3">
              <h6 class="mb-0"><i class="bi bi-people me-2 text-success"></i>전체 발급</h6>
            </div>
            <div class="card-body d-flex align-items-center justify-content-between">
              <span class="text-muted">
                전체 직원 <strong th:text="${users.size()}">0</strong>명 전체 발급
              </span>
              <form th:action="@{/admin/certificate/generate}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="all" value="true"/>
                <button type="submit" class="btn btn-success px-4"
                        th:disabled="${users.isEmpty()}"
                        onclick="return confirm('전체 직원 재직증명서를 발급하시겠습니까?')">
                  <i class="bi bi-collection me-1"></i>전체 발급
                </button>
              </form>
            </div>
          </div>

        </div>

        <!-- 오른쪽: 등록 직원 / 발급 파일 -->
        <div class="col-lg-5">

          <!-- 등록된 직원 목록 -->
          <div class="card mb-4">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
              <h6 class="mb-0"><i class="bi bi-person-badge me-2"></i>등록 직원</h6>
              <span class="badge bg-primary" th:text="${users.size()}">0</span>
            </div>
            <div class="card-body p-0">
              <div th:if="${users.isEmpty()}" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                등록된 직원이 없습니다.
              </div>
              <ul class="list-group list-group-flush" th:unless="${users.isEmpty()}">
                <li class="list-group-item py-2 px-3" th:each="u : ${users}">
                  <i class="bi bi-person me-2 text-muted"></i>
                  <span th:text="${u}"></span>
                </li>
              </ul>
            </div>
          </div>

          <!-- 발급된 파일 -->
          <div class="card">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
              <h6 class="mb-0"><i class="bi bi-folder2-open me-2"></i>발급 파일</h6>
              <span class="badge bg-secondary" th:text="${files.size()}">0</span>
            </div>
            <div class="card-body p-0" style="max-height:480px; overflow-y:auto;">
              <div th:if="${files.isEmpty()}" class="text-center text-muted py-4">
                <i class="bi bi-file-earmark fs-3 d-block mb-2"></i>
                발급된 파일이 없습니다.
              </div>
              <ul class="list-group list-group-flush" th:unless="${files.isEmpty()}">
                <li class="list-group-item py-2 px-3 d-flex justify-content-between align-items-center"
                    th:each="f,fStat : ${files}"
                    th:classappend="${fStat.first} ? 'list-group-item-info'">
                  <span class="me-2 text-break" style="min-width:0; flex:1;">
                    <i th:class="${f.endsWith('.pdf')} ? 'bi bi-filetype-pdf text-danger me-1' : 'bi bi-filetype-docx text-primary me-1'"></i>
                    <small th:text="${f}"></small>
                    <span th:if="${fStat.first}" class="badge bg-info text-dark ms-1 newest-badge">최신</span>
                  </span>
                  <a th:href="@{/admin/certificate/download/{f}(f=${f})}"
                     class="btn btn-sm btn-outline-secondary flex-shrink-0">
                    <i class="bi bi-download"></i>
                  </a>
                </li>
              </ul>
            </div>
          </div>

        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
