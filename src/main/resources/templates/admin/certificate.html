<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재직증명서 발급 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
      .cert-section + .cert-section { margin-top: 1rem; border-top: 1px solid #f0f1f3; padding-top: 1rem; }
      .cert-section-title { font-size:.8rem; font-weight:600; color:var(--tx2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:.6rem; }
      .cert-ac { position:relative; }
      .cert-ac-dropdown { position:absolute; top:100%; left:0; right:0; z-index:200;
        background:#fff; border:1px solid #dde0e5; border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.1);
        max-height:180px; overflow-y:auto; display:none; margin-top:2px; }
      .cert-ac-dropdown li { list-style:none; padding:.45rem .75rem; font-size:.85rem;
        cursor:pointer; color:var(--tx1); }
      .cert-ac-dropdown li:hover, .cert-ac-dropdown li.ac-active { background:#f0f4ff; color:#1d4ed8; }
      .cert-ac-dropdown-empty { padding:.5rem .75rem; font-size:.83rem; color:var(--tx2); }
    </style>
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-file-earmark-person me-2"></i>재직증명서 발급</h1>
          <p class="page-hd-sub">직원 검색 또는 프로젝트 선택으로 DOCX · PDF 자동 생성</p>
        </div>
      </div>

      <!-- 서비스 미가동 -->
      <div th:if="${!available}"
           class="alert alert-warning d-flex align-items-center gap-3 rounded-3 mb-0" role="alert">
        <i class="bi bi-exclamation-triangle-fill fs-4 flex-shrink-0"></i>
        <div>
          <div class="fw-semibold mb-1">재직증명서 서비스에 연결할 수 없습니다.</div>
          <code style="font-size:.82rem">docker compose -f docker-compose.prod.yml up -d certificate</code>
        </div>
      </div>

      <!-- 발급 결과 -->
      <div th:if="${result != null}"
           class="alert alert-dismissible d-flex align-items-start gap-2 mb-3 rounded-3"
           th:classappend="${result.failed().isEmpty()} ? 'alert-success' : 'alert-warning'"
           role="alert">
        <i class="bi flex-shrink-0 mt-1"
           th:classappend="${result.failed().isEmpty()} ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
        <div>
          <span class="fw-semibold">발급 완료</span>
          <span class="ms-2">성공 <strong th:text="${result.success().size()}">0</strong>건</span>
          <span th:if="${result.success().size() > 0}" class="ms-1 text-muted" style="font-size:.82rem"
                th:text="'(' + ${#strings.listJoin(result.success(), ', ')} + ')'"></span>
          <span th:if="${!result.failed().isEmpty()}" class="ms-2 text-danger">
            / 미등록 <strong th:text="${result.failed().size()}">0</strong>건
            (<span th:text="${#strings.listJoin(result.failed(), ', ')}"></span>)
          </span>
          <div th:if="${result.success().isEmpty() and result.failed().isEmpty()}"
               class="text-muted" style="font-size:.83rem">프로젝트에 등록된 멤버가 없습니다.</div>
        </div>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
      </div>

      <!-- 직원 데이터 (autocomplete용) -->
      <div id="userData" style="display:none"
           th:each="u : ${users}" th:data-name="${u}"></div>

      <!-- 메인 레이아웃 -->
      <div th:if="${available}" class="row g-4 align-items-start">

        <!-- ── 좌: 발급 패널 ── -->
        <div class="col-12 col-lg-5">
          <div class="calc-card" style="position:sticky;top:1rem">
            <div class="calc-card-header">
              <span><i class="bi bi-file-earmark-arrow-down"></i>재직증명서 발급</span>
            </div>
            <div class="calc-card-body">

              <!-- 단건 발급 -->
              <div class="cert-section">
                <div class="cert-section-title">단건 발급</div>
                <form th:action="@{/admin/certificate/generate}" method="post" id="singleForm">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  <input type="hidden" id="selectedName" name="name">
                  <div class="cert-ac mb-2">
                    <input type="text" id="nameSearch" class="form-control form-control-sm"
                           placeholder="직원 이름 검색"
                           oninput="onNameInput(this.value)"
                           onfocus="onNameFocus()"
                           onblur="setTimeout(closeNameDrop,160)"
                           onkeydown="onNameKey(event)"
                           autocomplete="off">
                    <ul class="cert-ac-dropdown" id="nameDrop"></ul>
                  </div>
                  <button type="submit" class="btn btn-primary btn-sm w-100 fw-semibold"
                          id="singleBtn" disabled>
                    <i class="bi bi-file-earmark-arrow-down me-1"></i>
                    <span id="singleLabel">이름을 선택하세요</span>
                  </button>
                </form>
              </div>

              <!-- 프로젝트 일괄 발급 -->
              <div class="cert-section">
                <div class="cert-section-title">프로젝트 일괄 발급</div>
                <div th:if="${#lists.isEmpty(projects)}" class="text-muted" style="font-size:.83rem">
                  등록된 프로젝트가 없습니다.
                </div>
                <form th:unless="${#lists.isEmpty(projects)}"
                      th:action="@{/admin/certificate/generate-project}" method="post" id="projectForm">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  <select name="projectId" class="form-select form-select-sm mb-2" required>
                    <option value="">프로젝트 선택</option>
                    <option th:each="p : ${projects}"
                            th:value="${p.id}"
                            th:text="${p.name}"></option>
                  </select>
                  <button type="submit" class="btn btn-outline-primary btn-sm w-100 fw-semibold"
                          onclick="return confirm('선택한 프로젝트의 모든 멤버에게 재직증명서를 발급하시겠습니까?')">
                    <i class="bi bi-people me-1"></i>프로젝트 전원 발급
                  </button>
                </form>
              </div>

            </div>
          </div>
        </div>

        <!-- ── 우: 발급 파일 목록 ── -->
        <div class="col-12 col-lg-7">
          <div class="members-card">
            <div class="d-flex align-items-center justify-content-between px-3 py-2"
                 style="border-bottom:1px solid #f0f1f3">
              <span class="fw-semibold" style="font-size:.9rem">
                <i class="bi bi-folder2-open me-1 text-primary"></i>발급 파일 목록
              </span>
              <span class="badge bg-secondary rounded-pill" th:text="${files.size()} + '개'">0개</span>
            </div>

            <!-- 빈 상태 -->
            <div th:if="${files.isEmpty()}" class="text-center text-muted py-5">
              <i class="bi bi-file-earmark d-block mb-2" style="font-size:2rem;opacity:.35"></i>
              <span style="font-size:.88rem">발급된 파일이 없습니다.</span>
            </div>

            <!-- 파일 테이블 -->
            <div th:if="${!files.isEmpty()}" class="table-responsive">
              <table class="table members-table mb-0">
                <thead>
                <tr>
                  <th style="width:48px"></th>
                  <th>파일명</th>
                  <th style="width:52px"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="f,fs : ${files}">
                  <td>
                    <span th:if="${f.endsWith('.pdf')}"
                          class="doc-list-icon ext-pdf">PDF</span>
                    <span th:unless="${f.endsWith('.pdf')}"
                          class="doc-list-icon ext-word">DOC</span>
                  </td>
                  <td style="font-size:.83rem;color:var(--tx1)">
                    <span th:text="${f}"></span>
                    <span th:if="${fs.first}"
                          class="badge rounded-pill ms-1"
                          style="background:#e7f0ff;color:#1d4ed8;font-size:.65rem">최신</span>
                  </td>
                  <td>
                    <a th:href="@{/admin/certificate/download/{fn}(fn=${f})}"
                       class="btn btn-sm btn-outline-secondary"
                       style="font-size:.75rem;border-radius:6px;padding:.2rem .5rem"
                       title="다운로드">
                      <i class="bi bi-download"></i>
                    </a>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>

<script>
(function () {
  // ── 직원 이름 autocomplete ──────────────────────────────
  var allNames = Array.from(document.querySelectorAll('#userData')).map(function (el) {
    return el.getAttribute('data-name');
  });
  var dropEl = document.getElementById('nameDrop');
  var acIdx  = -1;

  function buildDrop(list) {
    dropEl.innerHTML = '';
    if (list.length === 0) {
      var empty = document.createElement('li');
      empty.className = 'cert-ac-dropdown-empty';
      empty.textContent = '검색 결과 없음';
      dropEl.appendChild(empty);
    } else {
      list.forEach(function (name, i) {
        var li = document.createElement('li');
        li.textContent = name;
        li.setAttribute('data-idx', i);
        li.addEventListener('mousedown', function () { selectName(name); });
        dropEl.appendChild(li);
      });
    }
    dropEl.style.display = 'block';
    acIdx = -1;
  }

  function closeDrop() { dropEl.style.display = 'none'; acIdx = -1; }
  window.closeNameDrop = closeDrop;

  function selectName(name) {
    document.getElementById('nameSearch').value = name;
    document.getElementById('selectedName').value = name;
    document.getElementById('singleBtn').disabled = false;
    document.getElementById('singleLabel').textContent = name + ' 재직증명서 발급';
    closeDrop();
  }

  function clearName() {
    document.getElementById('selectedName').value = '';
    document.getElementById('singleBtn').disabled = true;
    document.getElementById('singleLabel').textContent = '이름을 선택하세요';
  }

  window.onNameInput = function (q) {
    clearName();
    q = q.trim();
    if (!q) { closeDrop(); return; }
    var filtered = allNames.filter(function (n) { return n.includes(q); });
    buildDrop(filtered);
  };

  window.onNameFocus = function () {
    var q = document.getElementById('nameSearch').value.trim();
    if (q) {
      var filtered = allNames.filter(function (n) { return n.includes(q); });
      if (filtered.length) buildDrop(filtered);
    }
  };

  window.onNameKey = function (e) {
    var items = dropEl.querySelectorAll('li[data-idx]');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIdx = Math.min(acIdx + 1, items.length - 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIdx = Math.max(acIdx - 1, 0);
    } else if (e.key === 'Enter' && acIdx >= 0) {
      e.preventDefault();
      selectName(items[acIdx].textContent);
      return;
    } else if (e.key === 'Escape') {
      closeDrop(); return;
    } else { return; }
    items.forEach(function (li, i) {
      li.classList.toggle('ac-active', i === acIdx);
    });
  };

  // ── loading overlay ────────────────────────────────────
  document.querySelectorAll('form').forEach(function (f) {
    if ((f.getAttribute('method') || 'get').toLowerCase() !== 'get') {
      f.addEventListener('submit', function () {
        document.getElementById('loadingOverlay').style.display = 'flex';
      });
    }
  });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
