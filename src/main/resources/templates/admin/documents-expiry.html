<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 만료 현황 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/admin/users/pending}" class="btn btn-outline-warning btn-sm">승인 대기</a>
            <a th:href="@{/admin/documents/review}" class="btn btn-outline-info btn-sm">문서 검토</a>
            <a th:href="@{/admin/documents/expiry}" class="btn btn-outline-danger btn-sm">만료 현황</a>
            <a th:href="@{/admin/statistics}" class="btn btn-outline-success btn-sm">통계</a>
            <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">← 대시보드</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">문서 만료 현황</h2>

    <!-- 만료된 문서 -->
    <h5 class="text-danger mb-2">
        만료됨
        <span class="badge bg-danger ms-1" th:text="${#lists.size(expiredDocuments)}">0</span>
    </h5>
    <div th:if="${#lists.isEmpty(expiredDocuments)}" class="alert alert-secondary mb-4">만료된 문서가 없습니다.</div>
    <table th:if="${!#lists.isEmpty(expiredDocuments)}" class="table table-bordered table-hover mb-4">
        <thead class="table-danger">
        <tr>
            <th>직원</th><th>팀</th><th>문서 종류</th><th>제목</th><th>만료일</th><th>경과일</th><th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="doc : ${expiredDocuments}">
            <td th:text="${doc.folder.owner.name}"></td>
            <td th:text="${doc.folder.owner.team != null ? doc.folder.owner.team.name : '-'}"></td>
            <td>
                <span th:switch="${doc.documentType.name()}">
                    <span th:case="'RESUME'">이력서</span>
                    <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                    <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                    <span th:case="'LICENSE'">자격증</span>
                    <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                    <span th:case="*">기타</span>
                </span>
            </td>
            <td th:text="${doc.title}"></td>
            <td class="text-danger fw-bold" th:text="${#temporals.format(doc.expiresAt, 'yyyy-MM-dd')}"></td>
            <td class="text-danger small"
                th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(doc.expiresAt, T(java.time.LocalDate).now()) + '일 경과'}"></td>
            <td>
                <a th:href="@{/admin/employees/{uid}/documents(uid=${doc.folder.owner.id})}"
                   class="btn btn-outline-secondary btn-sm">문서 보기</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- 만료 임박 문서 (30일 이내) -->
    <h5 class="text-warning mb-2">
        만료 임박 <small class="text-muted fw-normal">30일 이내</small>
        <span class="badge bg-warning text-dark ms-1" th:text="${#lists.size(expiringSoonDocuments)}">0</span>
    </h5>
    <div th:if="${#lists.isEmpty(expiringSoonDocuments)}" class="alert alert-secondary">만료 임박 문서가 없습니다.</div>
    <table th:if="${!#lists.isEmpty(expiringSoonDocuments)}" class="table table-bordered table-hover">
        <thead class="table-warning">
        <tr>
            <th>직원</th><th>팀</th><th>문서 종류</th><th>제목</th><th>만료일</th><th>남은 일수</th><th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="doc : ${expiringSoonDocuments}">
            <td th:text="${doc.folder.owner.name}"></td>
            <td th:text="${doc.folder.owner.team != null ? doc.folder.owner.team.name : '-'}"></td>
            <td>
                <span th:switch="${doc.documentType.name()}">
                    <span th:case="'RESUME'">이력서</span>
                    <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                    <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                    <span th:case="'LICENSE'">자격증</span>
                    <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                    <span th:case="*">기타</span>
                </span>
            </td>
            <td th:text="${doc.title}"></td>
            <td class="fw-bold" th:text="${#temporals.format(doc.expiresAt, 'yyyy-MM-dd')}"></td>
            <td class="text-warning fw-bold small"
                th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), doc.expiresAt) + '일 남음'}"></td>
            <td>
                <a th:href="@{/admin/employees/{uid}/documents(uid=${doc.folder.owner.id})}"
                   class="btn btn-outline-secondary btn-sm">문서 보기</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
