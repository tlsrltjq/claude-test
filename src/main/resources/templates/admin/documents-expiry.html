<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 만료 현황 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<!-- topnav -->
<nav class="topnav navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin}">
            <i class="bi bi-shield-fill me-1"></i>eActive Hub
            <span class="badge bg-warning text-dark ms-1" style="font-size:.65rem">ADMIN</span>
        </a>
        <div class="ms-auto d-flex gap-2 flex-wrap">
            <a th:href="@{/admin/documents/review}" class="btn btn-nav btn-sm">
                <i class="bi bi-file-earmark-text me-1"></i>문서검토
            </a>
            <a th:href="@{/admin/statistics}" class="btn btn-nav btn-sm">
                <i class="bi bi-bar-chart me-1"></i>통계
            </a>
            <a th:href="@{/admin}" class="btn btn-nav btn-sm">
                <i class="bi bi-speedometer2 me-1"></i>대시보드
            </a>
            <a th:href="@{/admin/certificate}" class="btn btn-outline-light btn-nav btn-sm">
                <i class="bi bi-file-earmark-text me-1"></i>재직증명서
            </a>
            <a th:href="@{/dashboard}" class="btn btn-nav btn-sm">
                <i class="bi bi-person me-1"></i>내 화면
            </a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" name="_csrf" th:value="${_csrf != null ? _csrf.token : ''}">
                <button type="submit" class="btn btn-nav btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- 페이지 헤더 -->
    <div class="page-header">
        <h4><i class="bi bi-calendar-x me-2"></i>문서 만료 현황</h4>
        <p>만료되었거나 30일 이내에 만료 예정인 문서를 확인합니다.</p>
    </div>

    <!-- 섹션 1: 만료됨 -->
    <div class="d-flex align-items-center gap-2 mb-2">
        <span class="section-label danger">
            <i class="bi bi-x-circle-fill"></i>만료됨
        </span>
        <span class="badge rounded-pill bg-danger" th:text="${#lists.size(expiredDocuments)}">0</span>
    </div>

    <div th:if="${#lists.isEmpty(expiredDocuments)}" class="empty-state">
        <i class="bi bi-check-circle"></i>
        <p>만료된 문서가 없습니다.</p>
    </div>

    <div th:if="${!#lists.isEmpty(expiredDocuments)}" class="table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>직원</th>
                    <th>팀</th>
                    <th>문서 종류</th>
                    <th>제목</th>
                    <th>만료일</th>
                    <th>경과일</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doc : ${expiredDocuments}">
                    <td class="fw-semibold" th:text="${doc.folder.owner.name}"></td>
                    <td th:text="${doc.folder.owner.team != null ? doc.folder.owner.team.name : '-'}"></td>
                    <td th:text="${doc.documentType.displayName}"></td>
                    <td th:text="${doc.title}"></td>
                    <td class="text-danger fw-bold text-nowrap"
                        th:text="${#temporals.format(doc.expiresAt, 'yyyy-MM-dd')}"></td>
                    <td>
                        <span class="badge rounded-pill px-2 py-1"
                              style="background:#fde8e8; color:#b91c1c; font-size:.75rem;"
                              th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(doc.expiresAt, T(java.time.LocalDate).now()) + '일 경과'}">
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/admin/employees/{uid}/documents(uid=${doc.folder.owner.id})}"
                           class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-folder2-open me-1"></i>문서 보기
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 섹션 2: 만료 임박 -->
    <div class="d-flex align-items-center gap-2 mb-2">
        <span class="section-label warning">
            <i class="bi bi-exclamation-triangle-fill"></i>만료 임박
            <span class="fw-normal" style="font-size:.72rem; opacity:.7;">(30일 이내)</span>
        </span>
        <span class="badge rounded-pill bg-warning text-dark" th:text="${#lists.size(expiringSoonDocuments)}">0</span>
    </div>

    <div th:if="${#lists.isEmpty(expiringSoonDocuments)}" class="empty-state">
        <i class="bi bi-check-circle"></i>
        <p>만료 임박 문서가 없습니다.</p>
    </div>

    <div th:if="${!#lists.isEmpty(expiringSoonDocuments)}" class="table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>직원</th>
                    <th>팀</th>
                    <th>문서 종류</th>
                    <th>제목</th>
                    <th>만료일</th>
                    <th>남은 일수</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doc : ${expiringSoonDocuments}">
                    <td class="fw-semibold" th:text="${doc.folder.owner.name}"></td>
                    <td th:text="${doc.folder.owner.team != null ? doc.folder.owner.team.name : '-'}"></td>
                    <td th:text="${doc.documentType.displayName}"></td>
                    <td th:text="${doc.title}"></td>
                    <td class="fw-bold text-nowrap"
                        th:text="${#temporals.format(doc.expiresAt, 'yyyy-MM-dd')}"></td>
                    <td>
                        <span class="badge rounded-pill px-2 py-1"
                              style="background:#fef9e7; color:#92400e; border:1px solid #fbbf24; font-size:.75rem;"
                              th:text="${T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), doc.expiresAt) + '일 남음'}">
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/admin/employees/{uid}/documents(uid=${doc.folder.owner.id})}"
                           class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-folder2-open me-1"></i>문서 보기
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- 로딩 스피너 오버레이 -->
<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
    <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
        <span class="visually-hidden">처리 중...</span>
    </div>
</div>
<script>
(function(){
    var p = window.location.pathname;
    // 네비바 active 상태
    document.querySelectorAll('a.btn-nav').forEach(function(el){
        var h = el.getAttribute('href');
        if(!h) return;
        var isRoot = (h==='/admin'||h==='/admin/');
        var active = isRoot ? (p==='/admin'||p==='/admin/') : p.startsWith(h);
        if(active) el.classList.add('active');
    });
    // POST 폼 제출 시 스피너 표시
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
