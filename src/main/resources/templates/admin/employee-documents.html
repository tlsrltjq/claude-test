<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 문서 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
        <div class="ms-auto">
            <a th:href="@{/admin/employees/{id}(id=${user.id})}" class="btn btn-outline-light btn-sm">← 직원 상세</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-1">문서 목록</h2>
    <p class="text-muted mb-4" th:text="${user.name + ' (' + user.email + ')'}"></p>

    <div th:if="${documents == null or #lists.isEmpty(documents)}" class="alert alert-info">
        업로드된 문서가 없습니다.
    </div>

    <table th:if="${documents != null and not #lists.isEmpty(documents)}"
           class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>문서 종류</th>
            <th>제목</th>
            <th>원본 파일명</th>
            <th>크기</th>
            <th>버전</th>
            <th>업로드일</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="doc : ${documents}">
            <td>
                <span th:switch="${doc.documentType.name()}">
                    <span th:case="'RESUME'">이력서</span>
                    <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                    <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                    <span th:case="'LICENSE'">자격증</span>
                    <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                    <span th:case="*">기타</span>
                </span>
            </td>
            <td th:text="${doc.title}"></td>
            <td th:text="${doc.currentVersion != null ? doc.currentVersion.originalFileName : '-'}"></td>
            <td th:text="${doc.currentVersion != null ? #numbers.formatDecimal(doc.currentVersion.fileSize / 1024.0, 1, 1) + ' KB' : '-'}"></td>
            <td th:text="${doc.currentVersion != null ? 'v' + doc.currentVersion.versionNo : '-'}"></td>
            <td th:text="${doc.currentVersion != null ? #temporals.format(doc.currentVersion.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
            <td>
                <a th:href="@{/admin/employees/{uid}/documents/{did}(uid=${user.id},did=${doc.id})}"
                   class="btn btn-outline-primary btn-sm">상세</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
