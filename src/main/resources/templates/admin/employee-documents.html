<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 문서 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 직원 헤더 -->
      <div class="member-header d-flex align-items-center gap-3">
        <div class="avatar-circle" th:text="${#strings.substring(user.name, 0, 1)}">홍</div>
        <div class="flex-grow-1 min-w-0">
          <h5 class="fw-bold mb-0" th:text="${user.name}"></h5>
          <div class="text-muted small" th:text="${user.email}"></div>
          <div class="d-flex gap-2 mt-1 flex-wrap">
            <span class="badge bg-secondary rounded-pill"
                  th:if="${user.team != null}" th:text="${user.team.name}"></span>
            <span class="badge bg-secondary rounded-pill"
                  th:if="${user.position != null}" th:text="${user.position.displayName}"></span>
          </div>
        </div>
        <div>
          <span class="badge bg-secondary rounded-pill px-3 py-2" style="font-size:.85rem;">
            <i class="bi bi-file-earmark me-1"></i>
            <span th:text="${documents != null ? #lists.size(documents) : 0}">0</span>개
          </span>
        </div>
      </div>

      <!-- 필터 바 -->
      <div class="filter-card d-flex gap-2 flex-wrap align-items-center mb-3">
        <select id="filterType" class="form-select form-select-sm" style="width:auto;">
          <option value="">전체 종류</option>
          <option value="이력서">이력서</option>
          <option value="SW기술자 경력증명서">SW기술자 경력증명서</option>
          <option value="졸업증명서">졸업증명서</option>
          <option value="국민연금가입증명서">국민연금가입증명서</option>
          <option value="건강보험가입증명서">건강보험가입증명서</option>
          <option value="건강보험자격득실확인서">건강보험자격득실확인서</option>
          <option value="자격증">자격증</option>
          <option value="재직증명서">재직증명서</option>
          <option value="기타">기타</option>
        </select>
        <div class="input-group input-group-sm" style="width:220px;">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
          <input id="searchBox" class="form-control border-start-0" placeholder="제목 또는 파일명">
        </div>
        <select id="sortOrder" class="form-select form-select-sm" style="width:auto;">
          <option value="date">최근 업로드</option>
          <option value="type">종류</option>
          <option value="title">제목</option>
        </select>
      </div>

      <div th:if="${documents == null or #lists.isEmpty(documents)}" class="empty-state">
        <i class="bi bi-file-earmark-x"></i>
        <p>업로드된 문서가 없습니다.</p>
      </div>

      <div id="cardGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3"
           th:if="${documents != null and not #lists.isEmpty(documents)}">
        <div th:each="doc : ${documents}" class="col doc-card-col"
             th:data-label="${doc.documentType.displayName}"
             th:data-title="${doc.title}"
             th:data-filename="${doc.currentVersion != null ? doc.currentVersion.originalFileName : ''}"
             th:data-date="${doc.currentVersion != null ? doc.currentVersion.createdAt : ''}">
          <div class="doc-card">
            <!-- 썸네일 이미지 -->
            <div th:if="${doc.currentVersion != null and doc.currentVersion.thumbnailStoragePath != null}">
              <img th:src="@{/documents/{id}/thumbnail(id=${doc.currentVersion.id})}"
                   class="doc-thumb" alt=""
                   class="doc-thumb-img"
              <div class="doc-icon-area" style="display:none;"
                   th:with="ext=${(doc.currentVersion.originalFileName.substring(doc.currentVersion.originalFileName.lastIndexOf('.')+1)).toLowerCase()}">
                <div th:class="'doc-icon ' + (${ext == 'pdf'} ? 'ext-pdf' : (${ext == 'jpg' or ext == 'jpeg' or ext == 'png'} ? 'ext-img' : (${ext == 'docx'} ? 'ext-word' : (${ext == 'hwp' or ext == 'hwpx'} ? 'ext-hwp' : 'ext-etc'))))"
                     th:text="${ext.toUpperCase()}"></div>
              </div>
            </div>
            <!-- 아이콘 영역 (썸네일 없음) -->
            <div th:if="${doc.currentVersion == null or doc.currentVersion.thumbnailStoragePath == null}"
                 class="doc-icon-area"
                 th:with="ext=${doc.currentVersion != null ? (doc.currentVersion.originalFileName.substring(doc.currentVersion.originalFileName.lastIndexOf('.')+1)).toLowerCase() : 'file'}">
              <div th:class="'doc-icon ' + (${ext == 'pdf'} ? 'ext-pdf' : (${ext == 'jpg' or ext == 'jpeg' or ext == 'png'} ? 'ext-img' : (${ext == 'docx'} ? 'ext-word' : (${ext == 'hwp' or ext == 'hwpx'} ? 'ext-hwp' : 'ext-etc'))))"
                   th:text="${ext.toUpperCase()}"></div>
            </div>
            <!-- 카드 내용 -->
            <div class="card-body">
              <span class="badge bg-secondary rounded-pill mb-1" th:text="${doc.documentType.displayName}"></span>
              <div class="fw-semibold text-truncate small" th:text="${doc.title}"></div>
              <div class="text-truncate" style="font-size:.75rem;color:var(--accent)"
                   th:text="${doc.currentVersion != null ? doc.currentVersion.originalFileName : '-'}"></div>
              <div class="text-muted" style="font-size:.72rem;">
                <span th:text="${doc.currentVersion != null ? 'v' + doc.currentVersion.versionNo : ''}"></span>
                <span class="ms-1" th:text="${doc.currentVersion != null ? #temporals.format(doc.currentVersion.createdAt, 'yy.MM.dd') : ''}"></span>
              </div>
            </div>
            <!-- 액션 버튼 -->
            <div class="card-footer d-flex gap-1" th:if="${doc.currentVersion != null}">
              <a th:href="@{/documents/{id}/preview(id=${doc.currentVersion.id})}"
                 target="_blank" class="btn btn-outline-secondary btn-sm flex-fill">
                <i class="bi bi-eye"></i>
              </a>
              <a th:href="@{/documents/{id}/download(id=${doc.currentVersion.id})}"
                 class="btn btn-outline-primary btn-sm flex-fill">
                <i class="bi bi-download"></i>
              </a>
              <form th:action="@{/admin/documents/{id}/delete(id=${doc.id})}" method="post"
                    class="d-inline delete-doc-form">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script th:attr="nonce=${cspNonce}">
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:attr="nonce=${cspNonce}">
function applyFilter() {
    const type = document.getElementById('filterType').value;
    const query = document.getElementById('searchBox').value.toLowerCase();
    document.querySelectorAll('.doc-card-col').forEach(col => {
        const label = col.dataset.label || '';
        const title = (col.dataset.title || '').toLowerCase();
        const fname = (col.dataset.filename || '').toLowerCase();
        col.style.display = (!type || label === type) && (!query || title.includes(query) || fname.includes(query)) ? '' : 'none';
    });
}
function applySort() {
    const sort = document.getElementById('sortOrder').value;
    const grid = document.getElementById('cardGrid');
    if (!grid) return;
    const cols = Array.from(grid.querySelectorAll('.doc-card-col'));
    cols.sort((a, b) => {
        if (sort === 'type') return (a.dataset.label || '').localeCompare(b.dataset.label || '');
        if (sort === 'title') return (a.dataset.title || '').localeCompare(b.dataset.title || '');
        return (b.dataset.date || '').localeCompare(a.dataset.date || '');
    });
    cols.forEach(c => grid.appendChild(c));
}

document.getElementById('filterType').addEventListener('change', applyFilter);
document.getElementById('searchBox').addEventListener('input', applyFilter);
document.getElementById('sortOrder').addEventListener('change', applySort);
document.querySelectorAll('img.doc-thumb-img').forEach(function(img) {
    img.addEventListener('error', function() {
        this.style.display = 'none';
        this.nextElementSibling.style.display = 'flex';
    });
});
document.querySelectorAll('.delete-doc-form').forEach(function(f) {
    f.addEventListener('submit', function(e) {
        if (!confirm('문서를 영구 삭제하시겠습니까?')) e.preventDefault();
    });
});
</script>
</body>
</html>
