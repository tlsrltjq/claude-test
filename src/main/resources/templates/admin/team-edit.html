<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 수정 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-pencil-square me-2"></i>팀 수정</h1>
          <p class="page-hd-sub">팀 이름을 변경합니다.</p>
        </div>
        <div class="page-hd-actions">
          <a th:href="@{/admin/teams}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>팀 목록
          </a>
        </div>
      </div>

      <div class="form-card">
        <div class="card-header-custom">
          <i class="bi bi-diagram-3-fill me-2"></i>팀 정보
        </div>
        <div class="card-body">
          <form th:action="@{/admin/teams/{id}/update(id=${team.id})}"
                th:object="${teamRequest}" method="post">
            <div class="mb-3">
              <label class="form-label">팀 이름 <span class="text-danger">*</span></label>
              <input type="text" th:field="*{name}" class="form-control"
                     th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                     placeholder="팀 이름을 입력하세요" required>
              <div class="invalid-feedback" th:errors="*{name}"></div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-1"></i>저장
              </button>
              <a th:href="@{/admin/teams}" class="btn btn-outline-secondary">
                <i class="bi bi-x-lg me-1"></i>취소
              </a>
            </div>
          </form>
        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
