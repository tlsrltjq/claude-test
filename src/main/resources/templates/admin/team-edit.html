<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 수정 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">eActive Hub — 관리자</a>
    </div>
</nav>

<div class="container mt-4" style="max-width:520px;">
    <h2 class="mb-4">팀 수정</h2>

    <form th:action="@{/admin/teams/{id}/update(id=${team.id})}"
          th:object="${teamRequest}" method="post">
        <div class="mb-3">
            <label class="form-label">팀 이름 *</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required>
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">설명</label>
            <input type="text" th:field="*{description}" class="form-control">
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">저장</button>
            <a th:href="@{/admin/teams}" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
