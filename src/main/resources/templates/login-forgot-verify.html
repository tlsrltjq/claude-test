<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-sm" style="width:100%;max-width:440px;">
        <div class="card-body p-4">
            <h1 class="h4 text-center mb-1">비밀번호 재설정</h1>
            <p class="text-center text-muted small mb-4">
                <strong th:text="${email}"></strong>으로 발송된 6자리 코드를 입력하고<br>새 비밀번호를 설정하세요.
            </p>

            <div th:if="${infoMessage}"  class="alert alert-info"    th:text="${infoMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger"  th:text="${errorMessage}"></div>

            <form th:action="@{/login/forgot/verify}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label">인증코드 (6자리)</label>
                    <input type="text" name="code" class="form-control text-center fs-5"
                           maxlength="6" placeholder="000000" required inputmode="numeric" autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">새 비밀번호</label>
                    <input type="password" name="newPassword" class="form-control"
                           placeholder="영문·숫자·특수문자 포함 8자 이상" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">새 비밀번호 확인</label>
                    <input type="password" name="newPasswordConfirm" class="form-control"
                           placeholder="동일하게 입력" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">비밀번호 재설정</button>
            </form>

            <hr>
            <p class="text-center mb-0 small">
                <a th:href="@{/login/forgot}">← 이메일 다시 입력</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
