<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; min-height: 100vh; }
        .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { width: 100%; max-width: 440px; border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.10); overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: 2rem; text-align: center; color: #fff; }
        .auth-header .logo-icon { font-size: 2.2rem; margin-bottom: .5rem; display: block; }
        .auth-header .brand { font-size: .8rem; opacity: .85; letter-spacing: .08em; text-transform: uppercase; }
        .auth-header h1 { font-size: 1.3rem; font-weight: 700; margin: .3rem 0 0; }
        .auth-body { padding: 2rem; background: #fff; }
        .email-chip { display: inline-flex; align-items: center; gap: .4rem; background: #e7f0ff; color: #0d6efd; padding: .3rem .75rem; border-radius: 50px; font-size: .85rem; font-weight: 600; margin-bottom: 1.25rem; }
        .code-input { font-size: 1.5rem; text-align: center; letter-spacing: .5em; font-weight: 700; }
        .form-label { font-size: .85rem; font-weight: 600; color: #343a40; margin-bottom: .3rem; }
        .pw-strength { height: 4px; border-radius: 2px; margin-top: .35rem; background: #e9ecef; overflow: hidden; }
        .pw-strength-bar { height: 100%; width: 0; transition: width .3s, background .3s; border-radius: 2px; }
        .btn-submit { padding: .75rem; font-size: 1rem; font-weight: 600; border-radius: 10px; }
        .back-link { display: block; text-align: center; font-size: .84rem; color: #6c757d; text-decoration: none; margin-top: 1.25rem; }
        .back-link:hover { color: #0d6efd; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="auth-card card">
        <div class="auth-header">
            <i class="bi bi-shield-lock-fill logo-icon"></i>
            <div class="brand">eActive Resource Hub</div>
            <h1>비밀번호 재설정</h1>
        </div>
        <div class="auth-body">
            <div class="text-center">
                <div class="email-chip">
                    <i class="bi bi-envelope-fill"></i>
                    <span th:text="${email}"></span>
                </div>
                <p class="text-muted small mb-3" style="font-size:.84rem;">위 주소로 발송된 6자리 코드를 입력하고<br>새 비밀번호를 설정하세요.</p>
            </div>

            <div th:if="${infoMessage}" class="alert alert-info d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-info-circle-fill"></i>
                <span th:text="${infoMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/login/forgot/verify}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label">인증코드 (6자리)</label>
                    <input type="text" name="code" class="form-control code-input"
                           maxlength="6" placeholder="000000" required inputmode="numeric" autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">새 비밀번호</label>
                    <input type="password" name="newPassword" class="form-control" id="newPw"
                           placeholder="영문·숫자·특수문자 포함 8자 이상" required>
                    <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
                </div>
                <div class="mb-4">
                    <label class="form-label">새 비밀번호 확인</label>
                    <input type="password" name="newPasswordConfirm" class="form-control"
                           placeholder="동일하게 입력" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-submit">
                    <i class="bi bi-check-circle-fill me-1"></i>비밀번호 재설정
                </button>
            </form>
            <a th:href="@{/login/forgot}" class="back-link">
                <i class="bi bi-arrow-left me-1"></i>이메일 다시 입력
            </a>
        </div>
    </div>
</div>
<script>
(function () {
    var pw = document.getElementById('newPw');
    var bar = document.getElementById('pwBar');
    if (!pw) return;
    var colors = ['#dc3545','#fd7e14','#ffc107','#20c997','#198754'];
    pw.addEventListener('input', function () {
        var v = this.value, score = 0;
        if (v.length >= 8) score++;
        if (/[a-z]/.test(v)) score++;
        if (/[A-Z]/.test(v)) score++;
        if (/[0-9]/.test(v)) score++;
        if (/[^a-zA-Z0-9]/.test(v)) score++;
        bar.style.width = (score * 20) + '%';
        bar.style.background = colors[Math.max(0, score - 1)] || '#e9ecef';
    });
})();
</script>
</body>
</html>
