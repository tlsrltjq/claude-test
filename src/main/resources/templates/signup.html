<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="card shadow-sm" style="width:100%;max-width:520px;">
        <div class="card-body p-4">
            <h1 class="h4 text-center mb-4">회원가입</h1>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/signup}" th:object="${signupRequest}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="name" class="form-label">이름 <span class="text-danger">*</span></label>
                    <input type="text" id="name" th:field="*{name}"
                           class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="position" class="form-label">직급 <span class="text-danger">*</span></label>
                    <select id="position" th:field="*{position}"
                            class="form-select" th:classappend="${#fields.hasErrors('position')} ? 'is-invalid'" required>
                        <option value="">직급 선택</option>
                        <option th:each="p : ${positions}" th:value="${p}" th:text="${p.displayName}"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{position}"></div>
                </div>

                <div class="mb-3">
                    <label for="birthDate" class="form-label">생년월일 <span class="text-danger">*</span></label>
                    <input type="date" id="birthDate" th:field="*{birthDate}"
                           class="form-control" th:classappend="${#fields.hasErrors('birthDate')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:errors="*{birthDate}"></div>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">연락처 <span class="text-danger">*</span></label>
                    <input type="tel" id="phone" th:field="*{phone}"
                           class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                           placeholder="010-0000-0000" required>
                    <div class="invalid-feedback" th:errors="*{phone}"></div>
                </div>

                <div class="mb-3">
                    <label for="emailPrefix" class="form-label">회사 이메일 <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <input type="text" id="emailPrefix" th:field="*{emailPrefix}"
                               class="form-control" th:classappend="${#fields.hasErrors('emailPrefix')} ? 'is-invalid'"
                               placeholder="이름" required>
                        <span class="input-group-text" th:text="'@' + ${emailDomain}"></span>
                    </div>
                    <div class="invalid-feedback d-block" th:errors="*{emailPrefix}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호 <span class="text-danger">*</span></label>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           placeholder="영문·숫자·특수문자 포함 8자 이상" required>
                    <div class="invalid-feedback" th:errors="*{password}"></div>
                    <div class="form-text">영문, 숫자, 특수문자를 모두 포함하여 8자 이상 입력해주세요.</div>
                </div>

                <div class="mb-4">
                    <label for="passwordConfirm" class="form-label">비밀번호 확인 <span class="text-danger">*</span></label>
                    <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                           class="form-control" th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'"
                           required>
                    <div class="invalid-feedback" th:errors="*{passwordConfirm}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">가입 신청</button>
            </form>

            <hr>
            <p class="text-center mb-0 small">
                이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
