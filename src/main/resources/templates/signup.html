<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-sm" style="width:100%;max-width:480px;">
        <div class="card-body p-4">
            <h1 class="h4 text-center mb-4">회원가입</h1>

            <div th:if="${errorMessage}" class="alert alert-danger" role="alert"
                 th:text="${errorMessage}"></div>

            <form th:action="@{/signup}" th:object="${signupRequest}" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">이름</label>
                    <input type="text" id="name" th:field="*{name}"
                           class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">회사 이메일</label>
                    <input type="email" id="email" th:field="*{email}"
                           class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           placeholder="name@eactive.co.kr" required>
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           placeholder="8자 이상" required>
                    <div class="invalid-feedback" th:errors="*{password}"></div>
                </div>
                <div class="mb-3">
                    <label for="passwordConfirm" class="form-label">비밀번호 확인</label>
                    <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                           class="form-control" th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'"
                           required>
                    <div class="invalid-feedback" th:errors="*{passwordConfirm}"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">가입 신청</button>
            </form>

            <hr>
            <p class="text-center mb-0 small">
                이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
