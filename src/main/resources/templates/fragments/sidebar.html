<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<th:block th:fragment="sidebar">

<aside id="appSidebar" class="app-sidebar">

  <!-- Brand -->
  <div class="sb-brand">
    <a th:href="@{/dashboard}" class="sb-brand-link">
      <div class="sb-brand-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <div>
        <div class="sb-brand-text">eActive Hub</div>
        <span class="sb-brand-sub">Resource Hub</span>
      </div>
    </a>
    <button id="sbCollapseBtn" type="button" class="sb-collapse-btn" title="사이드바 닫기" aria-label="사이드바 닫기">
      <i class="bi bi-chevron-left"></i>
    </button>
  </div>

  <!-- Nav -->
  <nav class="sb-nav">

    <!-- 내 화면 -->
    <div class="sb-section">
      <div class="sb-section-title">내 화면</div>
      <a th:href="@{/dashboard}"             class="sb-link" data-path="/dashboard"             data-exact="true"><i class="bi bi-house"></i><span>대시보드</span></a>
      <a th:href="@{/my/folder}"             class="sb-link" data-path="/my/folder"                             ><i class="bi bi-folder"></i><span>내 폴더</span></a>
      <a th:href="@{/shared/folders/public}" class="sb-link" data-path="/shared/folders/public"                 ><i class="bi bi-folder-symlink"></i><span>공용 폴더</span></a>
      <a th:href="@{/search}"                class="sb-link" data-path="/search"                                ><i class="bi bi-search"></i><span>문서 검색</span></a>
      <a th:href="@{/settings}"              class="sb-link" data-path="/settings"                              ><i class="bi bi-gear"></i><span>설정</span></a>
    </div>

    <!-- 영업·인력 -->
    <div class="sb-section" sec:authorize="hasAnyRole('ADMIN','SALES')">
      <div class="sb-section-title">영업·인력</div>
      <a th:href="@{/sales/calendar}"           class="sb-link" data-path="/sales/calendar"          ><i class="bi bi-calendar-range"></i><span>투입 캘린더</span></a>
      <a th:href="@{/sales/members}"            class="sb-link" data-path="/sales/members"            ><i class="bi bi-people"></i><span>전사 인력 조회</span></a>
      <a th:href="@{/sales/profiles}"           class="sb-link" data-path="/sales/profiles"           ><i class="bi bi-table"></i><span>인력표</span></a>
      <a th:href="@{/sales/career-calculator}"  class="sb-link" data-path="/sales/career-calculator"  ><i class="bi bi-calculator"></i><span>경력 계산기</span></a>
    </div>

    <!-- 관리자 -->
    <div class="sb-section" sec:authorize="hasRole('ADMIN')">
      <div class="sb-section-title">관리자</div>
      <a th:href="@{/admin}"                      class="sb-link" data-path="/admin"                      data-exact="true"><i class="bi bi-speedometer2"></i><span>관리자 대시보드</span></a>
      <a th:href="@{/admin/employees}"            class="sb-link" data-path="/admin/employees"                             ><i class="bi bi-person-lines-fill"></i><span>직원 관리</span></a>
      <a th:href="@{/admin/teams}"                class="sb-link" data-path="/admin/teams"                                 ><i class="bi bi-diagram-3"></i><span>팀 관리</span></a>
      <a th:href="@{/admin/teams/project-settings}" class="sb-link" data-path="/admin/teams/project-settings"              ><i class="bi bi-toggles"></i><span>팀 프로젝트 설정</span></a>
      <a th:href="@{/admin/documents/review}"     class="sb-link" data-path="/admin/documents/review"                      ><i class="bi bi-file-earmark-check"></i><span>문서 검토</span></a>
      <a th:href="@{/admin/documents/expiry}"     class="sb-link" data-path="/admin/documents/expiry"                      ><i class="bi bi-calendar-x"></i><span>만료 문서</span></a>
      <a th:href="@{/admin/statistics}"           class="sb-link" data-path="/admin/statistics"                            ><i class="bi bi-bar-chart"></i><span>통계</span></a>
      <a th:href="@{/admin/certificate}"          class="sb-link" data-path="/admin/certificate"                           ><i class="bi bi-file-earmark-text"></i><span>재직증명서</span></a>
      <a th:href="@{/admin/allowed-emails}"       class="sb-link" data-path="/admin/allowed-emails"                        ><i class="bi bi-envelope-check"></i><span>가입 허용</span></a>
      <a th:href="@{/admin/gc}"                   class="sb-link" data-path="/admin/gc"                                   ><i class="bi bi-trash3"></i><span>파일 GC</span></a>
    </div>

  </nav>

  <!-- User footer -->
  <div class="sb-footer">
    <div class="sb-user">
      <div class="sb-avatar"
           th:text="${currentUser != null ? #strings.substring(currentUser.name,0,1) : '?'}">?</div>
      <div>
        <div class="sb-user-name"
             th:text="${currentUser != null ? currentUser.name : ''}"></div>
        <div class="sb-user-role"
             th:text="${currentUser != null ? currentUser.role.displayName : ''}"></div>
      </div>
    </div>
    <form th:action="@{/logout}" method="post">
      <input type="hidden" name="_csrf" th:value="${_csrf.token}">
      <button type="submit" class="sb-logout">
        <i class="bi bi-box-arrow-right"></i><span> 로그아웃</span>
      </button>
    </form>
  </div>

</aside>

<script>
(function () {
  var p = window.location.pathname;

  /* Active nav link */
  document.querySelectorAll('.sb-link[data-path]').forEach(function (link) {
    var path  = link.getAttribute('data-path');
    var exact = link.getAttribute('data-exact') === 'true';
    var active = exact
      ? (p === path || p === path + '/')
      : p.startsWith(path);
    if (active) link.classList.add('active');
  });

  var sidebar = document.getElementById('appSidebar');
  if (!sidebar) return;

  /* ── Mobile toggle ── */
  var overlay = document.createElement('div');
  overlay.className = 'sb-overlay';
  document.body.appendChild(overlay);

  var mobileBtn = document.createElement('button');
  mobileBtn.className = 'sb-toggle';
  mobileBtn.setAttribute('aria-label', '메뉴 열기');
  mobileBtn.innerHTML = '<i class="bi bi-list"></i>';
  document.body.appendChild(mobileBtn);

  function mobileOpen()  { sidebar.classList.add('open');    overlay.classList.add('show'); }
  function mobileClose() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }

  mobileBtn.addEventListener('click', function () {
    sidebar.classList.contains('open') ? mobileClose() : mobileOpen();
  });
  overlay.addEventListener('click', mobileClose);

  /* ── Desktop collapse (icon-only mini mode) ── */
  var isMobile = function () { return window.innerWidth < 768; };
  var collapseBtn = document.getElementById('sbCollapseBtn');

  function desktopToggle() {
    var collapsed = document.body.classList.toggle('sidebar-collapsed');
    localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0');
  }

  /* Restore saved state on page load */
  if (!isMobile() && localStorage.getItem('sidebarCollapsed') === '1') {
    document.body.classList.add('sidebar-collapsed');
  }

  if (collapseBtn) {
    collapseBtn.addEventListener('click', desktopToggle);
  }
})();
</script>

</th:block>

</body>
</html>
