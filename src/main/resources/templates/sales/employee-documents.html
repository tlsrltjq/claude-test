<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 문서 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .doc-thumbnail { width:100%; height:140px; object-fit:cover; }
        .doc-thumbnail-placeholder { width:100%; height:140px; display:flex; align-items:center; justify-content:center; background:#f5f5f5; color:#aaa; font-size:2.5rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/sales/profiles}" class="btn btn-outline-light btn-sm">← 인력 표</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="mb-3">
        <h2 class="mb-0">문서 목록</h2>
        <p class="text-muted mb-0"
           th:text="${member.name + ' (' + member.email + ')' +
                      (member.team != null ? ' | ' + member.team.name : '') +
                      (member.position != null ? ' | ' + member.position.displayName : '')}"></p>
    </div>

    <div th:if="${documents == null or #lists.isEmpty(documents)}" class="alert alert-info">업로드된 문서가 없습니다.</div>

    <div id="cardGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3"
         th:if="${documents != null and not #lists.isEmpty(documents)}">
        <div th:each="doc : ${documents}" class="col">
            <div class="card h-100">
                <div th:if="${doc.currentVersion != null and doc.currentVersion.thumbnailStoragePath != null}">
                    <img th:src="@{/documents/{id}/thumbnail(id=${doc.currentVersion.id})}"
                         class="card-img-top doc-thumbnail" alt="썸네일"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="doc-thumbnail-placeholder" style="display:none;">📄</div>
                </div>
                <div th:if="${doc.currentVersion == null or doc.currentVersion.thumbnailStoragePath == null}"
                     class="doc-thumbnail-placeholder">📄</div>
                <div class="card-body p-2">
                    <span th:text="${doc.documentType.displayName}"
                          class="badge bg-secondary mb-1"></span>
                    <h6 class="card-title mb-1 text-truncate" th:text="${doc.title}"></h6>
                    <small class="text-muted d-block text-truncate"
                           th:text="${doc.currentVersion != null ? doc.currentVersion.originalFileName : '-'}"></small>
                    <small class="text-muted"
                           th:text="${doc.currentVersion != null ? 'v' + doc.currentVersion.versionNo : ''}"></small>
                </div>
                <div class="card-footer p-2 d-flex gap-1" th:if="${doc.currentVersion != null}">
                    <a th:href="@{/documents/{id}/preview(id=${doc.currentVersion.id})}"
                       target="_blank" class="btn btn-outline-secondary btn-sm flex-fill">미리보기</a>
                    <a th:href="@{/documents/{id}/download(id=${doc.currentVersion.id})}"
                       class="btn btn-outline-primary btn-sm flex-fill">다운로드</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
