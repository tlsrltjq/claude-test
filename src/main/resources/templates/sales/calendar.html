<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${ym.year}년 ${ym.monthValue}월 투입 캘린더 — eActive Resource Hub|">투입 캘린더</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: .6rem 0; }
        .topnav .brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.5); color: #fff; font-size: .8rem; padding: .3rem .75rem; border-radius: 6px; }
        .btn-nav:hover { background: rgba(255,255,255,.15); color: #fff; }
        .btn-nav.active { background: rgba(255,255,255,.2); border-color: #fff; }

        /* ── 페이지 헤더 ── */
        .page-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); border-radius: 14px; padding: 1.4rem 1.75rem; color: #fff; margin-bottom: 1.25rem; }
        .page-header h2 { font-size: 1.2rem; font-weight: 700; margin: 0 0 .15rem; }
        .page-header .sub { font-size: .85rem; opacity: .8; }

        /* ── 필터 바 ── */
        .filter-bar { background: #fff; border-radius: 12px; padding: .75rem 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 1rem; }
        .filter-bar .form-control, .filter-bar .form-select { font-size: .85rem; border-radius: 8px; }
        .filter-bar label { font-size: .75rem; font-weight: 600; color: #6c757d; margin-bottom: .2rem; }

        /* ── 월 네비게이션 ── */
        .month-nav { display: flex; align-items: center; gap: .6rem; }
        .month-nav .month-title { font-size: 1.05rem; font-weight: 700; color: #1e3a5f; min-width: 110px; text-align: center; }
        .btn-month { border: 1.5px solid #dee2e6; color: #495057; background: #fff; border-radius: 8px; padding: .3rem .7rem; font-size: .85rem; text-decoration: none; transition: all .15s; }
        .btn-month:hover { border-color: #0d6efd; color: #0d6efd; }

        /* ── 캘린더 그리드 ── */
        .cal-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; margin-bottom: 1.25rem; }
        .cal-table { width: 100%; table-layout: fixed; border-collapse: collapse; }
        .cal-table th {
            background: #1e3a5f; color: #fff; font-size: .75rem; font-weight: 600;
            text-align: center; padding: .55rem 0; border: none; letter-spacing: .04em;
        }
        .cal-table th.cal-sun { color: #fca5a5; }
        .cal-table th.cal-sat { color: #93c5fd; }
        .cal-cell {
            vertical-align: top; border: 1px solid #f0f2f5;
            padding: .35rem .4rem; height: 100px; min-width: 0;
        }
        .cal-empty { background: #fafafa; }
        .cal-today { background: #eff6ff; }
        .cal-cell.cal-sun .cal-num { color: #dc2626; }
        .cal-cell.cal-sat .cal-num { color: #2563eb; }
        .cal-num {
            font-size: .78rem; font-weight: 700; color: #374151;
            margin-bottom: .2rem; display: inline-block;
        }
        .cal-num-today {
            background: #0d6efd; color: #fff; border-radius: 50%;
            width: 22px; height: 22px; display: inline-flex;
            align-items: center; justify-content: center; font-size: .72rem;
        }
        .cal-chips { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
        .cal-chip {
            display: block; border-radius: 4px; padding: 1px 5px;
            font-size: .67rem; font-weight: 600; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
            text-decoration: none; line-height: 1.5;
            border-left: 3px solid transparent;
        }
        .cal-chip:hover { opacity: .85; text-decoration: none; }
        /* 상태별 색상 */
        .chip-planned  { background: #dbeafe; color: #1d4ed8; border-left-color: #3b82f6; }
        .chip-active   { background: #dcfce7; color: #15803d; border-left-color: #22c55e; }
        .chip-ended    { background: #f3f4f6; color: #6b7280; border-left-color: #9ca3af; }
        .chip-cancelled{ background: #fee2e2; color: #dc2626; border-left-color: #ef4444; }
        .cal-more { font-size: .65rem; color: #9ca3af; padding-left: 4px; }

        /* ── 배정 목록 테이블 ── */
        .list-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; }
        .list-card .card-head {
            padding: .8rem 1.1rem; border-bottom: 1px solid #f0f2f5;
            font-size: .8rem; font-weight: 700; color: #1e3a5f;
            display: flex; align-items: center; gap: .4rem;
        }
        .assign-table { font-size: .82rem; margin: 0; }
        .assign-table thead th {
            background: #1e3a5f; color: #fff; font-weight: 600; font-size: .75rem;
            padding: .6rem .75rem; border: none; white-space: nowrap;
        }
        .assign-table tbody td { padding: .6rem .75rem; vertical-align: middle; border-color: #f0f2f5; }
        .assign-table tbody tr:hover { background: #f8f9ff; }
        .assign-table tbody tr:target { background: #fffbeb; }

        /* 상태 뱃지 */
        .badge-planned  { background: #dbeafe; color: #1d4ed8; }
        .badge-active   { background: #dcfce7; color: #15803d; }
        .badge-ended    { background: #f3f4f6; color: #6b7280; }
        .badge-cancelled{ background: #fee2e2; color: #dc2626; }

        .btn-xs { padding: .15rem .45rem; font-size: .72rem; border-radius: 5px; }
        .empty-state { text-align: center; padding: 3rem 1rem; color: #adb5bd; }
        .empty-state i { font-size: 2.5rem; margin-bottom: .75rem; display: block; }
    </style>
</head>
<body>

<!-- ── 네비게이션 바 ── -->
<nav class="topnav">
    <div class="container d-flex align-items-center gap-3">
        <a th:href="@{/dashboard}" class="brand me-auto">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i>eActive Resource Hub
        </a>
        <a th:href="@{/sales/profiles}" class="btn btn-nav btn-sm">
            <i class="bi bi-table me-1"></i>인력 표
        </a>
        <a th:href="@{/sales/calendar}" class="btn btn-nav btn-sm active">
            <i class="bi bi-calendar-range-fill me-1"></i>투입 캘린더
        </a>
        <a th:href="@{/dashboard}" class="btn btn-nav btn-sm">
            <i class="bi bi-house me-1"></i>대시보드
        </a>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-nav btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>로그아웃
            </button>
        </form>
    </div>
</nav>

<div class="container py-4">

    <!-- ── 페이지 헤더 + 월 네비 ── -->
    <div class="page-header d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div>
            <h2><i class="bi bi-calendar-range-fill me-2"></i>프로젝트 투입 캘린더</h2>
            <div class="sub">
                총 <strong th:text="${#lists.size(allAssignments)}">0</strong>건
                <span th:if="${filterStatus != null}">
                    — <span th:text="${filterStatus.displayName}">상태</span> 필터 적용
                </span>
            </div>
        </div>
        <div class="month-nav">
            <a th:href="@{/sales/calendar(year=${prev.year},month=${prev.monthValue},q=${q},project=${project},status=${filterStatus})}"
               class="btn-month"><i class="bi bi-chevron-left"></i></a>
            <span class="month-title"
                  th:text="|${ym.year}년 ${ym.monthValue}월|">2026년 5월</span>
            <a th:href="@{/sales/calendar(year=${next.year},month=${next.monthValue},q=${q},project=${project},status=${filterStatus})}"
               class="btn-month"><i class="bi bi-chevron-right"></i></a>
        </div>
    </div>

    <!-- ── 알림 배너 ── -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 px-3 mb-2" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2 px-3 mb-2" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${overlapWarning}" class="alert alert-warning alert-dismissible fade show py-2 px-3 mb-2" role="alert">
        <i class="bi bi-exclamation-circle-fill me-1"></i>
        <span th:text="${overlapWarning}"></span>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>

    <!-- ── 필터 바 ── -->
    <div class="filter-bar">
        <form method="get" th:action="@{/sales/calendar}" class="row g-2 align-items-end">
            <input type="hidden" name="year"  th:value="${ym.year}">
            <input type="hidden" name="month" th:value="${ym.monthValue}">
            <div class="col-sm-4 col-md-3">
                <label>직원명</label>
                <input type="text" name="q" class="form-control form-control-sm"
                       placeholder="직원 이름 검색" th:value="${q}">
            </div>
            <div class="col-sm-4 col-md-3">
                <label>프로젝트명</label>
                <input type="text" name="project" class="form-control form-control-sm"
                       placeholder="프로젝트명 검색" th:value="${project}">
            </div>
            <div class="col-sm-4 col-md-2">
                <label>상태</label>
                <select name="status" class="form-select form-select-sm">
                    <option value="">전체</option>
                    <option th:each="s : ${allStatuses}"
                            th:value="${s.name()}"
                            th:text="${s.displayName}"
                            th:selected="${s == filterStatus}">상태</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-search me-1"></i>검색
                </button>
                <a th:href="@{/sales/calendar(year=${ym.year},month=${ym.monthValue})}"
                   class="btn btn-outline-secondary btn-sm ms-1">초기화</a>
            </div>
            <!-- ADMIN: 프로젝트 등록 버튼 -->
            <div class="col-auto ms-auto" th:if="${currentUser.role.name() == 'ADMIN'}">
                <button type="button" class="btn btn-success btn-sm"
                        data-bs-toggle="modal" data-bs-target="#createProjectModal">
                    <i class="bi bi-plus-lg me-1"></i>프로젝트 등록
                </button>
            </div>
        </form>
    </div>

    <!-- ── 캘린더 그리드 ── -->
    <div class="cal-card mb-3">
        <table class="cal-table">
            <thead>
                <tr>
                    <th class="cal-sun">일</th>
                    <th>월</th>
                    <th>화</th>
                    <th>수</th>
                    <th>목</th>
                    <th>금</th>
                    <th class="cal-sat">토</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="week, wStat : ${weeks}">
                    <td th:each="day, dStat : ${week}"
                        th:class="${day == null}
                            ? 'cal-cell cal-empty'
                            : (${day.equals(today)}
                                ? 'cal-cell cal-today ' + (${dStat.index == 0} ? 'cal-sun' : (${dStat.index == 6} ? 'cal-sat' : ''))
                                : 'cal-cell ' + (${dStat.index == 0} ? 'cal-sun' : (${dStat.index == 6} ? 'cal-sat' : '')))">
                        <div th:if="${day != null}">
                            <!-- 날짜 숫자 -->
                            <span th:if="${day.equals(today)}" class="cal-num cal-num-today"
                                  th:text="${day.dayOfMonth}">1</span>
                            <span th:unless="${day.equals(today)}" class="cal-num"
                                  th:text="${day.dayOfMonth}">1</span>
                            <!-- 배정 칩 -->
                            <div class="cal-chips">
                                <th:block th:each="pa, paStat : ${dayMap[day]}">
                                    <a th:if="${paStat.index < 3}"
                                       th:href="'#row-' + ${pa.id}"
                                       th:classappend="${'chip-' + #strings.toLowerCase(pa.status.name())}"
                                       class="cal-chip"
                                       th:title="|${pa.user.name} · ${pa.project.name} (${pa.startDate} ~ ${pa.endDate})|">
                                        <span th:text="${pa.user.name}">이름</span>
                                        <span class="fw-normal opacity-75"
                                              th:text="${' · ' + pa.project.name}"></span>
                                    </a>
                                    <span th:if="${paStat.index == 3 and !paStat.last}" class="cal-more"
                                          th:text="|+${#lists.size(dayMap[day]) - 3}건 더|"></span>
                                </th:block>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ── 배정 목록 테이블 ── -->
    <div class="list-card">
        <div class="card-head">
            <i class="bi bi-list-ul"></i>
            <span th:text="|이번달 배정 목록 (${#lists.size(allAssignments)}건)|">배정 목록</span>
        </div>

        <!-- 빈 상태 -->
        <div th:if="${#lists.isEmpty(allAssignments)}" class="empty-state">
            <i class="bi bi-calendar-x"></i>
            <div class="fw-600 mb-1" style="color:#6c757d;">이번달 배정이 없습니다.</div>
            <div style="font-size:.82rem; color:#adb5bd;">
                필터를 조정하거나 [투입 등록]으로 배정을 추가하세요.
            </div>
        </div>

        <!-- 목록 테이블 -->
        <div th:if="${!#lists.isEmpty(allAssignments)}" class="table-responsive">
            <table class="table assign-table">
                <thead>
                    <tr>
                        <th>직원</th>
                        <th>프로젝트명</th>
                        <th>고객사</th>
                        <th>역할</th>
                        <th>투입 시작</th>
                        <th>종료일</th>
                        <th>잔여일</th>
                        <th>상태</th>
                        <th th:if="${currentUser.role.name() == 'ADMIN'}">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pa : ${allAssignments}" th:id="'row-' + ${pa.id}">
                        <td>
                            <div class="fw-600" th:text="${pa.user.name}">이름</div>
                            <div style="font-size:.73rem; color:#adb5bd;"
                                 th:text="${pa.user.team != null ? pa.user.team.name : '-'}">팀</div>
                        </td>
                        <td class="fw-600">
                            <a th:href="@{/sales/projects/{id}(id=${pa.project.id})}"
                               th:text="${pa.project.name}" class="text-decoration-none text-dark">프로젝트</a>
                        </td>
                        <td th:text="${pa.project.clientName != null ? pa.project.clientName : '-'}">고객사</td>
                        <td th:text="${pa.role != null ? pa.role : '-'}">역할</td>
                        <td th:text="${#temporals.format(pa.startDate, 'yyyy.MM.dd')}">시작일</td>
                        <td th:text="${#temporals.format(pa.endDate, 'yyyy.MM.dd')}">종료일</td>
                        <td>
                            <span th:if="${pa.status.name() == 'ENDED' or pa.status.name() == 'CANCELLED'}"
                                  class="text-muted">—</span>
                            <span th:unless="${pa.status.name() == 'ENDED' or pa.status.name() == 'CANCELLED'}"
                                  th:text="${pa.remainingDays() + '일'}">N일</span>
                        </td>
                        <td>
                            <span class="badge rounded-pill px-2 py-1"
                                  th:classappend="${'badge-' + #strings.toLowerCase(pa.status.name())}"
                                  th:text="${pa.status.displayName}">상태</span>
                        </td>
                        <td th:if="${currentUser.role.name() == 'ADMIN'}">
                            <div class="d-flex gap-1">
                                <a th:href="@{/sales/projects/{id}(id=${pa.project.id})}"
                                   class="btn btn-xs btn-outline-primary">
                                    <i class="bi bi-arrow-right"></i>
                                </a>
                                <form th:action="@{/sales/assignments/{id}/delete(id=${pa.id})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('이 배정을 삭제하시겠습니까?')">
                                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-xs btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div><!-- /container -->

<!-- ══════════════════════════════════════════════════════════
     ADMIN: 프로젝트 등록 모달
════════════════════════════════════════════════════════════ -->
<div th:if="${currentUser.role.name() == 'ADMIN'}"
     class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/projects}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="modal-header py-2 px-3">
                    <h6 class="modal-title fw-700">
                        <i class="bi bi-folder-plus me-1 text-success"></i>프로젝트 등록
                    </h6>
                    <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-3 py-3">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-600 small">프로젝트명 <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control form-control-sm"
                                   placeholder="프로젝트명" required maxlength="200">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-600 small">고객사</label>
                            <input type="text" name="clientName" class="form-control form-control-sm"
                                   placeholder="고객사명" maxlength="200">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-600 small">시작일 <span class="text-danger">*</span></label>
                            <input type="date" name="startDate" class="form-control form-control-sm" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-600 small">종료일 <span class="text-danger">*</span></label>
                            <input type="date" name="endDate" class="form-control form-control-sm" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-600 small">메모</label>
                            <textarea name="memo" class="form-control form-control-sm" rows="2"
                                      placeholder="특이사항 등"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-600 small">투입 직원 선택</label>
                            <div class="border rounded p-2" style="max-height:160px;overflow-y:auto;">
                                <div th:each="u : ${assignableUsers}" class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           name="selectedUserIds" th:value="${u.id}"
                                           th:id="|chk-${u.id}|">
                                    <label class="form-check-label small"
                                           th:for="|chk-${u.id}|"
                                           th:text="${u.name + (u.team != null ? ' (' + u.team.name + ')' : '')}">직원</label>
                                </div>
                                <div th:if="${#lists.isEmpty(assignableUsers)}"
                                     class="text-muted small">활성 직원이 없습니다.</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer py-2 px-3">
                    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-success btn-sm">
                        <i class="bi bi-check-lg me-1"></i>등록
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* 칩 클릭 시 해당 테이블 행으로 스크롤 + 하이라이트 */
    document.querySelectorAll('.cal-chip').forEach(function(chip) {
        chip.addEventListener('click', function(e) {
            var href = this.getAttribute('href');
            if (!href || !href.startsWith('#row-')) return;
            var row = document.querySelector(href);
            if (row) {
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                row.classList.add('table-warning');
                setTimeout(function() { row.classList.remove('table-warning'); }, 2000);
            }
        });
    });
</script>
</body>
</html>
