<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로젝트 등록 — eActive Resource Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <style>
    .user-item {
      cursor: pointer;
      border-bottom: 1px solid #f3f4f6;
      transition: background .1s;
    }
    .user-item:last-child { border-bottom: none; }
    .user-item:hover { background: #f8faff; }
    .user-item.selected { background: #eff6ff; }
    .user-item.selected .user-name { color: #1d4ed8; font-weight: 600; }
    .user-item .check-icon { color: #1d4ed8; display: none; }
    .user-item.selected .check-icon { display: inline; }
    .selected-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: #eff6ff; color: #1d4ed8;
      border: 1px solid #bfdbfe; border-radius: 999px;
      font-size: .78rem; padding: 2px 10px;
    }
    .selected-tag .rm { cursor: pointer; opacity: .6; font-size: .85em; }
    .selected-tag .rm:hover { opacity: 1; }
    #user-list-wrap { max-height: 420px; overflow-y: auto; }
    .section-title {
      font-size: .7rem; font-weight: 700; letter-spacing: .05em;
      color: #9ca3af; text-transform: uppercase; padding: .5rem .75rem .25rem;
    }
  </style>
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-folder-plus me-2 text-success"></i>프로젝트 등록</h1>
          <p class="page-hd-sub">새 프로젝트를 등록하고 투입 직원을 지정합니다.</p>
        </div>
        <div class="page-hd-actions">
          <a th:href="@{/sales/calendar}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>캘린더로
          </a>
        </div>
      </div>

      <form th:action="@{/sales/projects}" method="post" id="projectForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="row g-4">

          <!-- ── 왼쪽: 프로젝트 정보 ── -->
          <div class="col-lg-5">
            <div class="card shadow-sm">
              <div class="card-body p-4">
                <h6 class="fw-700 mb-4" style="color:#374151">
                  <i class="bi bi-info-circle me-1 text-primary"></i>프로젝트 정보
                </h6>

                <div class="mb-3">
                  <label class="form-label fw-600">프로젝트명 <span class="text-danger">*</span></label>
                  <input type="text" name="name" class="form-control"
                         placeholder="예: 2026 시스템 고도화" required maxlength="200" autofocus>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-600">고객사</label>
                  <input type="text" name="clientName" class="form-control"
                         placeholder="예: (주)이액티브" maxlength="200">
                </div>

                <div class="row g-3 mb-3">
                  <div class="col-6">
                    <label class="form-label fw-600">시작일 <span class="text-danger">*</span></label>
                    <span class="date-split" id="startDate">
                      <input type="text" class="date-seg date-seg-y" maxlength="4" placeholder="YYYY" inputmode="numeric" autocomplete="off" required>
                      <span class="date-sep">.</span>
                      <input type="text" class="date-seg date-seg-m" maxlength="2" placeholder="MM" inputmode="numeric" autocomplete="off">
                      <span class="date-sep">.</span>
                      <input type="text" class="date-seg date-seg-d" maxlength="2" placeholder="DD" inputmode="numeric" autocomplete="off">
                      <input type="hidden" name="startDate">
                    </span>
                  </div>
                  <div class="col-6">
                    <label class="form-label fw-600">종료일 <span class="text-danger">*</span></label>
                    <span class="date-split" id="endDate">
                      <input type="text" class="date-seg date-seg-y" maxlength="4" placeholder="YYYY" inputmode="numeric" autocomplete="off" required>
                      <span class="date-sep">.</span>
                      <input type="text" class="date-seg date-seg-m" maxlength="2" placeholder="MM" inputmode="numeric" autocomplete="off">
                      <span class="date-sep">.</span>
                      <input type="text" class="date-seg date-seg-d" maxlength="2" placeholder="DD" inputmode="numeric" autocomplete="off">
                      <input type="hidden" name="endDate">
                    </span>
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-600">메모</label>
                  <textarea name="memo" class="form-control" rows="4"
                            placeholder="특이사항, 계약 조건 등"></textarea>
                </div>

                <!-- 선택된 직원 요약 -->
                <div>
                  <div class="d-flex align-items-center justify-content-between mb-2">
                    <label class="form-label fw-600 mb-0">선택된 직원</label>
                    <span id="selected-count" class="badge bg-primary" style="display:none">0명</span>
                  </div>
                  <div id="selected-tags" class="d-flex flex-wrap gap-2 p-3 rounded"
                       style="min-height:52px; border:1px dashed #d1d5db; background:#fafafa;">
                    <span class="text-muted small align-self-center" id="tags-placeholder">
                      오른쪽에서 직원을 선택하세요
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- ── 오른쪽: 직원 선택 ── -->
          <div class="col-lg-7">
            <div class="card shadow-sm h-100">
              <div class="card-body p-4">
                <h6 class="fw-700 mb-3" style="color:#374151">
                  <i class="bi bi-people me-1 text-primary"></i>투입 직원 선택
                  <span class="fw-400 text-muted" style="font-size:.78rem">
                    (복수 선택 가능)
                  </span>
                </h6>

                <!-- 검색 + 팀 필터 -->
                <div class="d-flex gap-2 mb-3">
                  <div class="input-group input-group-sm" style="flex:1">
                    <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" id="u-search" class="form-control border-start-0"
                           placeholder="이름 검색..." autocomplete="off">
                  </div>
                  <select id="u-team" class="form-select form-select-sm" style="width:140px">
                    <option value="">전체 팀</option>
                  </select>
                  <button type="button" id="u-select-all" class="btn btn-sm btn-outline-secondary"
                          style="white-space:nowrap">전체 선택</button>
                </div>

                <!-- 직원 목록 -->
                <div id="user-list-wrap" class="border rounded">
                  <div th:if="${#lists.isEmpty(assignableUsers)}"
                       class="text-muted small p-4 text-center">
                    <i class="bi bi-person-x d-block mb-1" style="font-size:1.5rem"></i>
                    활성 직원이 없습니다.
                  </div>

                  <!-- 팀별 그룹은 JS가 동적 생성 — 초기 데이터용 hidden 목록 -->
                  <div id="user-data" style="display:none">
                    <div th:each="u : ${assignableUsers}"
                         th:attr="data-uid=${u.id}, data-name=${u.name}, data-team=${u.team != null ? u.team.name : ''}">
                    </div>
                  </div>
                  <div id="user-list-body"></div>
                  <div id="u-empty" class="text-muted small p-4 text-center" style="display:none">
                    <i class="bi bi-search d-block mb-1" style="font-size:1.3rem"></i>
                    검색 결과가 없습니다.
                  </div>
                </div>

                <!-- 필터 적용 시 건수 -->
                <div class="d-flex justify-content-between mt-2">
                  <span id="u-visible-count" class="text-muted" style="font-size:.75rem"></span>
                  <button type="button" id="u-clear-selection"
                          class="btn btn-link btn-sm p-0 text-danger" style="font-size:.78rem;display:none">
                    선택 전체 해제
                  </button>
                </div>
              </div>
            </div>
          </div>

        </div><!-- /.row -->

        <!-- 하단 액션 버튼 -->
        <div class="d-flex justify-content-end gap-2 mt-4 pb-4">
          <a th:href="@{/sales/calendar}" class="btn btn-outline-secondary">
            <i class="bi bi-x-lg me-1"></i>취소
          </a>
          <button type="submit" class="btn btn-success px-4">
            <i class="bi bi-check-lg me-1"></i>프로젝트 등록
          </button>
        </div>

      </form>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/date-utils.js}"></script>
<script th:attr="nonce=${cspNonce}">
(function () {

  /* ── 데이터 수집 ── */
  var rawItems = Array.from(document.querySelectorAll('#user-data > div')).map(function (el) {
    return { uid: el.dataset.uid, name: el.dataset.name, team: el.dataset.team || '' };
  });
  var selectedIds = new Set();

  /* ── 팀 옵션 생성 ── */
  var teamSel = document.getElementById('u-team');
  var teams = Array.from(new Set(rawItems.map(function (u) { return u.team; }).filter(Boolean))).sort();
  teams.forEach(function (t) {
    var opt = document.createElement('option'); opt.value = t; opt.textContent = t;
    teamSel.appendChild(opt);
  });

  /* ── 필터링된 목록 렌더링 ── */
  function renderList() {
    var q    = document.getElementById('u-search').value.trim().toLowerCase();
    var team = teamSel.value;
    var listBody = document.getElementById('user-list-body');
    var emptyEl  = document.getElementById('u-empty');
    var visEl    = document.getElementById('u-visible-count');

    var filtered = rawItems.filter(function (u) {
      return (!q    || u.name.toLowerCase().includes(q))
          && (!team || u.team === team);
    });

    if (filtered.length === 0) {
      listBody.innerHTML = '';
      emptyEl.style.display = '';
      visEl.textContent = '';
      return;
    }
    emptyEl.style.display = 'none';

    // 팀별 그룹핑
    var groups = {};
    filtered.forEach(function (u) {
      var key = u.team || '팀 미배정';
      if (!groups[key]) groups[key] = [];
      groups[key].push(u);
    });

    var html = '';
    Object.keys(groups).sort().forEach(function (grp) {
      html += '<div class="section-title">' + escHtml(grp) + '</div>';
      groups[grp].forEach(function (u) {
        var sel = selectedIds.has(u.uid) ? ' selected' : '';
        html += '<div class="user-item d-flex align-items-center px-3 py-2' + sel + '"'
              + ' data-uid="' + escHtml(u.uid) + '"'
              + ' data-name="' + escHtml(u.name) + '"'
              + ' data-team="' + escHtml(u.team) + '">'
              + '<i class="bi bi-check2-circle check-icon me-2"></i>'
              + '<span class="user-name flex-grow-1">' + escHtml(u.name) + '</span>'
              + '<span class="text-muted" style="font-size:.73rem">' + escHtml(u.team) + '</span>'
              + '</div>';
      });
    });
    listBody.innerHTML = html;

    var total = rawItems.length;
    visEl.textContent = filtered.length < total
      ? filtered.length + '명 표시 (전체 ' + total + '명)'
      : total + '명';
  }

  /* ── 선택 상태 → 태그 + hidden input 동기화 ── */
  function syncSelected() {
    // hidden checkbox input 제거 후 재생성
    document.querySelectorAll('input[name="selectedUserIds"]').forEach(function (el) { el.remove(); });
    var form = document.getElementById('projectForm');
    selectedIds.forEach(function (uid) {
      var inp = document.createElement('input');
      inp.type = 'hidden'; inp.name = 'selectedUserIds'; inp.value = uid;
      form.appendChild(inp);
    });

    // 태그 갱신
    var tagsEl = document.getElementById('selected-tags');
    var placeholder = document.getElementById('tags-placeholder');
    var countEl = document.getElementById('selected-count');
    var clearBtn = document.getElementById('u-clear-selection');
    tagsEl.querySelectorAll('.selected-tag').forEach(function (el) { el.remove(); });

    if (selectedIds.size === 0) {
      placeholder.style.display = '';
      countEl.style.display = 'none';
      clearBtn.style.display = 'none';
    } else {
      placeholder.style.display = 'none';
      countEl.textContent = selectedIds.size + '명 선택';
      countEl.style.display = '';
      clearBtn.style.display = '';

      selectedIds.forEach(function (uid) {
        var u = rawItems.find(function (x) { return x.uid === uid; });
        if (!u) return;
        var tag = document.createElement('span');
        tag.className = 'selected-tag';
        tag.innerHTML = escHtml(u.name)
          + '<span class="rm" data-uid="' + escHtml(uid) + '">✕</span>';
        tagsEl.appendChild(tag);
      });
    }
  }

  /* ── 이벤트: 목록 클릭 ── */
  document.getElementById('user-list-body').addEventListener('click', function (e) {
    var item = e.target.closest('.user-item');
    if (!item) return;
    var uid = item.dataset.uid;
    if (selectedIds.has(uid)) {
      selectedIds.delete(uid);
      item.classList.remove('selected');
    } else {
      selectedIds.add(uid);
      item.classList.add('selected');
    }
    syncSelected();
  });

  /* ── 이벤트: 태그 ✕ 클릭 ── */
  document.getElementById('selected-tags').addEventListener('click', function (e) {
    var rm = e.target.closest('.rm');
    if (!rm) return;
    var uid = rm.dataset.uid;
    selectedIds.delete(uid);
    var item = document.querySelector('.user-item[data-uid="' + uid + '"]');
    if (item) item.classList.remove('selected');
    syncSelected();
  });

  /* ── 이벤트: 검색 + 팀 필터 ── */
  document.getElementById('u-search').addEventListener('input', renderList);
  teamSel.addEventListener('change', renderList);

  /* ── 전체 선택 ── */
  document.getElementById('u-select-all').addEventListener('click', function () {
    var q    = document.getElementById('u-search').value.trim().toLowerCase();
    var team = teamSel.value;
    rawItems.filter(function (u) {
      return (!q || u.name.toLowerCase().includes(q)) && (!team || u.team === team);
    }).forEach(function (u) { selectedIds.add(u.uid); });
    renderList();
    syncSelected();
  });

  /* ── 선택 전체 해제 ── */
  document.getElementById('u-clear-selection').addEventListener('click', function () {
    selectedIds.clear();
    renderList();
    syncSelected();
  });

  /* ── 날짜 자동 보정: 종료일이 시작일보다 앞이면 맞춤 ── */
  document.getElementById('startDate').addEventListener('change', function () {
    var endEl = document.getElementById('endDate');
    if (endEl.value && endEl.value < this.value) endEl.value = this.value;
  });

  /* ── 로딩 오버레이 ── */
  document.getElementById('projectForm').addEventListener('submit', function () {
    document.getElementById('loadingOverlay').style.display = 'flex';
  });

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 초기 렌더링 ── */
  renderList();

})();
</script>

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>

</body>
</html>
