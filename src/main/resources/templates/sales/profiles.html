<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인력 표 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .profiles-table { font-size: 0.82rem; }
        .profiles-table th { white-space: nowrap; background: #343a40; color: #fff; position: sticky; top: 0; }
        .profiles-table td { white-space: nowrap; vertical-align: middle; }
        .doc-cell { min-width: 110px; }
        .btn-xs { padding: 0.1rem 0.35rem; font-size: 0.72rem; }
        .sort-link { color: #fff; text-decoration: none; }
        .sort-link:hover { color: #ccc; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/sales/profiles}" class="btn btn-outline-light btn-sm">인력 표</a>
            <a th:href="@{/sales/members}" class="btn btn-outline-light btn-sm">인력 목록</a>
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">
    <h2 class="mb-2 h5">인력 표</h2>

    <!-- 검색/필터 폼 -->
    <form method="get" th:action="@{/sales/profiles}" class="row g-2 mb-2 align-items-center">
        <div class="col-auto">
            <input type="text" name="q" class="form-control form-control-sm"
                   placeholder="이름/이메일" th:value="${query.q}">
        </div>
        <div class="col-auto">
            <select name="position" class="form-select form-select-sm">
                <option value="">전체 직급</option>
                <option th:each="pos : ${positions}"
                        th:value="${pos.name()}"
                        th:text="${pos.displayName}"
                        th:selected="${query.position != null and query.position == pos.name()}"></option>
            </select>
        </div>
        <div class="col-auto">
            <input type="text" name="developerGrade" class="form-control form-control-sm"
                   placeholder="개발자 등급" th:value="${query.developerGrade}">
        </div>
        <input type="hidden" name="sort" th:value="${query.sort}">
        <input type="hidden" name="direction" th:value="${query.direction}">
        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm">검색</button>
            <a th:href="@{/sales/profiles}" class="btn btn-outline-secondary btn-sm ms-1">초기화</a>
        </div>
    </form>

    <!-- 컬럼 설정 -->
    <div class="mb-2">
        <button class="btn btn-outline-secondary btn-sm" type="button"
                data-bs-toggle="collapse" data-bs-target="#column-toggle">컬럼 설정</button>
        <div class="collapse border rounded p-2 mt-1" id="column-toggle">
            <div class="d-flex flex-wrap gap-3 small">
                <label class="mb-0"><input type="checkbox" id="chk-position" onchange="toggleCol('position',this.checked)"> 직급</label>
                <label class="mb-0"><input type="checkbox" id="chk-age" onchange="toggleCol('age',this.checked)"> 나이</label>
                <label class="mb-0"><input type="checkbox" id="chk-birthDate" onchange="toggleCol('birthDate',this.checked)"> 생년월일</label>
                <label class="mb-0"><input type="checkbox" id="chk-phone" onchange="toggleCol('phone',this.checked)"> 연락처</label>
                <label class="mb-0"><input type="checkbox" id="chk-email" onchange="toggleCol('email',this.checked)"> 이메일</label>
                <label class="mb-0"><input type="checkbox" id="chk-developerGrade" onchange="toggleCol('developerGrade',this.checked)"> 개발자 등급</label>
                <label class="mb-0"><input type="checkbox" id="chk-career" onchange="toggleCol('career',this.checked)"> 경력</label>
                <label class="mb-0"><input type="checkbox" id="chk-resume" onchange="toggleCol('resume',this.checked)"> 이력서</label>
                <label class="mb-0"><input type="checkbox" id="chk-careerDescription" onchange="toggleCol('careerDescription',this.checked)"> 경력기술서</label>
                <label class="mb-0"><input type="checkbox" id="chk-license" onchange="toggleCol('license',this.checked)"> 자격증</label>
                <label class="mb-0"><input type="checkbox" id="chk-graduationCertificate" onchange="toggleCol('graduationCertificate',this.checked)"> 졸업증명서</label>
                <label class="mb-0"><input type="checkbox" id="chk-healthInsuranceProof" onchange="toggleCol('healthInsuranceProof',this.checked)"> 건강보험득실</label>
                <label class="mb-0"><input type="checkbox" id="chk-employmentCertificate" onchange="toggleCol('employmentCertificate',this.checked)"> 재직증명서</label>
                <label class="mb-0"><input type="checkbox" id="chk-etc" onchange="toggleCol('etc',this.checked)"> 기타자료</label>
                <label class="mb-0"><input type="checkbox" id="chk-updatedAt" onchange="toggleCol('updatedAt',this.checked)"> 업데이트</label>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(rows)}" class="alert alert-info">조건에 맞는 직원이 없습니다.</div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(rows)}">
        <table class="table table-bordered table-hover profiles-table mb-0">
            <thead>
            <tr>
                <th data-col="position">
                    <a th:href="@{/sales/profiles(q=${query.q},position=${query.position},developerGrade=${query.developerGrade},sort='position',direction=${query.sort == 'position' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'asc'})}"
                       class="sort-link">직급<span th:if="${query.sort == 'position'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                </th>
                <th>
                    <a th:href="@{/sales/profiles(q=${query.q},position=${query.position},developerGrade=${query.developerGrade},sort='name',direction=${query.sort == 'name' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'asc'})}"
                       class="sort-link">이름<span th:if="${query.sort == 'name'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                </th>
                <th data-col="age">
                    <a th:href="@{/sales/profiles(q=${query.q},position=${query.position},developerGrade=${query.developerGrade},sort='age',direction=${query.sort == 'age' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'asc'})}"
                       class="sort-link">나이<span th:if="${query.sort == 'age'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                </th>
                <th data-col="birthDate">생년월일</th>
                <th data-col="phone">연락처</th>
                <th data-col="email">이메일</th>
                <th data-col="developerGrade">개발자 등급</th>
                <th data-col="career">
                    <a th:href="@{/sales/profiles(q=${query.q},position=${query.position},developerGrade=${query.developerGrade},sort='career',direction=${query.sort == 'career' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'desc'})}"
                       class="sort-link">경력<span th:if="${query.sort == 'career'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                </th>
                <th class="doc-cell" data-col="resume">이력서</th>
                <th class="doc-cell" data-col="careerDescription">경력기술서</th>
                <th class="doc-cell" data-col="license">자격증</th>
                <th class="doc-cell" data-col="graduationCertificate">졸업증명서</th>
                <th class="doc-cell" data-col="healthInsuranceProof">건강보험득실</th>
                <th class="doc-cell" data-col="employmentCertificate">재직증명서</th>
                <th class="doc-cell" data-col="etc">기타자료</th>
                <th data-col="updatedAt">업데이트</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${rows}">
                <td data-col="position" th:text="${row.user.position != null ? row.user.position.displayName : '-'}"></td>
                <td>
                    <a sec:authorize="hasRole('ADMIN')"
                       th:href="@{/admin/employees/{id}/documents(id=${row.user.id})}"
                       th:text="${row.user.name}"></a>
                    <a sec:authorize="hasRole('SALES')"
                       th:href="@{/sales/employees/{id}/documents(id=${row.user.id})}"
                       th:text="${row.user.name}"></a>
                </td>
                <td data-col="age" th:text="${row.age > 0 ? row.age + '세' : '-'}"></td>
                <td data-col="birthDate" th:text="${row.user.birthDate != null ? #temporals.format(row.user.birthDate, 'yyyy-MM-dd') : '-'}"></td>
                <td data-col="phone" th:text="${row.user.phone != null and !row.user.phone.isEmpty() ? row.user.phone : '-'}"></td>
                <td data-col="email" th:text="${row.user.email}"></td>
                <td data-col="developerGrade" th:text="${row.developerGrade != null ? row.developerGrade : '-'}"></td>
                <td data-col="career">
                    <span th:if="${row.careerMonths > 0}"
                          th:text="${row.careerYears + '년 ' + row.careerRemainMonths + '개월'}"></span>
                    <span th:if="${row.careerMonths == 0}" class="text-muted">-</span>
                </td>

                <!-- 이력서 -->
                <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).RESUME)}">
                    <td class="doc-cell" data-col="resume">
                        <span th:if="${dv == null}" class="text-muted small">없음</span>
                        <span th:if="${dv != null}" class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank"
                               class="btn btn-outline-secondary btn-xs">보기</a>
                            <a th:href="@{/documents/{id}/download(id=${dv.id})}"
                               class="btn btn-outline-primary btn-xs">다운</a>
                        </span>
                    </td>
                </th:block>

                <!-- 경력기술서 -->
                <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).CAREER_DESCRIPTION)}">
                    <td class="doc-cell" data-col="careerDescription">
                        <span th:if="${dv == null}" class="text-muted small">없음</span>
                        <span th:if="${dv != null}" class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank"
                               class="btn btn-outline-secondary btn-xs">보기</a>
                            <a th:href="@{/documents/{id}/download(id=${dv.id})}"
                               class="btn btn-outline-primary btn-xs">다운</a>
                        </span>
                    </td>
                </th:block>

                <!-- 자격증 -->
                <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).LICENSE)}">
                    <td class="doc-cell" data-col="license">
                        <span th:if="${dv == null}" class="text-muted small">없음</span>
                        <span th:if="${dv != null}" class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank"
                               class="btn btn-outline-secondary btn-xs">보기</a>
                            <a th:href="@{/documents/{id}/download(id=${dv.id})}"
                               class="btn btn-outline-primary btn-xs">다운</a>
                        </span>
                    </td>
                </th:block>

                <!-- 졸업증명서 -->
                <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).GRADUATION_CERTIFICATE)}">
                    <td class="doc-cell" data-col="graduationCertificate">
                        <span th:if="${dv == null}" class="text-muted small">없음</span>
                        <span th:if="${dv != null}" class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank"
                               class="btn btn-outline-secondary btn-xs">보기</a>
                            <a th:href="@{/documents/{id}/download(id=${dv.id})}"
                               class="btn btn-outline-primary btn-xs">다운</a>
                        </span>
                    </td>
                </th:block>

                <!-- 건강보험득실 -->
                <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).HEALTH_INSURANCE_PROOF)}">
                    <td class="doc-cell" data-col="healthInsuranceProof">
                        <span th:if="${dv == null}" class="text-muted small">없음</span>
                        <span th:if="${dv != null}" class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank"
                               class="btn btn-outline-secondary btn-xs">보기</a>
                            <a th:href="@{/documents/{id}/download(id=${dv.id})}"
                               class="btn btn-outline-primary btn-xs">다운</a>
                        </span>
                    </td>
                </th:block>

                <!-- 재직증명서 -->
                <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).EMPLOYMENT_CERTIFICATE)}">
                    <td class="doc-cell" data-col="employmentCertificate">
                        <span th:if="${dv == null}" class="text-muted small">없음</span>
                        <span th:if="${dv != null}" class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank"
                               class="btn btn-outline-secondary btn-xs">보기</a>
                            <a th:href="@{/documents/{id}/download(id=${dv.id})}"
                               class="btn btn-outline-primary btn-xs">다운</a>
                        </span>
                    </td>
                </th:block>

                <!-- 기타자료 -->
                <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).ETC)}">
                    <td class="doc-cell" data-col="etc">
                        <span th:if="${dv == null}" class="text-muted small">없음</span>
                        <span th:if="${dv != null}" class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank"
                               class="btn btn-outline-secondary btn-xs">보기</a>
                            <a th:href="@{/documents/{id}/download(id=${dv.id})}"
                               class="btn btn-outline-primary btn-xs">다운</a>
                        </span>
                    </td>
                </th:block>

                <td data-col="updatedAt" th:text="${row.user.updatedAt != null ? #temporals.format(row.user.updatedAt, 'yyyy-MM-dd') : '-'}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const COLS = ['position','age','birthDate','phone','email','developerGrade','career',
    'resume','careerDescription','license','graduationCertificate',
    'healthInsuranceProof','employmentCertificate','etc','updatedAt'];

function getHidden() {
    try { return JSON.parse(localStorage.getItem('profiles_hidden_cols') || '[]'); } catch(e) { return []; }
}

function applyColVisibility() {
    const hidden = getHidden();
    COLS.forEach(col => {
        document.querySelectorAll('[data-col="' + col + '"]')
            .forEach(el => el.classList.toggle('d-none', hidden.includes(col)));
        const cb = document.getElementById('chk-' + col);
        if (cb) cb.checked = !hidden.includes(col);
    });
}

function toggleCol(col, visible) {
    let hidden = getHidden();
    hidden = visible ? hidden.filter(c => c !== col) : [...new Set([...hidden, col])];
    localStorage.setItem('profiles_hidden_cols', JSON.stringify(hidden));
    applyColVisibility();
}

document.addEventListener('DOMContentLoaded', applyColVisibility);
</script>
</body>
</html>
