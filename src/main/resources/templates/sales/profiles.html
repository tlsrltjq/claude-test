<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인력 표 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: .6rem 0; }
        .topnav .brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.5); color: #fff; font-size: .8rem; padding: .3rem .75rem; border-radius: 6px; }
        .btn-nav:hover { background: rgba(255,255,255,.15); color: #fff; }

        /* 등급 카드 */
        .grade-card { background: #fff; border-radius: 12px; padding: .85rem 1rem; text-align: center; border: 2px solid #e9ecef; }
        .grade-card.grade-special { border-color: #fca5a5; }
        .grade-card.grade-high    { border-color: #fcd34d; }
        .grade-card.grade-mid     { border-color: #93c5fd; }
        .grade-card.grade-low     { border-color: #d1d5db; }
        .grade-card .grade-num  { font-size: 1.6rem; font-weight: 800; line-height: 1; margin-bottom: .15rem; }
        .grade-card .grade-label { font-size: .78rem; color: #6c757d; font-weight: 600; }
        .grade-special .grade-num { color: #dc2626; }
        .grade-high    .grade-num { color: #d97706; }
        .grade-mid     .grade-num { color: #2563eb; }
        .grade-low     .grade-num { color: #6b7280; }

        /* 필터 바 */
        .filter-card { background: #fff; border-radius: 12px; padding: .85rem 1.1rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: .75rem; }
        .filter-label { font-size: .7rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #9ca3af; margin-bottom: .25rem; }

        /* 툴바 */
        .toolbar { background: #fff; border-radius: 12px; padding: .65rem 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: .75rem; display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }

        /* 컬럼 설정 패널 */
        .col-panel { background: #f8f9fa; border: 1.5px solid #e9ecef; border-radius: 10px; padding: .85rem 1.1rem; margin-bottom: .75rem; }
        .col-panel .col-label { font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #6c757d; margin-bottom: .6rem; }

        /* 프리셋 패널 */
        .preset-panel { background: #f0f6ff; border: 1.5px solid #bfdbfe; border-radius: 10px; padding: .85rem 1.1rem; margin-bottom: .75rem; }

        /* 인력표 테이블 */
        .profiles-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .profiles-table { font-size: 0.8rem; margin: 0; }
        .profiles-table th {
            white-space: nowrap; background: #1e3a5f; color: #fff;
            position: sticky; top: 0; z-index: 2;
            padding: .6rem .75rem; border: none; font-size: .75rem; font-weight: 600;
        }
        .profiles-table th .sort-link { color: #cbd5e1; text-decoration: none; }
        .profiles-table th .sort-link:hover { color: #fff; }
        .profiles-table td { white-space: nowrap; vertical-align: middle; padding: .55rem .75rem; border-color: #f0f2f5; }
        .profiles-table tbody tr:hover { background: #f8f9ff; }
        .profiles-table a:not(.btn) { color: #0d6efd; text-decoration: none; font-weight: 600; }
        .profiles-table a:not(.btn):hover { text-decoration: underline; }

        .btn-xs { padding: .15rem .4rem; font-size: .72rem; border-radius: 5px; }

        .grade-badge-special { background: #fee2e2; color: #dc2626; padding: .2rem .5rem; border-radius: 5px; font-size: .75rem; font-weight: 700; }
        .grade-badge-high    { background: #fef3c7; color: #d97706; padding: .2rem .5rem; border-radius: 5px; font-size: .75rem; font-weight: 700; }
        .grade-badge-mid     { background: #dbeafe; color: #1d4ed8; padding: .2rem .5rem; border-radius: 5px; font-size: .75rem; font-weight: 700; }
        .grade-badge-low     { background: #f3f4f6; color: #4b5563; padding: .2rem .5rem; border-radius: 5px; font-size: .75rem; font-weight: 700; }

        .empty-state { text-align: center; padding: 3rem 2rem; color: #adb5bd; }
        .empty-state i { font-size: 3rem; margin-bottom: .75rem; display: block; }
    </style>
</head>
<body>

<nav class="topnav">
    <div class="container-fluid px-3 d-flex align-items-center gap-3">
        <a th:href="@{/dashboard}" class="brand me-auto">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i>eActive Resource Hub
        </a>
        <a th:href="@{/sales/career-calculator}" class="btn btn-nav btn-sm">
            <i class="bi bi-calculator me-1"></i>경력 계산기
        </a>
        <a th:href="@{/sales/members}" class="btn btn-nav btn-sm">
            <i class="bi bi-people me-1"></i>인력 목록
        </a>
        <a th:href="@{/dashboard}" class="btn btn-nav btn-sm">
            <i class="bi bi-house me-1"></i>대시보드
        </a>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-nav btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>로그아웃
            </button>
        </form>
    </div>
</nav>

<div class="container-fluid px-3 py-3">

    <!-- 플래시 메시지 -->
    <div th:if="${presetSuccess}" class="alert alert-success alert-dismissible py-2 mb-2 rounded-3">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${presetSuccess}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${presetError}" class="alert alert-danger alert-dismissible py-2 mb-2 rounded-3">
        <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${presetError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 등급별 현황 -->
    <div class="row g-2 mb-3">
        <div th:each="entry : ${gradeCounts}" class="col-6 col-sm-3 col-md-2">
            <div class="grade-card"
                 th:classappend="${entry.key == '특급'} ? 'grade-special' :
                                  (${entry.key == '고급'} ? 'grade-high' :
                                  (${entry.key == '중급'} ? 'grade-mid' :
                                  (${entry.key == '초급'} ? 'grade-low' : '')))">
                <div class="grade-num" th:text="${entry.value}">0</div>
                <div class="grade-label" th:text="${entry.key}">등급</div>
            </div>
        </div>
    </div>

    <!-- 검색/필터 -->
    <div class="filter-card">
        <form id="filterForm" method="get" th:action="@{/sales/profiles}" class="d-flex align-items-end gap-2 flex-wrap">
            <div>
                <div class="filter-label">이름·이메일</div>
                <div class="input-group input-group-sm" style="min-width:170px">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" name="q" class="form-control border-start-0"
                           placeholder="검색" th:value="${query.q}">
                </div>
            </div>
            <div>
                <div class="filter-label">팀</div>
                <div class="dropdown">
                    <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                            data-bs-toggle="dropdown" data-bs-auto-close="outside" id="teamDropdownBtn">
                        <span id="teamFilterLabel">전체 팀</span>
                    </button>
                    <ul class="dropdown-menu p-2" style="min-width:140px">
                        <li th:each="team : ${teams}">
                            <div class="form-check mb-1">
                                <input class="form-check-input team-chk" type="checkbox"
                                       name="teamIds" th:value="${team.id}"
                                       th:id="'chk-team-' + ${team.id}"
                                       th:checked="${query.teamIds != null and #lists.contains(query.teamIds, team.id)}"
                                       onchange="updateTeamLabel()">
                                <label class="form-check-label small"
                                       th:for="'chk-team-' + ${team.id}"
                                       th:text="${team.name}"></label>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
            <div>
                <div class="filter-label">직급</div>
                <select name="position" class="form-select form-select-sm" style="min-width:100px">
                    <option value="">전체</option>
                    <option th:each="pos : ${positions}"
                            th:value="${pos.name()}"
                            th:text="${pos.displayName}"
                            th:selected="${query.position != null and query.position == pos.name()}"></option>
                </select>
            </div>
            <div>
                <div class="filter-label">개발자 등급</div>
                <div class="dropdown">
                    <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
                            data-bs-toggle="dropdown" data-bs-auto-close="outside">
                        <span id="gradeFilterLabel">전체 등급</span>
                    </button>
                    <ul class="dropdown-menu p-2" style="min-width:120px">
                        <li th:each="grade : ${ {'특급','고급','중급','초급'} }">
                            <div class="form-check mb-1">
                                <input class="form-check-input grade-chk" type="checkbox"
                                       name="developerGrades" th:value="${grade}"
                                       th:id="'chk-grade-' + ${grade}"
                                       th:checked="${query.developerGrades != null and #lists.contains(query.developerGrades, grade)}"
                                       onchange="updateGradeLabel()">
                                <label class="form-check-label small"
                                       th:for="'chk-grade-' + ${grade}"
                                       th:text="${grade}"></label>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
            <div>
                <div class="filter-label">경력 표시</div>
                <select name="careerDisplay" class="form-select form-select-sm" id="careerDisplaySel"
                        onchange="this.form.submit()" style="min-width:80px">
                    <option value="ymd" th:selected="${query.careerDisplay == 'ymd'}">년월일</option>
                    <option value="m"   th:selected="${query.careerDisplay == 'm'}">개월</option>
                    <option value="d"   th:selected="${query.careerDisplay == 'd'}">일</option>
                </select>
            </div>
            <input type="hidden" name="sort" th:value="${query.sort}">
            <input type="hidden" name="direction" th:value="${query.direction}">
            <div class="d-flex gap-1">
                <button type="submit" class="btn btn-primary btn-sm fw-semibold px-3">검색</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="resetAll()">초기화</button>
            </div>
        </form>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
        <button class="btn btn-outline-secondary btn-sm" type="button"
                data-bs-toggle="collapse" data-bs-target="#column-toggle">
            <i class="bi bi-layout-three-columns me-1"></i>컬럼 설정
        </button>
        <button type="button" class="btn btn-outline-success btn-sm" onclick="downloadExcel()">
            <i class="bi bi-file-earmark-excel me-1"></i>전체 엑셀
        </button>
        <button type="button" class="btn btn-success btn-sm" id="exportSelectedBtn"
                disabled onclick="submitSelectedExport()">
            <i class="bi bi-file-earmark-excel me-1"></i>선택 엑셀 (<span id="selectedCount">0</span>명)
        </button>
        <button type="button" class="btn btn-outline-secondary btn-sm" id="bundleDownloadBtn"
                disabled onclick="submitBundleDownload()">
            <i class="bi bi-file-zip me-1"></i>ZIP 묶음 (<span id="bundleCount">0</span>명)
        </button>
        <div class="d-flex gap-1 align-items-center ms-auto">
            <select id="presetSelect" class="form-select form-select-sm" style="min-width:130px"
                    onchange="applyPreset(this.value)">
                <option value="">프리셋 선택</option>
                <option th:each="p : ${presets}"
                        th:value="${p.id}"
                        th:data-cols="${p.columnsJson}"
                        th:data-sort="${p.sortJson}"
                        th:data-career="${p.careerDisplay}"
                        th:text="${p.name}"></option>
            </select>
            <button class="btn btn-outline-primary btn-sm" type="button"
                    data-bs-toggle="collapse" data-bs-target="#preset-save-panel">
                <i class="bi bi-bookmark-plus me-1"></i>저장
            </button>
        </div>
    </div>

    <!-- 컬럼 설정 패널 -->
    <div class="collapse" id="column-toggle">
        <div class="col-panel mb-2">
            <div class="col-label"><i class="bi bi-toggles me-1"></i>표시할 컬럼 선택</div>
            <div class="d-flex flex-wrap gap-3" style="font-size:.82rem">
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-team" onchange="toggleCol('team',this.checked)"> 팀</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-position" onchange="toggleCol('position',this.checked)"> 직급</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-age" onchange="toggleCol('age',this.checked)"> 나이</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-birthDate" onchange="toggleCol('birthDate',this.checked)"> 생년월일</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-phone" onchange="toggleCol('phone',this.checked)"> 연락처</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-email" onchange="toggleCol('email',this.checked)"> 이메일</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-developerGrade" onchange="toggleCol('developerGrade',this.checked)"> 개발자 등급</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-career" onchange="toggleCol('career',this.checked)"> 경력</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-resume" onchange="toggleCol('resume',this.checked)"> 이력서</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-careerDescription" onchange="toggleCol('careerDescription',this.checked)"> SW기술자 경력증명서</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-license" onchange="toggleCol('license',this.checked)"> 정보처리기사</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-graduationCertificate" onchange="toggleCol('graduationCertificate',this.checked)"> 졸업증명서</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-nationalPensionCertificate" onchange="toggleCol('nationalPensionCertificate',this.checked)"> 국민연금가입증명서</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-healthInsuranceCertificate" onchange="toggleCol('healthInsuranceCertificate',this.checked)"> 건강보험가입증명서</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-healthInsuranceEligibility" onchange="toggleCol('healthInsuranceEligibility',this.checked)"> 건강보험자격득실확인서</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-etc" onchange="toggleCol('etc',this.checked)"> 기타자료</label>
                <label class="mb-0 d-flex align-items-center gap-1"><input type="checkbox" id="chk-updatedAt" onchange="toggleCol('updatedAt',this.checked)"> 업데이트</label>
            </div>
        </div>
    </div>

    <!-- 프리셋 저장 패널 -->
    <div class="collapse" id="preset-save-panel">
        <div class="preset-panel mb-2">
            <form th:action="@{/sales/profiles/preset}" method="post" class="d-flex gap-2 align-items-center flex-wrap">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <input type="hidden" id="preset-cols-input" name="columnsJson" value="[]">
                <input type="hidden" id="preset-sort-input" name="sortJson"
                       th:value="${'{&quot;sort&quot;:&quot;' + query.sort + '&quot;,&quot;direction&quot;:&quot;' + query.direction + '&quot;}'}">
                <input type="hidden" name="careerDisplay" th:value="${query.careerDisplay}">
                <input type="text" name="presetName" class="form-control form-control-sm" style="max-width:180px"
                       placeholder="프리셋 이름" required>
                <button type="submit" class="btn btn-primary btn-sm" onclick="captureColsForPreset()">
                    <i class="bi bi-bookmark-check me-1"></i>저장
                </button>
                <small class="text-muted">현재 컬럼·정렬·경력표시가 저장됩니다.</small>
            </form>
            <div th:if="${!#lists.isEmpty(presets)}" class="mt-2 d-flex flex-wrap gap-1">
                <form th:each="p : ${presets}"
                      th:action="@{/sales/profiles/preset/{id}/delete(id=${p.id})}"
                      method="post" class="d-inline"
                      onsubmit="return confirm('프리셋을 삭제하시겠습니까?')">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-danger btn-xs"
                            th:text="'✕ ' + ${p.name}"></button>
                </form>
            </div>
        </div>
    </div>

    <!-- 선택 엑셀 폼 (숨김) -->
    <form id="exportSelectedForm" method="post" th:action="@{/sales/profiles/export}" style="display:none">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
        <input type="hidden" name="q" th:value="${query.q}">
        <input type="hidden" name="position" th:value="${query.position}">
        <input type="hidden" name="sort" th:value="${query.sort}">
        <input type="hidden" name="direction" th:value="${query.direction}">
        <input type="hidden" name="careerDisplay" th:value="${query.careerDisplay}">
        <span th:each="g : ${query.developerGrades}">
            <input type="hidden" name="developerGrades" th:value="${g}">
        </span>
        <span th:each="tid : ${query.teamIds}">
            <input type="hidden" name="teamIds" th:value="${tid}">
        </span>
        <input type="hidden" id="exportColumnsJson" name="columnsJson" value="[]">
    </form>

    <!-- ZIP 묶음 다운로드 폼 (숨김) -->
    <form id="bundleDownloadForm" method="post" th:action="@{/sales/profiles/bundle-download}" style="display:none">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
        <input type="hidden" name="q" th:value="${query.q}">
        <input type="hidden" name="position" th:value="${query.position}">
        <input type="hidden" name="sort" th:value="${query.sort}">
        <input type="hidden" name="direction" th:value="${query.direction}">
        <input type="hidden" name="careerDisplay" th:value="${query.careerDisplay}">
        <span th:each="g : ${query.developerGrades}">
            <input type="hidden" name="developerGrades" th:value="${g}">
        </span>
        <span th:each="tid : ${query.teamIds}">
            <input type="hidden" name="teamIds" th:value="${tid}">
        </span>
    </form>

    <!-- 빈 상태 -->
    <div th:if="${#lists.isEmpty(rows)}" class="empty-state bg-white rounded-3 p-5">
        <i class="bi bi-person-x"></i>
        <p>조건에 맞는 직원이 없습니다.</p>
    </div>

    <!-- 인력표 테이블 -->
    <div th:if="${!#lists.isEmpty(rows)}" class="profiles-card">
        <div class="table-responsive">
            <table class="table table-hover profiles-table mb-0">
                <thead>
                <tr>
                    <th style="width:36px;text-align:center">
                        <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)">
                    </th>
                    <th data-col="team">
                        <a th:href="@{/sales/profiles(q=${query.q},teamIds=${query.teamIds},position=${query.position},developerGrades=${query.developerGrades},careerDisplay=${query.careerDisplay},sort='team',direction=${query.sort == 'team' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'asc'})}"
                           class="sort-link">팀<span th:if="${query.sort == 'team'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                    </th>
                    <th data-col="position">
                        <a th:href="@{/sales/profiles(q=${query.q},teamIds=${query.teamIds},position=${query.position},developerGrades=${query.developerGrades},careerDisplay=${query.careerDisplay},sort='position',direction=${query.sort == 'position' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'asc'})}"
                           class="sort-link">직급<span th:if="${query.sort == 'position'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                    </th>
                    <th>
                        <a th:href="@{/sales/profiles(q=${query.q},teamIds=${query.teamIds},position=${query.position},developerGrades=${query.developerGrades},careerDisplay=${query.careerDisplay},sort='name',direction=${query.sort == 'name' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'asc'})}"
                           class="sort-link">이름<span th:if="${query.sort == 'name'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                    </th>
                    <th data-col="age">
                        <a th:href="@{/sales/profiles(q=${query.q},teamIds=${query.teamIds},position=${query.position},developerGrades=${query.developerGrades},careerDisplay=${query.careerDisplay},sort='age',direction=${query.sort == 'age' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'asc'})}"
                           class="sort-link">나이<span th:if="${query.sort == 'age'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                    </th>
                    <th data-col="birthDate">생년월일</th>
                    <th data-col="phone">연락처</th>
                    <th data-col="email">이메일</th>
                    <th data-col="developerGrade">
                        <a th:href="@{/sales/profiles(q=${query.q},teamIds=${query.teamIds},position=${query.position},developerGrades=${query.developerGrades},careerDisplay=${query.careerDisplay},sort='developerGrade',direction=${query.sort == 'developerGrade' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'asc'})}"
                           class="sort-link">개발자 등급<span th:if="${query.sort == 'developerGrade'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                    </th>
                    <th data-col="career">
                        <a th:href="@{/sales/profiles(q=${query.q},teamIds=${query.teamIds},position=${query.position},developerGrades=${query.developerGrades},careerDisplay=${query.careerDisplay},sort='career',direction=${query.sort == 'career' ? (query.direction == 'asc' ? 'desc' : 'asc') : 'desc'})}"
                           class="sort-link">경력<span th:if="${query.sort == 'career'}" th:text="${' ' + (query.direction == 'asc' ? '↑' : '↓')}"></span></a>
                    </th>
                    <th class="doc-cell" data-col="resume">이력서</th>
                    <th class="doc-cell" data-col="careerDescription">SW기술자 경력증명서</th>
                    <th class="doc-cell" data-col="license">정보처리기사</th>
                    <th class="doc-cell" data-col="graduationCertificate">졸업증명서</th>
                    <th class="doc-cell" data-col="nationalPensionCertificate">국민연금가입증명서</th>
                    <th class="doc-cell" data-col="healthInsuranceCertificate">건강보험가입증명서</th>
                    <th class="doc-cell" data-col="healthInsuranceEligibility">건강보험자격득실확인서</th>
                    <th class="doc-cell" data-col="etc">기타자료</th>
                    <th data-col="updatedAt">업데이트</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${rows}">
                    <td style="text-align:center">
                        <input type="checkbox" class="row-chk"
                               th:value="${row.user.id}" onchange="updateSelectedCount()">
                    </td>
                    <td data-col="team">
                        <span th:if="${row.user.team != null}"
                              class="badge rounded-pill"
                              style="background:#e7f0ff;color:#1d4ed8;font-size:.72rem"
                              th:text="${row.user.team.name}"></span>
                        <span th:if="${row.user.team == null}" class="text-muted">-</span>
                    </td>
                    <td data-col="position" th:text="${row.user.position != null ? row.user.position.displayName : '-'}"></td>
                    <td>
                        <a sec:authorize="hasRole('ADMIN')"
                           th:href="@{/admin/employees/{id}/documents(id=${row.user.id})}"
                           th:text="${row.user.name}"></a>
                        <a sec:authorize="hasRole('SALES')"
                           th:href="@{/sales/employees/{id}/documents(id=${row.user.id})}"
                           th:text="${row.user.name}"></a>
                    </td>
                    <td data-col="age" th:text="${row.age > 0 ? row.age + '세' : '-'}"></td>
                    <td data-col="birthDate" th:text="${row.user.birthDate != null ? #temporals.format(row.user.birthDate, 'yyyy-MM-dd') : '-'}"></td>
                    <td data-col="phone" th:text="${row.user.phone != null and !row.user.phone.isEmpty() ? row.user.phone : '-'}"></td>
                    <td data-col="email" th:text="${row.user.email}"></td>
                    <td data-col="developerGrade">
                        <span th:if="${row.developerGrade == '특급'}" class="grade-badge-special" th:text="${row.developerGrade}"></span>
                        <span th:if="${row.developerGrade == '고급'}" class="grade-badge-high"    th:text="${row.developerGrade}"></span>
                        <span th:if="${row.developerGrade == '중급'}" class="grade-badge-mid"     th:text="${row.developerGrade}"></span>
                        <span th:if="${row.developerGrade == '초급'}" class="grade-badge-low"     th:text="${row.developerGrade}"></span>
                        <span th:if="${row.developerGrade == null}"   class="text-muted">-</span>
                    </td>
                    <td data-col="career">
                        <span th:if="${query.careerDisplay == 'ymd' or query.careerDisplay == null}">
                            <span th:if="${row.careerTotalDays > 0}" th:text="${row.careerYmd}"></span>
                            <span th:if="${row.careerTotalDays <= 0}" class="text-muted">-</span>
                        </span>
                        <span th:if="${query.careerDisplay == 'm'}">
                            <span th:if="${row.careerMonthsFromDays > 0}" th:text="${row.careerMonthsFromDays + '개월'}"></span>
                            <span th:if="${row.careerMonthsFromDays <= 0}" class="text-muted">-</span>
                        </span>
                        <span th:if="${query.careerDisplay == 'd'}">
                            <span th:if="${row.careerTotalDays > 0}" th:text="${row.careerTotalDays + '일'}"></span>
                            <span th:if="${row.careerTotalDays <= 0}" class="text-muted">-</span>
                        </span>
                    </td>

                    <!-- 이력서 -->
                    <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).RESUME)}">
                        <td class="doc-cell" data-col="resume">
                            <span th:if="${dv == null}" class="text-muted" style="font-size:.75rem">없음</span>
                            <span th:if="${dv != null}" class="d-flex gap-1">
                                <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank" class="btn btn-outline-secondary btn-xs"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/documents/{id}/download(id=${dv.id})}" class="btn btn-outline-primary btn-xs"><i class="bi bi-download"></i></a>
                            </span>
                        </td>
                    </th:block>

                    <!-- SW기술자 경력증명서 -->
                    <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).CAREER_DESCRIPTION)}">
                        <td class="doc-cell" data-col="careerDescription">
                            <span th:if="${dv == null}" class="text-muted" style="font-size:.75rem">없음</span>
                            <span th:if="${dv != null}" class="d-flex gap-1">
                                <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank" class="btn btn-outline-secondary btn-xs"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/documents/{id}/download(id=${dv.id})}" class="btn btn-outline-primary btn-xs"><i class="bi bi-download"></i></a>
                            </span>
                        </td>
                    </th:block>

                    <!-- 정보처리기사 -->
                    <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).LICENSE)}">
                        <td class="doc-cell" data-col="license">
                            <span th:if="${dv == null}" class="text-muted" style="font-size:.75rem">없음</span>
                            <span th:if="${dv != null}" class="d-flex gap-1">
                                <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank" class="btn btn-outline-secondary btn-xs"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/documents/{id}/download(id=${dv.id})}" class="btn btn-outline-primary btn-xs"><i class="bi bi-download"></i></a>
                            </span>
                        </td>
                    </th:block>

                    <!-- 졸업증명서 -->
                    <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).GRADUATION_CERTIFICATE)}">
                        <td class="doc-cell" data-col="graduationCertificate">
                            <span th:if="${dv == null}" class="text-muted" style="font-size:.75rem">없음</span>
                            <span th:if="${dv != null}" class="d-flex gap-1">
                                <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank" class="btn btn-outline-secondary btn-xs"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/documents/{id}/download(id=${dv.id})}" class="btn btn-outline-primary btn-xs"><i class="bi bi-download"></i></a>
                            </span>
                        </td>
                    </th:block>

                    <!-- 국민연금가입증명서 -->
                    <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).NATIONAL_PENSION_CERTIFICATE)}">
                        <td class="doc-cell" data-col="nationalPensionCertificate">
                            <span th:if="${dv == null}" class="text-muted" style="font-size:.75rem">없음</span>
                            <span th:if="${dv != null}" class="d-flex gap-1">
                                <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank" class="btn btn-outline-secondary btn-xs"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/documents/{id}/download(id=${dv.id})}" class="btn btn-outline-primary btn-xs"><i class="bi bi-download"></i></a>
                            </span>
                        </td>
                    </th:block>

                    <!-- 건강보험가입증명서 -->
                    <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).HEALTH_INSURANCE_CERTIFICATE)}">
                        <td class="doc-cell" data-col="healthInsuranceCertificate">
                            <span th:if="${dv == null}" class="text-muted" style="font-size:.75rem">없음</span>
                            <span th:if="${dv != null}" class="d-flex gap-1">
                                <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank" class="btn btn-outline-secondary btn-xs"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/documents/{id}/download(id=${dv.id})}" class="btn btn-outline-primary btn-xs"><i class="bi bi-download"></i></a>
                            </span>
                        </td>
                    </th:block>

                    <!-- 건강보험자격득실확인서 -->
                    <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).HEALTH_INSURANCE_ELIGIBILITY)}">
                        <td class="doc-cell" data-col="healthInsuranceEligibility">
                            <span th:if="${dv == null}" class="text-muted" style="font-size:.75rem">없음</span>
                            <span th:if="${dv != null}" class="d-flex gap-1">
                                <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank" class="btn btn-outline-secondary btn-xs"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/documents/{id}/download(id=${dv.id})}" class="btn btn-outline-primary btn-xs"><i class="bi bi-download"></i></a>
                            </span>
                        </td>
                    </th:block>

                    <!-- 기타자료 -->
                    <th:block th:with="dv=${row.getDoc(T(com.eactive.resourcehub.document.entity.DocumentType).ETC)}">
                        <td class="doc-cell" data-col="etc">
                            <span th:if="${dv == null}" class="text-muted" style="font-size:.75rem">없음</span>
                            <span th:if="${dv != null}" class="d-flex gap-1">
                                <a th:href="@{/documents/{id}/preview(id=${dv.id})}" target="_blank" class="btn btn-outline-secondary btn-xs"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/documents/{id}/download(id=${dv.id})}" class="btn btn-outline-primary btn-xs"><i class="bi bi-download"></i></a>
                            </span>
                        </td>
                    </th:block>

                    <td data-col="updatedAt" th:text="${row.user.updatedAt != null ? #temporals.format(row.user.updatedAt, 'yy.MM.dd') : '-'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const COLS = ['team','position','age','birthDate','phone','email','developerGrade','career',
    'resume','careerDescription','license','graduationCertificate',
    'nationalPensionCertificate','healthInsuranceCertificate','healthInsuranceEligibility',
    'etc','updatedAt'];

function getHidden() {
    try { return JSON.parse(localStorage.getItem('profiles_hidden_cols') || '[]'); } catch(e) { return []; }
}

function applyColVisibility() {
    const hidden = getHidden();
    COLS.forEach(col => {
        document.querySelectorAll('[data-col="' + col + '"]')
            .forEach(el => el.classList.toggle('d-none', hidden.includes(col)));
        const cb = document.getElementById('chk-' + col);
        if (cb) cb.checked = !hidden.includes(col);
    });
}

function toggleCol(col, visible) {
    let hidden = getHidden();
    hidden = visible ? hidden.filter(c => c !== col) : [...new Set([...hidden, col])];
    localStorage.setItem('profiles_hidden_cols', JSON.stringify(hidden));
    applyColVisibility();
}

function updateTeamLabel() {
    const checked = document.querySelectorAll('.team-chk:checked');
    document.getElementById('teamFilterLabel').textContent =
        checked.length === 0 ? '전체 팀' : checked.length + '개 팀 선택';
}

function updateGradeLabel() {
    const checked = document.querySelectorAll('.grade-chk:checked');
    document.getElementById('gradeFilterLabel').textContent =
        checked.length === 0 ? '전체 등급' : [...checked].map(c => c.value).join('·');
}

function downloadExcel() {
    const form = document.getElementById('filterForm');
    const params = new URLSearchParams(new FormData(form));
    const hidden = getHidden();
    COLS.filter(c => !hidden.includes(c)).forEach(c => params.append('cols', c));
    window.location.href = '/sales/profiles/export?' + params.toString();
}

function captureColsForPreset() {
    const hidden = getHidden();
    const visible = COLS.filter(c => !hidden.includes(c));
    document.getElementById('preset-cols-input').value = JSON.stringify(visible);
}

function applyPreset(presetId) {
    if (!presetId) return;
    const opt = document.querySelector('#presetSelect option[value="' + presetId + '"]');
    if (!opt) return;
    try {
        const cols = JSON.parse(opt.dataset.cols || '[]');
        const hidden = COLS.filter(c => !cols.includes(c));
        localStorage.setItem('profiles_hidden_cols', JSON.stringify(hidden));
        applyColVisibility();
    } catch(e) {}
    try {
        const career = opt.dataset.career || 'ymd';
        document.getElementById('careerDisplaySel').value = career;
        const sort = JSON.parse(opt.dataset.sort || '{}');
        if (sort.sort) {
            document.querySelector('[name="sort"]').value = sort.sort;
            document.querySelector('[name="direction"]').value = sort.direction || 'asc';
        }
    } catch(e) {}
    document.getElementById('filterForm').submit();
}

function resetAll() {
    localStorage.removeItem('profiles_hidden_cols');
    window.location.href = '/sales/profiles';
}

function toggleSelectAll(checked) {
    document.querySelectorAll('.row-chk').forEach(cb => cb.checked = checked);
    updateSelectedCount();
}

function updateSelectedCount() {
    const checked = document.querySelectorAll('.row-chk:checked');
    const count = checked.length;
    document.getElementById('selectedCount').textContent = count;
    document.getElementById('bundleCount').textContent = count;
    document.getElementById('exportSelectedBtn').disabled = count === 0;
    document.getElementById('bundleDownloadBtn').disabled = count === 0;
    const all = document.querySelectorAll('.row-chk');
    const sa = document.getElementById('selectAll');
    if (sa) {
        sa.checked = all.length > 0 && count === all.length;
        sa.indeterminate = count > 0 && count < all.length;
    }
}

function submitSelectedExport() {
    const checked = document.querySelectorAll('.row-chk:checked');
    if (checked.length === 0) { alert('선택된 인원이 없습니다.'); return; }
    const form = document.getElementById('exportSelectedForm');
    form.querySelectorAll('[name="selectedIds"]').forEach(el => el.remove());
    checked.forEach(cb => {
        const inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = 'selectedIds'; inp.value = cb.value;
        form.appendChild(inp);
    });
    document.getElementById('exportColumnsJson').value = JSON.stringify(
        COLS.filter(c => !getHidden().includes(c))
    );
    form.submit();
}

function submitBundleDownload() {
    const checked = document.querySelectorAll('.row-chk:checked');
    if (checked.length === 0) { alert('선택된 인원이 없습니다.'); return; }
    const form = document.getElementById('bundleDownloadForm');
    form.querySelectorAll('[name="selectedIds"]').forEach(el => el.remove());
    checked.forEach(cb => {
        const inp = document.createElement('input');
        inp.type = 'hidden'; inp.name = 'selectedIds'; inp.value = cb.value;
        form.appendChild(inp);
    });
    form.submit();
}

document.addEventListener('DOMContentLoaded', function() {
    applyColVisibility();
    updateTeamLabel();
    updateGradeLabel();
});
</script>
</body>
</html>
