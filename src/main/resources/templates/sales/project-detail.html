<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${project.name} — eActive Resource Hub|">프로젝트 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 플래시 메시지 -->
      <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 mb-3" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2 mb-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title" th:text="${project.name}">프로젝트명</h1>
          <p class="page-hd-sub">
            <i class="bi bi-building me-1"></i>
            <span th:text="${project.clientName != null ? project.clientName : '고객사 미지정'}">고객사</span>
            &nbsp;·&nbsp;
            <i class="bi bi-calendar3 me-1"></i>
            <span th:text="|${project.startDate} ~ ${project.endDate}|">기간</span>
          </p>
        </div>
        <div class="page-hd-actions" th:if="${currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'SALES'}">
          <a th:href="@{/sales/calendar}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>캘린더
          </a>
          <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editProjectModal">
            <i class="bi bi-pencil me-1"></i>수정
          </button>
          <form th:action="@{/sales/projects/{id}/delete(id=${project.id})}" method="post" class="d-inline"
                onsubmit="return confirm('프로젝트를 삭제하면 모든 배정이 함께 삭제됩니다. 계속하시겠습니까?')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-sm btn-outline-danger">
              <i class="bi bi-trash me-1"></i>삭제
            </button>
          </form>
        </div>
      </div>

      <!-- 프로젝트 정보 카드 -->
      <div class="card mb-4">
        <div class="card-body p-0">
          <div class="row g-0 text-center">
            <div class="col-6 col-md-3 p-3" style="border-right:1px solid #f0f1f3;">
              <div class="filter-label mb-2">상태</div>
              <span class="badge-status px-3 py-2 fs-sm"
                    th:classappend="|status-${project.status}|"
                    th:text="${project.status.displayName}">진행 중</span>
            </div>
            <div class="col-6 col-md-3 p-3" style="border-right:1px solid #f0f1f3;">
              <div class="filter-label mb-2">시작일</div>
              <div class="fw-700" th:text="${#temporals.format(project.startDate,'yyyy.MM.dd')}">-</div>
            </div>
            <div class="col-6 col-md-3 p-3" th:style="${project.memo != null and !project.memo.isBlank()} ? 'border-right:1px solid #f0f1f3;' : ''">
              <div class="filter-label mb-2">종료일</div>
              <div class="fw-700" th:text="${#temporals.format(project.endDate,'yyyy.MM.dd')}">-</div>
            </div>
            <div class="col-6 col-md-3 p-3" th:if="${project.memo != null and !project.memo.isBlank()}">
              <div class="filter-label mb-2">메모</div>
              <div class="text-secondary" style="font-size:.83rem; line-height:1.4;" th:text="${project.memo}">-</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 투입 직원 카드 -->
      <div class="table-card">
        <div class="table-card-hd">
          <i class="bi bi-people-fill text-primary"></i>
          <span>투입 직원</span>
          <span class="badge bg-light text-secondary border ms-1"
                th:text="${#lists.size(members)}">0</span>
          <div class="ms-auto" th:if="${currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'SALES'}">
            <button class="btn btn-sm btn-primary"
                    data-bs-toggle="modal" data-bs-target="#addMemberModal">
              <i class="bi bi-person-plus me-1"></i>직원 추가
            </button>
          </div>
        </div>

        <!-- 빈 상태 -->
        <div th:if="${#lists.isEmpty(members)}" class="empty-state empty-state-border m-3">
          <i class="bi bi-people"></i>
          <p>투입된 직원이 없습니다<br><small class="text-muted">위 [직원 추가] 버튼으로 프로젝트 멤버를 등록하세요.</small></p>
        </div>

        <!-- 멤버 테이블 -->
        <div th:unless="${#lists.isEmpty(members)}" class="table-responsive">
          <table class="table assign-table mb-0">
            <thead>
              <tr>
                <th>직원</th>
                <th>역할</th>
                <th>투입 시작일</th>
                <th>투입 종료일</th>
                <th>상태</th>
                <th th:if="${currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'SALES'}">조작</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="pa : ${members}">
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <div class="avatar-circle" style="background:#dbeafe;color:#1d4ed8;font-size:.75rem;font-weight:700;width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">
                      <span th:text="${#strings.substring(pa.displayName, 0, 1)}">홍</span>
                    </div>
                    <div>
                      <div class="fw-600" th:text="${pa.displayName}">홍길동</div>
                      <div style="font-size:.73rem;color:#adb5bd;"
                           th:text="${pa.user != null and pa.user.team != null ? pa.user.team.name : '—'}">팀명</div>
                    </div>
                  </div>
                </td>
                <td>
                  <span th:if="${pa.role != null and !pa.role.isBlank()}"
                        class="badge bg-light text-dark border"
                        style="font-size:.78rem;"
                        th:text="${pa.role}">역할</span>
                  <span th:unless="${pa.role != null and !pa.role.isBlank()}"
                        class="text-muted small">—</span>
                </td>
                <td th:text="${#temporals.format(pa.startDate,'yyyy.MM.dd')}">-</td>
                <td th:text="${#temporals.format(pa.endDate,'yyyy.MM.dd')}">-</td>
                <td>
                  <span class="badge-status"
                        th:classappend="|status-${pa.status}|"
                        th:text="${pa.status.displayName}">상태</span>
                </td>
                <td th:if="${currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'SALES'}">
                  <div class="d-flex gap-1">
                    <button class="btn btn-xs btn-outline-secondary"
                            data-bs-toggle="modal"
                            th:data-bs-target="|#editMemberModal-${pa.id}|">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <form th:action="@{/sales/projects/{pid}/members/{aid}/delete(pid=${project.id},aid=${pa.id})}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('이 직원을 프로젝트에서 제거합니까?')">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                      <button type="submit" class="btn btn-xs btn-outline-danger">
                        <i class="bi bi-trash"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

</div>

<!-- 프로젝트 수정 모달 -->
<div class="modal fade" id="editProjectModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header py-2 px-3">
        <h6 class="modal-title fw-700"><i class="bi bi-pencil me-1 text-primary"></i>프로젝트 수정</h6>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/sales/projects/{id}/update(id=${project.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="modal-body px-3 py-3">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-600 small">프로젝트명 <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-sm" name="name" th:value="${project.name}" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-600 small">고객사</label>
              <input type="text" class="form-control form-control-sm" name="clientName" th:value="${project.clientName}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600 small">시작일 <span class="text-danger">*</span></label>
              <input type="date" class="form-control form-control-sm" name="startDate" th:value="${project.startDate}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600 small">종료일 <span class="text-danger">*</span></label>
              <input type="date" class="form-control form-control-sm" name="endDate" th:value="${project.endDate}" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-600 small">상태</label>
              <select class="form-select form-select-sm" name="status">
                <option th:each="s : ${projectStatuses}"
                        th:value="${s.name()}"
                        th:text="${s.displayName}"
                        th:selected="${s == project.status}">상태</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-600 small">메모</label>
              <textarea class="form-control form-control-sm" name="memo" rows="2" th:text="${project.memo}"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer py-2 px-3">
          <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">취소</button>
          <button type="submit" class="btn btn-primary btn-sm">저장</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- 멤버 추가 모달 -->
<div class="modal fade" id="addMemberModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header py-2 px-3">
        <h6 class="modal-title fw-700"><i class="bi bi-person-plus me-1 text-primary"></i>직원 추가</h6>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/sales/projects/{id}/members(id=${project.id})}" method="post" id="addMemberForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="userId" id="am-userId">
        <div class="modal-body px-3 py-3">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-600 small">직원 <span class="text-danger">*</span></label>
              <!-- 검색 + 팀 필터 -->
              <div class="d-flex gap-2 mb-2">
                <input type="text" id="am-search" class="form-control form-control-sm"
                       placeholder="이름 검색..." autocomplete="off" style="flex:1">
                <select id="am-team" class="form-select form-select-sm" style="width:120px">
                  <option value="">전체 팀</option>
                </select>
              </div>
              <!-- 직원 목록 -->
              <div class="border rounded" style="max-height:200px;overflow-y:auto;" id="am-list">
                <div th:each="u : ${assignableUsers}"
                     class="am-item d-flex justify-content-between align-items-center px-3 py-2"
                     style="cursor:pointer;transition:background .1s"
                     th:attr="data-uid=${u.id}, data-name=${u.name}, data-team=${u.team != null ? u.team.name : ''}">
                  <span class="fw-600 small" th:text="${u.name}">이름</span>
                  <span class="text-muted" style="font-size:.73rem"
                        th:text="${u.team != null ? u.team.name : '—'}">팀</span>
                </div>
                <div th:if="${#lists.isEmpty(assignableUsers)}"
                     class="text-muted small px-3 py-2">활성 직원이 없습니다.</div>
                <div id="am-empty" class="text-muted small px-3 py-2" style="display:none">
                  검색 결과가 없습니다.
                </div>
              </div>
              <!-- 선택된 직원 표시 -->
              <div id="am-selected" class="mt-2 px-2 py-1 rounded"
                   style="background:#eff6ff;border:1px solid #bfdbfe;display:none;font-size:.83rem">
                <i class="bi bi-person-check-fill text-primary me-1"></i>
                <span id="am-selected-name"></span>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label fw-600 small">역할</label>
              <input type="text" class="form-control form-control-sm" name="role" placeholder="예: 개발자, PM">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600 small">투입 시작일 <span class="text-danger">*</span></label>
              <input type="date" class="form-control form-control-sm" name="startDate" th:value="${project.startDate}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600 small">투입 종료일 <span class="text-danger">*</span></label>
              <input type="date" class="form-control form-control-sm" name="endDate" th:value="${project.endDate}" required>
            </div>
          </div>
        </div>
        <div class="modal-footer py-2 px-3">
          <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">취소</button>
          <button type="submit" class="btn btn-primary btn-sm" id="am-submit" disabled>
            <i class="bi bi-plus-lg me-1"></i>추가
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- 멤버별 수정 모달 -->
<div th:each="pa : ${members}">
  <div class="modal fade" th:id="|editMemberModal-${pa.id}|" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header py-2 px-3">
          <h6 class="modal-title fw-700" th:text="|${pa.displayName} 투입 정보 수정|">수정</h6>
          <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
        </div>
        <form th:action="@{/sales/projects/{pid}/members/{aid}/update(pid=${project.id},aid=${pa.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="modal-body px-3 py-3">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label fw-600 small">역할</label>
                <input type="text" class="form-control form-control-sm" name="role" th:value="${pa.role}"
                       placeholder="예: 개발자, PM">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-600 small">투입 시작일 <span class="text-danger">*</span></label>
                <input type="date" class="form-control form-control-sm" name="startDate" th:value="${pa.startDate}" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-600 small">투입 종료일 <span class="text-danger">*</span></label>
                <input type="date" class="form-control form-control-sm" name="endDate" th:value="${pa.endDate}" required>
              </div>
              <div class="col-12">
                <label class="form-label fw-600 small">상태</label>
                <select class="form-select form-select-sm" name="status">
                  <option th:each="s : ${allStatuses}"
                          th:value="${s.name()}"
                          th:text="${s.displayName}"
                          th:selected="${s == pa.status}">상태</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer py-2 px-3">
            <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">취소</button>
            <button type="submit" class="btn btn-primary btn-sm">저장</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
/* ── 직원 추가 모달 — 검색 + 팀 필터 ── */
(function() {
  var searchEl  = document.getElementById('am-search');
  var teamEl    = document.getElementById('am-team');
  var listEl    = document.getElementById('am-list');
  var emptyEl   = document.getElementById('am-empty');
  var uidEl     = document.getElementById('am-userId');
  var selectedEl = document.getElementById('am-selected');
  var nameEl    = document.getElementById('am-selected-name');
  var submitBtn = document.getElementById('am-submit');
  if (!listEl) return;

  // 팀 옵션 생성
  var teams = new Set();
  listEl.querySelectorAll('.am-item').forEach(function(el) { if (el.dataset.team) teams.add(el.dataset.team); });
  Array.from(teams).sort().forEach(function(t) {
    var opt = document.createElement('option'); opt.value = t; opt.textContent = t;
    teamEl.appendChild(opt);
  });

  function applyFilter() {
    var q    = searchEl.value.trim().toLowerCase();
    var team = teamEl.value;
    var vis  = 0;
    listEl.querySelectorAll('.am-item').forEach(function(el) {
      var show = (!q || el.dataset.name.toLowerCase().includes(q)) && (!team || el.dataset.team === team);
      el.style.display = show ? '' : 'none';
      if (show) vis++;
    });
    if (emptyEl) emptyEl.style.display = vis === 0 ? '' : 'none';
  }

  // 항목 클릭으로 선택
  listEl.addEventListener('click', function(e) {
    var item = e.target.closest('.am-item');
    if (!item || item.id === 'am-empty') return;
    listEl.querySelectorAll('.am-item').forEach(function(el) {
      el.style.background = '';
      el.style.fontWeight = '';
    });
    item.style.background = '#eff6ff';
    uidEl.value = item.dataset.uid;
    nameEl.textContent = item.dataset.name + (item.dataset.team ? ' (' + item.dataset.team + ')' : '');
    selectedEl.style.display = '';
    if (submitBtn) submitBtn.disabled = false;
  });

  if (searchEl) searchEl.addEventListener('input', applyFilter);
  if (teamEl)   teamEl.addEventListener('change', applyFilter);

  // 모달 닫힐 때 초기화
  var modal = document.getElementById('addMemberModal');
  if (modal) {
    modal.addEventListener('hidden.bs.modal', function() {
      searchEl.value = ''; teamEl.value = '';
      uidEl.value = '';
      selectedEl.style.display = 'none';
      if (submitBtn) submitBtn.disabled = true;
      listEl.querySelectorAll('.am-item').forEach(function(el) { el.style.background = ''; });
      applyFilter();
    });
  }

  // 폼 submit 전 userId 검증
  var form = document.getElementById('addMemberForm');
  if (form) {
    form.addEventListener('submit', function(e) {
      if (!uidEl.value) { e.preventDefault(); alert('직원을 선택해 주세요.'); }
    });
  }
})();

(function(){
    document.querySelectorAll('form').forEach(function(f){
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
