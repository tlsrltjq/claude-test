<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${project.name} — eActive Resource Hub|">프로젝트 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<!-- 네비게이션 -->
<nav class="topnav mb-3">
    <div class="container d-flex align-items-center gap-2 flex-wrap">
        <a class="brand me-3" th:href="@{/}">eActive Resource Hub</a>
        <a class="btn btn-sm btn-nav" th:href="@{/sales/calendar}">투입 캘린더</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <span class="text-white-50 small" th:text="${currentUser.name}">사용자</span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-nav">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container" style="max-width:960px">

    <!-- 플래시 메시지 -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2 mb-3" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2 mb-3" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 페이지 헤더 -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h2 th:text="${project.name}">프로젝트명</h2>
            <div class="sub">
                <span th:text="${project.clientName != null ? project.clientName : '고객사 미지정'}">고객사</span>
                &nbsp;·&nbsp;
                <span th:text="|${project.startDate} ~ ${project.endDate}|">기간</span>
            </div>
        </div>
        <div class="d-flex gap-2 align-items-center" th:if="${currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'SALES'}">
            <button class="btn btn-sm btn-light" data-bs-toggle="modal" data-bs-target="#editProjectModal">
                <i class="bi bi-pencil"></i> 수정
            </button>
            <form th:action="@{/sales/projects/{id}/delete(id=${project.id})}" method="post"
                  onsubmit="return confirm('프로젝트를 삭제하면 모든 배정이 함께 삭제됩니다. 계속하시겠습니까?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-sm btn-outline-light">
                    <i class="bi bi-trash"></i> 삭제
                </button>
            </form>
        </div>
    </div>

    <!-- 프로젝트 정보 카드 -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-2">
                    <div class="section-title">상태</div>
                    <span class="badge-status"
                          th:classappend="|status-${project.status}|"
                          th:text="${project.status.displayName}">진행 중</span>
                </div>
                <div class="col-md-3">
                    <div class="section-title">시작일</div>
                    <span th:text="${project.startDate}">-</span>
                </div>
                <div class="col-md-3">
                    <div class="section-title">종료일</div>
                    <span th:text="${project.endDate}">-</span>
                </div>
                <div class="col-md-4" th:if="${project.memo != null and !project.memo.isBlank()}">
                    <div class="section-title">메모</div>
                    <span th:text="${project.memo}">-</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 투입 직원 카드 -->
    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0 fw-bold">투입 직원</h6>
                <button class="btn btn-sm btn-primary"
                        th:if="${currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'SALES'}"
                        data-bs-toggle="modal" data-bs-target="#addMemberModal">
                    <i class="bi bi-person-plus"></i> 직원 추가
                </button>
            </div>

            <div th:if="${#lists.isEmpty(members)}" class="text-center text-muted py-4">
                <i class="bi bi-people" style="font-size:2rem"></i>
                <p class="mt-2 mb-0 small">투입된 직원이 없습니다.</p>
            </div>

            <div th:unless="${#lists.isEmpty(members)}" class="table-responsive">
                <table class="table table-sm align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>이름</th>
                            <th>팀</th>
                            <th>역할</th>
                            <th>투입 시작일</th>
                            <th>투입 종료일</th>
                            <th>상태</th>
                            <th th:if="${currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'SALES'}">조작</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pa : ${members}">
                            <td th:text="${pa.user.name}">홍길동</td>
                            <td th:text="${pa.user.team != null ? pa.user.team.name : '미배정'}">팀명</td>
                            <td>
                                <span th:if="${pa.role != null and !pa.role.isBlank()}"
                                      th:text="${pa.role}">역할</span>
                                <span th:unless="${pa.role != null and !pa.role.isBlank()}"
                                      class="text-muted small">-</span>
                            </td>
                            <td th:text="${pa.startDate}">-</td>
                            <td th:text="${pa.endDate}">-</td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="|status-${pa.status}|"
                                      th:text="${pa.status.displayName}">상태</span>
                            </td>
                            <td th:if="${currentUser.role.name() == 'ADMIN' or currentUser.role.name() == 'SALES'}">
                                <button class="btn btn-sm btn-outline-secondary me-1"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="|#editMemberModal-${pa.id}|">
                                    수정
                                </button>
                                <form th:action="@{/sales/projects/{pid}/members/{aid}/delete(pid=${project.id},aid=${pa.id})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('이 직원을 프로젝트에서 제거합니까?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger">삭제</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 프로젝트 수정 모달 -->
<div class="modal fade" id="editProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">프로젝트 수정</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/sales/projects/{id}/update(id=${project.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">프로젝트명 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" th:value="${project.name}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">고객사</label>
                        <input type="text" class="form-control" name="clientName" th:value="${project.clientName}">
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col">
                            <label class="form-label">시작일 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="startDate" th:value="${project.startDate}" required>
                        </div>
                        <div class="col">
                            <label class="form-label">종료일 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="endDate" th:value="${project.endDate}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">상태</label>
                        <select class="form-select" name="status">
                            <option th:each="s : ${projectStatuses}"
                                    th:value="${s.name()}"
                                    th:text="${s.displayName}"
                                    th:selected="${s == project.status}">상태</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">메모</label>
                        <textarea class="form-control" name="memo" rows="3" th:text="${project.memo}"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 멤버 추가 모달 -->
<div class="modal fade" id="addMemberModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">직원 추가</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/sales/projects/{id}/members(id=${project.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">직원 <span class="text-danger">*</span></label>
                        <select class="form-select" name="userId" required>
                            <option value="">-- 선택 --</option>
                            <option th:each="u : ${assignableUsers}"
                                    th:value="${u.id}"
                                    th:text="${u.name + (u.team != null ? ' (' + u.team.name + ')' : '')}">직원명</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">역할</label>
                        <input type="text" class="form-control" name="role" placeholder="예: 개발자, PM">
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col">
                            <label class="form-label">투입 시작일 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="startDate"
                                   th:value="${project.startDate}" required>
                        </div>
                        <div class="col">
                            <label class="form-label">투입 종료일 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="endDate"
                                   th:value="${project.endDate}" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">추가</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 멤버별 수정 모달 -->
<div th:each="pa : ${members}">
    <div class="modal fade" th:id="|editMemberModal-${pa.id}|" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="|${pa.user.name} 투입 정보 수정|">수정</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/sales/projects/{pid}/members/{aid}/update(pid=${project.id},aid=${pa.id})}"
                      method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">역할</label>
                            <input type="text" class="form-control" name="role" th:value="${pa.role}"
                                   placeholder="예: 개발자, PM">
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col">
                                <label class="form-label">투입 시작일 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" name="startDate"
                                       th:value="${pa.startDate}" required>
                            </div>
                            <div class="col">
                                <label class="form-label">투입 종료일 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" name="endDate"
                                       th:value="${pa.endDate}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">상태</label>
                            <select class="form-select" name="status">
                                <option th:each="s : ${allStatuses}"
                                        th:value="${s.name()}"
                                        th:text="${s.displayName}"
                                        th:selected="${s == pa.status}">상태</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                        <button type="submit" class="btn btn-primary">저장</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
