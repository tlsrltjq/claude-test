<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경력 계산기 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/sales/career-calculator}" class="btn btn-outline-light btn-sm">경력 계산기</a>
            <a th:href="@{/sales/profiles}" class="btn btn-outline-light btn-sm">인력 표</a>
            <a th:href="@{/sales/members}" class="btn btn-outline-light btn-sm">인력 목록</a>
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width:680px;">
    <h2 class="mb-3 h5">경력 계산기</h2>

    <!-- 계산 결과 -->
    <div th:if="${result != null}" class="alert alert-success mb-3">
        <div class="fw-bold fs-5">총 경력: <span th:text="${result.displayText}"></span></div>
        <div class="small mt-1 text-success-emphasis">
            총 <span th:text="${result.totalMonths}"></span>개월
            <span th:if="${removeOverlap}">
                · 중복 제거 후 <span th:text="${result.rangeCount}"></span>개 구간
            </span>
            <span th:unless="${removeOverlap}">
                · <span th:text="${result.rangeCount}"></span>개 구간 합산
            </span>
        </div>
    </div>

    <!-- 오류 -->
    <div th:if="${errors != null and !#lists.isEmpty(errors)}" class="alert alert-danger mb-3">
        <ul class="mb-0 ps-3">
            <li th:each="err : ${errors}" th:text="${err}"></li>
        </ul>
    </div>

    <!-- 안내 메시지 -->
    <div th:if="${infoMessage != null}" class="alert alert-info mb-3" th:text="${infoMessage}"></div>

    <!-- 입력 폼 -->
    <div class="card">
        <div class="card-body">
            <form method="post" th:action="@{/sales/career-calculator}">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">

                <div class="row g-2 mb-1">
                    <div class="col"><span class="form-label small text-muted">시작일</span></div>
                    <div class="col"><span class="form-label small text-muted">종료일</span></div>
                    <div class="col-auto" style="width:42px;"></div>
                </div>

                <div id="periods">
                    <div th:each="startDate, stat : ${startDates}" class="row g-2 mb-2 period-row">
                        <div class="col">
                            <input type="date" name="startDates" class="form-control form-control-sm"
                                   th:value="${startDate}">
                        </div>
                        <div class="col">
                            <input type="date" name="endDates" class="form-control form-control-sm"
                                   th:value="${endDates[stat.index]}">
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn btn-outline-danger btn-sm"
                                    onclick="removeRow(this)" title="행 삭제">−</button>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addRow()">
                        + 기간 추가
                    </button>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="removeOverlap"
                           name="removeOverlap" value="true" th:checked="${removeOverlap}">
                    <label class="form-check-label small" for="removeOverlap">
                        중복 기간 제거 (겹치는 구간을 하나로 합산)
                    </label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">계산하기</button>
                    <a th:href="@{/sales/career-calculator}" class="btn btn-outline-secondary">초기화</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function addRow() {
    const container = document.getElementById('periods');
    const row = document.createElement('div');
    row.className = 'row g-2 mb-2 period-row';
    row.innerHTML =
        '<div class="col"><input type="date" name="startDates" class="form-control form-control-sm"></div>' +
        '<div class="col"><input type="date" name="endDates" class="form-control form-control-sm"></div>' +
        '<div class="col-auto"><button type="button" class="btn btn-outline-danger btn-sm" onclick="removeRow(this)" title="행 삭제">−</button></div>';
    container.appendChild(row);
}

function removeRow(btn) {
    const rows = document.querySelectorAll('.period-row');
    if (rows.length <= 1) return;
    btn.closest('.period-row').remove();
}
</script>
</body>
</html>
