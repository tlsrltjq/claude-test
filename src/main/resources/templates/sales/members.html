<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전사 인력 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-people-fill me-2"></i>전사 인력 목록</h1>
          <p class="page-hd-sub">총 <strong th:text="${totalCount}">0</strong>명
            <span th:if="${totalPages > 1}" class="ms-2 text-muted" style="font-size:.82rem"
                  th:text="'(' + ${page} + ' / ' + ${totalPages} + ' 페이지)'"></span>
          </p>
        </div>
      </div>

      <!-- 검색/필터 바 -->
      <div class="filter-bar">
        <form method="get" th:action="@{/sales/members}" class="d-contents" id="filterForm"
              style="display:contents">
          <input type="hidden" name="sort"      th:value="${sort}">
          <input type="hidden" name="direction" th:value="${direction}">
          <input type="hidden" name="page"      value="1">
          <i class="bi bi-funnel text-muted" style="flex-shrink:0"></i>
          <div class="input-group input-group-sm" style="width:220px;flex-shrink:0">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" name="q" class="form-control border-start-0"
                   placeholder="이름 또는 이메일" th:value="${q}">
          </div>
          <select name="teamId" class="form-select form-select-sm" style="width:auto;min-width:110px">
            <option value="">전체 팀</option>
            <option th:each="team : ${teams}"
                    th:value="${team.id}"
                    th:text="${team.name}"
                    th:selected="${teamId != null and teamId == team.id}"></option>
          </select>
          <button type="submit" class="btn btn-primary btn-sm fw-semibold px-3">검색</button>
          <a th:href="@{/sales/members}" class="btn btn-outline-secondary btn-sm">초기화</a>
        </form>
      </div>

      <!-- 빈 상태 -->
      <div th:if="${#lists.isEmpty(members)}" class="empty-state">
        <i class="bi bi-person-x"></i>
        <p>조건에 맞는 직원이 없습니다.</p>
      </div>

      <!-- 테이블 -->
      <div th:if="${!#lists.isEmpty(members)}" class="members-card">
        <div class="table-responsive">
          <table class="table members-table">
            <thead>
            <tr>
              <!-- 이름 -->
              <th>
                <a th:href="@{/sales/members(q=${q},teamId=${teamId},sort='name',direction=${sort=='name' and direction=='asc'?'desc':'asc'},page=1)}"
                   th:classappend="${sort=='name'} ? 'sort-btn active' : 'sort-btn'">
                  이름
                  <i th:if="${sort=='name' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='name' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='name'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <!-- 이메일 -->
              <th><span class="sort-btn" style="cursor:default">이메일</span></th>
              <!-- 팀 -->
              <th>
                <a th:href="@{/sales/members(q=${q},teamId=${teamId},sort='team',direction=${sort=='team' and direction=='asc'?'desc':'asc'},page=1)}"
                   th:classappend="${sort=='team'} ? 'sort-btn active' : 'sort-btn'">
                  팀
                  <i th:if="${sort=='team' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='team' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='team'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <!-- 직급 -->
              <th>
                <a th:href="@{/sales/members(q=${q},teamId=${teamId},sort='position',direction=${sort=='position' and direction=='asc'?'desc':'asc'},page=1)}"
                   th:classappend="${sort=='position'} ? 'sort-btn active' : 'sort-btn'">
                  직급
                  <i th:if="${sort=='position' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='position' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='position'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <!-- 역할 -->
              <th>
                <a th:href="@{/sales/members(q=${q},teamId=${teamId},sort='role',direction=${sort=='role' and direction=='asc'?'desc':'asc'},page=1)}"
                   th:classappend="${sort=='role'} ? 'sort-btn active' : 'sort-btn'">
                  역할
                  <i th:if="${sort=='role' and direction=='asc'}"  class="bi bi-arrow-up"></i>
                  <i th:if="${sort=='role' and direction=='desc'}" class="bi bi-arrow-down"></i>
                  <i th:if="${sort!='role'}" class="bi bi-arrow-down-up" style="opacity:.35"></i>
                </a>
              </th>
              <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="member : ${members}">
              <td class="member-name" th:text="${member.name}"></td>
              <td class="member-email" th:text="${member.email}"></td>
              <td>
                <span th:if="${member.team != null}"
                      class="badge rounded-pill"
                      style="background:#e7f0ff;color:#1d4ed8;font-size:.72rem"
                      th:text="${member.team.name}"></span>
                <span th:if="${member.team == null}" class="text-muted">-</span>
              </td>
              <td style="color:#495057;font-size:.82rem"
                  th:text="${member.position != null ? member.position.displayName : '-'}"></td>
              <td>
                <span class="badge"
                      th:classappend="${member.role.name() == 'ADMIN'} ? 'badge-admin' : (${member.role.name() == 'SALES'} ? 'badge-sales' : 'badge-emp')"
                      th:text="${member.role.displayName}"
                      style="font-size:.7rem;padding:.22rem .5rem;border-radius:6px"></span>
              </td>
              <td>
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/employees/{id}/documents(id=${member.id})}"
                   class="btn btn-sm btn-outline-primary" style="font-size:.75rem;border-radius:6px;padding:.2rem .55rem">
                  <i class="bi bi-folder2-open me-1"></i>문서
                </a>
                <a sec:authorize="hasRole('SALES')"
                   th:href="@{/sales/members/{id}/documents(id=${member.id})}"
                   class="btn btn-sm btn-outline-primary" style="font-size:.75rem;border-radius:6px;padding:.2rem .55rem">
                  <i class="bi bi-folder2-open me-1"></i>문서
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <!-- 페이지네이션 -->
        <div th:if="${totalPages > 1}"
             class="d-flex justify-content-center align-items-center gap-1 py-3"
             style="border-top:1px solid #f0f1f3">
          <!-- 이전 -->
          <a th:if="${page > 1}"
             th:href="@{/sales/members(q=${q},teamId=${teamId},sort=${sort},direction=${direction},page=${page-1})}"
             class="btn btn-outline-secondary btn-sm" style="border-radius:6px;padding:.28rem .65rem">
            <i class="bi bi-chevron-left"></i>
          </a>
          <span th:if="${page == 1}" class="btn btn-outline-secondary btn-sm disabled"
                style="border-radius:6px;padding:.28rem .65rem;opacity:.4">
            <i class="bi bi-chevron-left"></i>
          </span>

          <!-- 페이지 번호 -->
          <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
            <a th:if="${i != page}"
               th:href="@{/sales/members(q=${q},teamId=${teamId},sort=${sort},direction=${direction},page=${i})}"
               th:text="${i}"
               class="btn btn-outline-secondary btn-sm"
               style="border-radius:6px;min-width:34px;padding:.28rem .4rem"></a>
            <span th:if="${i == page}" th:text="${i}"
                  class="btn btn-primary btn-sm"
                  style="border-radius:6px;min-width:34px;padding:.28rem .4rem"></span>
          </th:block>

          <!-- 다음 -->
          <a th:if="${page < totalPages}"
             th:href="@{/sales/members(q=${q},teamId=${teamId},sort=${sort},direction=${direction},page=${page+1})}"
             class="btn btn-outline-secondary btn-sm" style="border-radius:6px;padding:.28rem .65rem">
            <i class="bi bi-chevron-right"></i>
          </a>
          <span th:if="${page == totalPages}" class="btn btn-outline-secondary btn-sm disabled"
                style="border-radius:6px;padding:.28rem .65rem;opacity:.4">
            <i class="bi bi-chevron-right"></i>
          </span>
        </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
