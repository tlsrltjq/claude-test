<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전사 인력 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        th a { color: inherit; text-decoration: none; }
        th a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/sales/profiles}" class="btn btn-outline-light btn-sm">인력 표</a>
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">전사 인력 목록</h2>
        <small class="text-muted" th:text="'총 ' + ${#lists.size(members)} + '명'"></small>
    </div>

    <!-- 검색/필터 -->
    <form method="get" th:action="@{/sales/members}" class="row g-2 mb-3 align-items-center">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="direction" th:value="${direction}">
        <div class="col-sm-4">
            <input type="text" name="q" class="form-control form-control-sm"
                   placeholder="이름 또는 이메일 검색" th:value="${q}">
        </div>
        <div class="col-auto">
            <select name="teamId" class="form-select form-select-sm">
                <option value="">전체 팀</option>
                <option th:each="team : ${teams}"
                        th:value="${team.id}"
                        th:text="${team.name}"
                        th:selected="${teamId != null and teamId == team.id}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm">검색</button>
            <a th:href="@{/sales/members}" class="btn btn-outline-secondary btn-sm ms-1">초기화</a>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(members)}" class="alert alert-info">조건에 맞는 직원이 없습니다.</div>

    <!-- direction 토글 헬퍼: 현재 정렬 컬럼이면 반전, 아니면 asc -->
    <table th:if="${!#lists.isEmpty(members)}" class="table table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>
                <a th:href="@{/sales/members(q=${q},teamId=${teamId},sort='name',direction=${sort=='name' and direction=='asc'?'desc':'asc'})}">
                    이름 <span th:if="${sort=='name'}" th:text="${direction=='asc'?'▲':'▼'}"></span>
                </a>
            </th>
            <th>이메일</th>
            <th>
                <a th:href="@{/sales/members(q=${q},teamId=${teamId},sort='team',direction=${sort=='team' and direction=='asc'?'desc':'asc'})}">
                    팀 <span th:if="${sort=='team'}" th:text="${direction=='asc'?'▲':'▼'}"></span>
                </a>
            </th>
            <th>
                <a th:href="@{/sales/members(q=${q},teamId=${teamId},sort='position',direction=${sort=='position' and direction=='asc'?'desc':'asc'})}">
                    직급 <span th:if="${sort=='position'}" th:text="${direction=='asc'?'▲':'▼'}"></span>
                </a>
            </th>
            <th>
                <a th:href="@{/sales/members(q=${q},teamId=${teamId},sort='role',direction=${sort=='role' and direction=='asc'?'desc':'asc'})}">
                    역할 <span th:if="${sort=='role'}" th:text="${direction=='asc'?'▲':'▼'}"></span>
                </a>
            </th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="member : ${members}">
            <td th:text="${member.name}"></td>
            <td th:text="${member.email}"></td>
            <td th:text="${member.team != null ? member.team.name : '-'}"></td>
            <td th:text="${member.position != null ? member.position.displayName : '-'}"></td>
            <td>
                <span th:text="${member.role.displayName}"
                      th:classappend="${member.role.name() == 'ADMIN'} ? 'bg-danger' : (${member.role.name() == 'SALES'} ? 'bg-primary' : 'bg-secondary')"
                      class="badge"></span>
            </td>
            <td>
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/employees/{id}/documents(id=${member.id})}"
                   class="btn btn-outline-primary btn-sm">문서 보기</a>
                <a sec:authorize="hasRole('SALES')"
                   th:href="@{/sales/members/{id}/documents(id=${member.id})}"
                   class="btn btn-outline-primary btn-sm">문서 보기</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
