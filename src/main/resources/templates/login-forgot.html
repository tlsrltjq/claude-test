<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="wrap">
    <div class="auth-card card">
        <div class="auth-header">
            <i class="bi bi-key-fill logo-icon"></i>
            <div class="brand">eActive Resource Hub</div>
            <h1>비밀번호 찾기</h1>
            <p>가입한 이메일을 입력하면<br>인증코드를 보내드립니다.</p>
        </div>
        <div class="auth-body">
            <div th:if="${param.toomany}" class="alert alert-warning d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-shield-exclamation"></i>
                <span>로그인 시도 횟수(10회)를 초과했습니다. 비밀번호를 재설정해 주세요.</span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>
            <form th:action="@{/login/forgot}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-4">
                    <label class="form-label">이메일</label>
                    <div class="input-icon">
                        <i class="bi bi-envelope-fill"></i>
                        <input type="email" name="email" class="form-control"
                               placeholder="example@company.com" required autofocus autocomplete="email">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-submit">
                    <i class="bi bi-send-fill me-1"></i>인증코드 발송
                </button>
            </form>
            <a th:href="@{/login}" class="back-link">
                <i class="bi bi-arrow-left me-1"></i>로그인으로 돌아가기
            </a>
        </div>
    </div>
</div>
</body>
</html>
