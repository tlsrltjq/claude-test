<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-sm" style="width:100%;max-width:420px;">
        <div class="card-body p-4">
            <h1 class="h4 text-center mb-1">비밀번호 찾기</h1>
            <p class="text-center text-muted small mb-4">가입한 이메일 앞부분을 입력하면 인증코드를 보내드립니다.</p>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/login/forgot}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label">회사 이메일</label>
                    <div class="input-group">
                        <input type="text" name="emailPrefix" class="form-control"
                               placeholder="이메일 앞부분" required autofocus>
                        <span class="input-group-text text-muted" th:text="'@' + ${emailDomain}"></span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">인증코드 발송</button>
            </form>

            <hr>
            <p class="text-center mb-0 small">
                <a th:href="@{/login}">← 로그인으로 돌아가기</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
