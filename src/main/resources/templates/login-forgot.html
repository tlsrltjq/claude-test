<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; min-height: 100vh; }
        .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { width: 100%; max-width: 420px; border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.10); overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: 2.25rem 2rem; text-align: center; color: #fff; }
        .auth-header .brand { font-size: .8rem; opacity: .85; letter-spacing: .08em; text-transform: uppercase; }
        .auth-header .logo-icon { font-size: 2.2rem; margin-bottom: .5rem; display: block; }
        .auth-header h1 { font-size: 1.3rem; font-weight: 700; margin: 0; }
        .auth-header p { margin: .4rem 0 0; font-size: .85rem; opacity: .8; }
        .auth-body { padding: 2rem; background: #fff; }
        .form-label { font-size: .85rem; font-weight: 600; color: #343a40; margin-bottom: .3rem; }
        .input-icon { position: relative; }
        .input-icon .bi { position: absolute; left: .75rem; top: 50%; transform: translateY(-50%); color: #adb5bd; font-size: 1rem; pointer-events: none; }
        .input-icon .form-control { padding-left: 2.25rem; }
        .btn-submit { padding: .75rem; font-size: 1rem; font-weight: 600; border-radius: 10px; }
        .back-link { display: block; text-align: center; font-size: .84rem; color: #6c757d; text-decoration: none; margin-top: 1.25rem; }
        .back-link:hover { color: #0d6efd; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="auth-card card">
        <div class="auth-header">
            <i class="bi bi-key-fill logo-icon"></i>
            <div class="brand">eActive Resource Hub</div>
            <h1>비밀번호 찾기</h1>
            <p>가입한 이메일을 입력하면<br>인증코드를 보내드립니다.</p>
        </div>
        <div class="auth-body">
            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>
            <form th:action="@{/login/forgot}" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="mb-4">
                    <label class="form-label">이메일</label>
                    <div class="input-icon">
                        <i class="bi bi-envelope-fill"></i>
                        <input type="email" name="email" class="form-control"
                               placeholder="example@company.com" required autofocus autocomplete="email">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-submit">
                    <i class="bi bi-send-fill me-1"></i>인증코드 발송
                </button>
            </form>
            <a th:href="@{/login}" class="back-link">
                <i class="bi bi-arrow-left me-1"></i>로그인으로 돌아가기
            </a>
        </div>
    </div>
</div>
</body>
</html>
