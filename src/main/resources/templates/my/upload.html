<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 업로드 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap" style="max-width:640px;">

      <div class="upload-card card">
          <div class="upload-header">
              <h2><i class="bi bi-cloud-upload me-2"></i>문서 업로드</h2>
              <div style="font-size:.85rem;opacity:.8;margin-top:.25rem">내 폴더에 문서를 업로드합니다.</div>
          </div>

          <div class="upload-body">
              <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2">
                  <i class="bi bi-exclamation-triangle-fill"></i>
                  <span th:text="${errorMessage}"></span>
              </div>

              <div id="largeFileWarn" class="alert alert-warning warn-box d-none">
                  <i class="bi bi-info-circle me-1"></i>
                  <strong>20MB 초과 파일</strong>은 관리자 승인 후 공개됩니다. 업로드는 정상 진행됩니다.
              </div>

              <form id="uploadForm" th:action="@{/my/folder/documents}" method="post" enctype="multipart/form-data">
                  <input type="hidden" name="_csrf" th:value="${_csrf.token}">

                  <!-- ── 문서 정보 ── -->
                  <div class="section-label"><i class="bi bi-file-text"></i> 문서 정보</div>

                  <div class="mb-3">
                      <label class="form-label">문서 종류 <span class="req">*</span></label>
                      <select name="documentType" id="docTypeSelect" class="form-select" required>
                          <option value="">선택하세요</option>
                          <option th:each="dt : ${documentTypes}"
                                  th:value="${dt.name()}"
                                  th:text="${dt.displayName}"></option>
                      </select>
                  </div>

                  <div class="mb-3">
                      <label class="form-label">문서 제목 <span class="req">*</span></label>
                      <input type="text" name="title" class="form-control" required placeholder="문서 종류를 먼저 선택하세요">
                  </div>

                  <!-- ── 학위/자격증 메타 (문서 종류에 따라 동적 표시) ── -->
                  <div id="metaGrad" class="meta-box mb-3" style="display:none">
                      <div class="meta-title"><i class="bi bi-mortarboard-fill"></i> 학력 정보</div>
                      <div class="row g-3">
                          <div class="col-6">
                              <label class="form-label">학위 종류 <span class="req">*</span></label>
                              <select name="degreeType" id="degreeTypeSelect" class="form-select">
                                  <option value="">선택</option>
                                  <option value="HIGHSCHOOL">고졸</option>
                                  <option value="ASSOCIATE">전문학사</option>
                                  <option value="BACHELOR">학사</option>
                                  <option value="MASTER">석사</option>
                                  <option value="DOCTORATE">박사</option>
                              </select>
                          </div>
                          <div class="col-6">
                              <label class="form-label">졸업일 <span class="req">*</span></label>
                              <span class="date-split" id="issuedDateGrad">
                                <input type="text" class="date-seg date-seg-y" maxlength="4" placeholder="YYYY" inputmode="numeric" autocomplete="off">
                                <span class="date-sep">.</span>
                                <input type="text" class="date-seg date-seg-m" maxlength="2" placeholder="MM" inputmode="numeric" autocomplete="off">
                                <span class="date-sep">.</span>
                                <input type="text" class="date-seg date-seg-d" maxlength="2" placeholder="DD" inputmode="numeric" autocomplete="off">
                                <input type="hidden" name="issuedDate">
                              </span>
                          </div>
                      </div>
                  </div>

                  <div id="metaCert" class="meta-box mb-3" style="display:none">
                      <div class="meta-title"><i class="bi bi-patch-check-fill"></i> 자격증 정보</div>
                      <input type="hidden" name="certTypeMeta" value="ENGINEER">
                      <div class="row g-3">
                          <div class="col-12">
                              <label class="form-label">취득일 <span class="req">*</span></label>
                              <span class="date-split" id="issuedDateCert">
                                <input type="text" class="date-seg date-seg-y" maxlength="4" placeholder="YYYY" inputmode="numeric" autocomplete="off">
                                <span class="date-sep">.</span>
                                <input type="text" class="date-seg date-seg-m" maxlength="2" placeholder="MM" inputmode="numeric" autocomplete="off">
                                <span class="date-sep">.</span>
                                <input type="text" class="date-seg date-seg-d" maxlength="2" placeholder="DD" inputmode="numeric" autocomplete="off">
                                <input type="hidden" name="issuedDate">
                              </span>
                          </div>
                      </div>
                  </div>

                  <!-- ── 파일 ── -->
                  <div class="section-label"><i class="bi bi-paperclip"></i> 파일</div>

                  <div class="file-drop" id="fileDrop">
                      <div class="drop-icon"><i class="bi bi-cloud-arrow-up"></i></div>
                      <div class="drop-text">클릭하거나 파일을 끌어다 놓으세요</div>
                      <div class="drop-sub">PDF, JPG, PNG, DOCX, HWP, PPT, ZIP, XLSX, XLS · 20MB 이하 즉시 승인 / 100MB 이하 검토 후 승인</div>
                  </div>
                  <input type="file" id="fileInput" name="file" class="d-none" required
                         accept=".pdf,.jpg,.jpeg,.png,.docx,.hwp,.hwpx,.ppt,.pptx,.zip,.xlsx,.xls"
                         >
                  <div class="file-name-display" id="fileNameDisplay">
                      <i class="bi bi-file-earmark-fill text-primary"></i>
                      <span id="fileNameText"></span>
                      <span id="fileSizeText" class="text-muted ms-auto"></span>
                  </div>

                  <!-- 만료일 (선택) -->
                  <div class="mt-3">
                      <label class="form-label">만료일 <span class="opt">(선택 — 자격증·건강보험료 등 유효기간 있는 문서)</span></label>
                      <span class="date-split">
                        <input type="text" class="date-seg date-seg-y" maxlength="4" placeholder="YYYY" inputmode="numeric" autocomplete="off">
                        <span class="date-sep">.</span>
                        <input type="text" class="date-seg date-seg-m" maxlength="2" placeholder="MM" inputmode="numeric" autocomplete="off">
                        <span class="date-sep">.</span>
                        <input type="text" class="date-seg date-seg-d" maxlength="2" placeholder="DD" inputmode="numeric" autocomplete="off">
                        <input type="hidden" name="expiresAt">
                      </span>
                  </div>

                  <!-- 업로드 진행률 -->
                  <div id="progressWrap" class="d-none mt-3">
                      <div class="d-flex justify-content-between align-items-center mb-1">
                          <small class="text-muted">업로드 중...</small>
                          <small id="progressText" class="fw-bold text-primary">0%</small>
                      </div>
                      <div class="progress" style="height:8px;">
                          <div id="progressBar"
                               class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                               role="progressbar" style="width:0%"></div>
                      </div>
                  </div>

                  <div id="xhrErrorBox" class="alert alert-danger d-none mt-3">
                      <i class="bi bi-exclamation-triangle-fill me-1"></i>
                      <span id="xhrErrorMsg"></span>
                  </div>

                  <div class="d-flex gap-2 mt-4">
                      <button type="submit" id="uploadBtn" class="btn btn-primary flex-fill btn-upload">
                          <i class="bi bi-cloud-upload me-1"></i>업로드
                      </button>
                      <button type="button" id="cancelBtn" class="btn btn-outline-secondary">취소</button>
                  </div>
              </form>
          </div>
      </div>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/date-utils.js}"></script>
<script th:attr="nonce=${cspNonce}">
/* ── 문서 종류별 제목 placeholder 매핑 ── */
const TITLE_PLACEHOLDER = {
    'RESUME':                  '예: 2025년 이력서',
    'CAREER_DESCRIPTION':      '예: 2025년 SW기술자 경력증명서',
    'GRADUATION_CERTIFICATE':  '예: ○○대학교 졸업증명서',
    'LICENSE':                 '예: 정보처리기사 자격증',
    'NATIONAL_PENSION_CERTIFICATE': '예: 2025년 국민연금가입증명서',
    'HEALTH_INSURANCE_CERTIFICATE':  '예: 2025년 건강보험가입증명서',
    'HEALTH_INSURANCE_ELIGIBILITY':  '예: 2025년 건강보험자격득실확인서',
    'PROFILE_PHOTO':           '예: 증명사진 2025',
    'ETC':                     '예: 기타 서류',
};

/* ── 문서 종류에 따른 메타 박스 + placeholder 변경 ── */
function onTypeChange() {
    const val = document.getElementById('docTypeSelect').value;
    document.getElementById('metaGrad').style.display = (val === 'GRADUATION_CERTIFICATE') ? '' : 'none';
    document.getElementById('metaCert').style.display = (val === 'LICENSE') ? '' : 'none';
    /* 숨겨진 input이 제출되지 않도록 비활성화 */
    ['degreeTypeSelect','issuedDateGrad'].forEach(id => {
        document.getElementById(id).disabled = (val !== 'GRADUATION_CERTIFICATE');
    });
    const certDateEl = document.getElementById('issuedDateCert');
    if (certDateEl) certDateEl.disabled = (val !== 'LICENSE');
    /* 제목 placeholder 동적 변경 */
    const titleInput = document.querySelector('input[name="title"]');
    titleInput.placeholder = TITLE_PLACEHOLDER[val] || '문서 제목을 입력하세요';
}
onTypeChange(); // 초기화

/* ── 파일 선택 표시 ── */
function onFileChange(input) {
    const disp = document.getElementById('fileNameDisplay');
    const nameEl = document.getElementById('fileNameText');
    const sizeEl = document.getElementById('fileSizeText');
    const warn = document.getElementById('largeFileWarn');
    if (input.files && input.files[0]) {
        const f = input.files[0];
        nameEl.textContent = f.name;
        sizeEl.textContent = (f.size / 1024 / 1024).toFixed(1) + ' MB';
        disp.style.display = 'flex';
        warn.classList.toggle('d-none', f.size < 10 * 1024 * 1024);
        document.getElementById('fileDrop').style.borderColor = '#0d6efd';
    }
}

/* ── 드래그 앤 드롭 ── */
const drop = document.getElementById('fileDrop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('drag-over');
    const fi = document.getElementById('fileInput');
    fi.files = e.dataTransfer.files;
    onFileChange(fi);
});

/* ── 취소 버튼 ── */
let currentXhr = null;

function onCancelClick() {
    if (currentXhr) {
        currentXhr.abort();
    } else {
        window.location.href = '/my/folder';
    }
}

document.getElementById('docTypeSelect').addEventListener('change', onTypeChange);
document.getElementById('fileDrop').addEventListener('click', function() { document.getElementById('fileInput').click(); });
document.getElementById('fileInput').addEventListener('change', function() { onFileChange(this); });
document.getElementById('cancelBtn').addEventListener('click', onCancelClick);

/* ── 제출 처리 (XHR + 진행률) ── */
const ALLOWED_EXTS = ['pdf','jpg','jpeg','png','docx','hwp','hwpx','ppt','pptx','zip','xlsx','xls'];
const MAX_SIZE = 100 * 1024 * 1024;

document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files && fileInput.files[0];

    /* 클라이언트 사전 검증 */
    if (!file) { showXhrError('파일을 선택해주세요.'); return; }
    const ext = file.name.split('.').pop().toLowerCase();
    if (!ALLOWED_EXTS.includes(ext)) { showXhrError('허용되지 않는 파일 형식입니다: ' + ext); return; }
    if (file.size > MAX_SIZE) { showXhrError('파일 크기가 100MB를 초과합니다.'); return; }

    const btn = document.getElementById('uploadBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    document.getElementById('xhrErrorBox').classList.add('d-none');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>업로드 중...';
    progressWrap.classList.remove('d-none');

    const cancelBtn = document.getElementById('cancelBtn');
    cancelBtn.textContent = '업로드 취소';
    cancelBtn.classList.replace('btn-outline-secondary', 'btn-outline-danger');

    const xhr = new XMLHttpRequest();
    currentXhr = xhr;

    xhr.upload.onprogress = function(e) {
        if (!e.lengthComputable) return;
        const pct = Math.round(e.loaded / e.total * 100);
        progressBar.style.width = pct + '%';
        progressBar.setAttribute('aria-valuenow', pct);
        if (pct < 100) {
            progressText.textContent = pct + '%';
        } else {
            progressText.textContent = '서버 처리 중...';
            progressBar.classList.remove('progress-bar-animated');
        }
    };

    xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300) {
            try {
                const data = JSON.parse(xhr.responseText);
                if (data.success) {
                    currentXhr = null;
                    progressBar.style.width = '100%';
                    progressBar.classList.remove('progress-bar-animated');
                    progressBar.classList.add('bg-success');
                    progressText.textContent = '업로드 완료!';
                    btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>완료';
                    setTimeout(function() { window.location.href = '/my/folder'; }, 1200);
                    return;
                }
                showXhrError(data.message || '업로드에 실패했습니다.');
            } catch (e) {
                window.location.href = '/my/folder';
                return;
            }
        } else {
            try {
                const data = JSON.parse(xhr.responseText);
                showXhrError(data.message || '업로드에 실패했습니다. 파일 형식(PDF·JPG·PNG·DOCX·HWP·PPT·ZIP·XLSX·XLS)과 크기(100MB 이하)를 확인하세요.');
            } catch (e) {
                showXhrError('업로드에 실패했습니다. 파일 형식(PDF·JPG·PNG·DOCX·HWP·PPT·ZIP·XLSX·XLS)과 크기(100MB 이하)를 확인하세요.');
            }
        }
        resetBtn();
    };

    xhr.onerror = function() {
        showXhrError('네트워크 오류가 발생했습니다. 다시 시도하세요.');
        resetBtn();
    };

    xhr.onabort = function() {
        showXhrError('업로드가 취소됐습니다.');
        resetBtn();
    };

    xhr.open('POST', document.getElementById('uploadForm').action);
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.send(new FormData(document.getElementById('uploadForm')));
});

function showXhrError(msg) {
    const box = document.getElementById('xhrErrorBox');
    document.getElementById('xhrErrorMsg').textContent = msg;
    box.classList.remove('d-none');
}

function resetBtn() {
    currentXhr = null;
    const btn = document.getElementById('uploadBtn');
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-cloud-upload me-1"></i>업로드';
    const progressWrap = document.getElementById('progressWrap');
    progressWrap.classList.add('d-none');
    const progressBar = document.getElementById('progressBar');
    progressBar.style.width = '0%';
    progressBar.classList.remove('bg-success');
    progressBar.classList.add('progress-bar-animated');
    document.getElementById('progressText').textContent = '0%';
    const cancelBtn = document.getElementById('cancelBtn');
    cancelBtn.textContent = '취소';
    cancelBtn.classList.replace('btn-outline-danger', 'btn-outline-secondary');
}
</script>
</body>
</html>
