<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 업로드 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto">
            <a th:href="@{/my/folder}" class="btn btn-outline-light btn-sm">← 내 폴더</a>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width:600px;">
    <h2 class="mb-4">문서 업로드</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/my/folder/documents}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label class="form-label fw-bold">문서 종류 *</label>
                    <select name="documentType" class="form-select" required>
                        <option value="">선택하세요</option>
                        <option th:each="dt : ${documentTypes}"
                                th:value="${dt.name()}"
                                th:text="${dt.name() == 'RESUME' ? '이력서' :
                                           dt.name() == 'CAREER_DESCRIPTION' ? '경력기술서' :
                                           dt.name() == 'GRADUATION_CERTIFICATE' ? '졸업증명서' :
                                           dt.name() == 'LICENSE' ? '자격증' :
                                           dt.name() == 'EMPLOYMENT_CERTIFICATE' ? '재직증명서' : '기타'}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">문서 제목 *</label>
                    <input type="text" name="title" class="form-control" required
                           placeholder="예: 2024년 이력서">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">파일 *</label>
                    <input type="file" name="file" class="form-control" required
                           accept=".pdf,.jpg,.jpeg,.png,.docx,.hwp,.hwpx">
                    <div class="form-text">허용 형식: PDF, JPG, PNG, DOCX, HWP, HWPX (최대 20MB)</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">미리보기 PDF <span class="text-muted small">(선택)</span></label>
                    <input type="file" name="previewPdf" class="form-control" accept=".pdf">
                    <div class="form-text">PDF 파일만 허용</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">만료일 <span class="text-muted small">(선택 — 자격증·재직증명서 등)</span></label>
                    <input type="date" name="expiresAt" class="form-control"
                           th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                    <div class="form-text">유효기간이 있는 문서만 입력하세요.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">업로드</button>
                    <a th:href="@{/my/folder}" class="btn btn-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
