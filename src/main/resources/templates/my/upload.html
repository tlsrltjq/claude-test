<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 업로드 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto">
            <a th:href="@{/my/folder}" class="btn btn-outline-light btn-sm">← 내 폴더</a>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width:600px;">
    <h2 class="mb-4">문서 업로드</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- 10MB 초과 시 JS가 이 경고를 표시합니다 -->
    <div id="largefile-warning" class="alert alert-warning d-none">
        <strong>파일 크기 초과:</strong> 10MB가 넘는 파일은 <strong>관리자 승인</strong>을 받아야 공개됩니다.
        업로드는 정상적으로 진행되지만, 승인 전까지는 본인만 확인할 수 있습니다.
    </div>

    <div class="card">
        <div class="card-body">
            <form id="upload-form" th:action="@{/my/folder/documents}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label class="form-label fw-bold">문서 종류 *</label>
                    <select name="documentType" class="form-select" required>
                        <option value="">선택하세요</option>
                        <option th:each="dt : ${documentTypes}"
                                th:value="${dt.name()}"
                                th:text="${dt.displayName}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">문서 제목 *</label>
                    <input type="text" name="title" class="form-control" required
                           placeholder="예: 2024년 이력서">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">파일 *</label>
                    <input type="file" id="fileInput" name="file" class="form-control" required
                           accept=".pdf,.jpg,.jpeg,.png,.docx,.hwp,.hwpx,.ppt,.pptx"
                           onchange="checkFileSize(this)">
                    <div class="form-text">허용 형식: PDF, JPG, PNG, DOCX, HWP, HWPX, PPT, PPTX (최대 20MB) · 10MB 초과 시 관리자 승인 필요</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">만료일 <span class="text-muted small">(선택 — 자격증·재직증명서 등)</span></label>
                    <input type="date" name="expiresAt" class="form-control"
                           th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}">
                    <div class="form-text">유효기간이 있는 문서만 입력하세요.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" id="uploadBtn" class="btn btn-primary">업로드</button>
                    <a th:href="@{/my/folder}" class="btn btn-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function checkFileSize(input) {
    const warning = document.getElementById('largefile-warning');
    if (input.files && input.files[0]) {
        const size = input.files[0].size;
        warning.classList.toggle('d-none', size < 10 * 1024 * 1024);
    }
}
document.getElementById('upload-form').addEventListener('submit', function() {
    var btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>업로드 중...';
});
</script>
</body>
</html>
