<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 다운로드 이력 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/my/folder}" class="btn btn-outline-light btn-sm">내 폴더</a>
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">내 다운로드 이력</h2>
        <small class="text-muted" th:text="'총 ' + ${totalElements} + '건'"></small>
    </div>

    <div th:if="${#lists.isEmpty(downloads)}" class="alert alert-info">다운로드 이력이 없습니다.</div>

    <div th:if="${!#lists.isEmpty(downloads)}">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th style="width:140px;">일시</th>
                <th style="width:80px;">버전 ID</th>
                <th>다운로드 사유</th>
                <th style="width:120px;">IP</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${downloads}">
                <td class="small text-nowrap"
                    th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="small text-center text-muted" th:text="${log.targetId}"></td>
                <td class="small" th:text="${log.reason}"></td>
                <td class="small text-muted" th:text="${log.ipAddress}"></td>
            </tr>
            </tbody>
        </table>

        <!-- 페이지네이션 -->
        <nav th:if="${totalPages > 1}">
            <ul class="pagination pagination-sm justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/my/activity(page=${currentPage - 1})}">이전</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/my/activity(page=${i})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/my/activity(page=${currentPage + 1})}">다음</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
