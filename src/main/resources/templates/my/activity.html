<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 다운로드 이력 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: .6rem 0; }
        .topnav .brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.5); color: #fff; font-size: .8rem; padding: .3rem .75rem; border-radius: 6px; }
        .btn-nav:hover { background: rgba(255,255,255,.15); color: #fff; }

        .page-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); border-radius: 14px; padding: 1.4rem 1.75rem; color: #fff; margin-bottom: 1.25rem; }
        .page-header h2 { font-size: 1.2rem; font-weight: 700; margin: 0 0 .2rem; }
        .page-header .sub { font-size: .85rem; opacity: .8; }

        .log-card { background: #fff; border: 1.5px solid #e9ecef; border-radius: 12px; overflow: hidden; margin-bottom: .5rem; }
        .log-row { display: flex; align-items: center; gap: 1rem; padding: .85rem 1.1rem; }
        .log-row:not(:last-child) { border-bottom: 1px solid #f0f2f5; }
        .log-icon { width: 36px; height: 36px; border-radius: 10px; background: #e7f0ff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .log-icon i { color: #0d6efd; font-size: 1rem; }
        .log-body { flex: 1; min-width: 0; }
        .log-filename { font-size: .88rem; color: #212529; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .log-meta { font-size: .75rem; color: #868e96; margin-top: .1rem; display: flex; align-items: center; gap: .4rem; }
        .log-ip { font-size: .75rem; color: #adb5bd; flex-shrink: 0; font-family: monospace; }
        .log-date { font-size: .75rem; color: #adb5bd; flex-shrink: 0; white-space: nowrap; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: #adb5bd; background: #fff; border-radius: 12px; }
        .empty-state i { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
        .empty-state p { font-size: .95rem; margin-bottom: 0; }

        .pagination .page-link { border-radius: 8px !important; margin: 0 2px; font-size: .82rem; }
        .pagination .page-item.active .page-link { background: #0d6efd; border-color: #0d6efd; }
    </style>
</head>
<body>

<nav class="topnav">
    <div class="container d-flex align-items-center gap-3">
        <a th:href="@{/dashboard}" class="brand me-auto">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i>eActive Resource Hub
        </a>
        <a th:href="@{/my/folder}" class="btn btn-nav btn-sm">
            <i class="bi bi-folder me-1"></i>내 폴더
        </a>
        <a th:href="@{/dashboard}" class="btn btn-nav btn-sm">
            <i class="bi bi-house me-1"></i>대시보드
        </a>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-nav btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>로그아웃
            </button>
        </form>
    </div>
</nav>

<div class="container py-4" style="max-width:760px;">

    <div class="page-header d-flex align-items-center justify-content-between">
        <div>
            <h2><i class="bi bi-clock-history me-2"></i>내 다운로드 이력</h2>
            <div class="sub">총 <strong th:text="${totalElements}">0</strong>건</div>
        </div>
    </div>

    <!-- 빈 상태 -->
    <div th:if="${#lists.isEmpty(downloads)}" class="empty-state">
        <i class="bi bi-download"></i>
        <p>다운로드 이력이 없습니다.</p>
    </div>

    <!-- 이력 목록 -->
    <div th:if="${!#lists.isEmpty(downloads)}" class="log-card">
        <div th:each="log : ${downloads}" class="log-row">
            <div class="log-icon">
                <i class="bi bi-download"></i>
            </div>
            <div class="log-body">
                <div class="log-filename"
                     th:text="${log.reason != null and !log.reason.isBlank() ? log.reason : '파일 다운로드'}"></div>
                <div class="log-meta">
                    <span th:text="${log.ipAddress}"></span>
                </div>
            </div>
            <span class="log-date" th:text="${#temporals.format(log.createdAt, 'yy.MM.dd HH:mm')}"></span>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <nav th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/my/activity(page=${currentPage - 1})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/my/activity(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/my/activity(page=${currentPage + 1})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
