<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 폴더 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:if="${folder == null}" class="alert alert-warning">
        개인 폴더가 없습니다. 관리자에게 문의하세요.
    </div>

    <div th:if="${folder != null}">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 th:text="${folder.folderName}">내 폴더</h2>
            <a th:href="@{/my/folder/documents/upload}" class="btn btn-primary">+ 문서 업로드</a>
        </div>

        <table class="table table-hover table-bordered">
            <thead class="table-dark">
            <tr>
                <th>문서 종류</th>
                <th>제목</th>
                <th>원본 파일명</th>
                <th>현재 버전</th>
                <th>업로드일</th>
                <th>미리보기</th>
                <th>다운로드</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="doc : ${documents}">
                <td>
                    <span th:switch="${doc.documentType.name()}">
                        <span th:case="'RESUME'">이력서</span>
                        <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                        <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                        <span th:case="'LICENSE'">자격증</span>
                        <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                        <span th:case="*">기타</span>
                    </span>
                </td>
                <td th:text="${doc.title}"></td>
                <td th:text="${doc.currentVersion != null ? doc.currentVersion.originalFileName : '-'}"></td>
                <td th:text="${doc.currentVersion != null ? 'v' + doc.currentVersion.versionNo : '-'}"></td>
                <td th:text="${doc.currentVersion != null ? #temporals.format(doc.currentVersion.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                <td>
                    <button class="btn btn-outline-secondary btn-sm" disabled>미리보기</button>
                </td>
                <td>
                    <button class="btn btn-outline-secondary btn-sm" disabled>다운로드</button>
                </td>
                <td>
                    <a th:href="@{/my/folder/documents/{id}(id=${doc.id})}"
                       class="btn btn-outline-primary btn-sm">상세</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(documents)}">
                <td colspan="7" class="text-center text-muted">업로드된 문서가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
