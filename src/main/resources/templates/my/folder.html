<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 폴더 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .doc-card { transition: box-shadow .2s; cursor: default; }
        .doc-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); }
        .doc-preview { width:100%; height:160px; object-fit:cover; background:#f0f0f0; display:block; }
        .doc-icon-area { width:100%; height:160px; display:flex; align-items:center; justify-content:center; background:#f8f9fa; border-bottom:1px solid #e9ecef; }
        .doc-ext-label { font-size:1rem; font-weight:700; padding:.4em .8em; border-radius:.4rem; letter-spacing:.05em; }
        .ext-pdf  { background:#ff4444; color:#fff; }
        .ext-img  { background:#0d6efd; color:#fff; }
        .ext-word { background:#2b579a; color:#fff; }
        .ext-hwp  { background:#1e7e34; color:#fff; }
        .ext-etc  { background:#6c757d; color:#fff; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div th:if="${folder == null}" class="alert alert-warning">
        개인 폴더가 없습니다. 관리자에게 문의하세요.
    </div>

    <div th:if="${folder != null}">
        <!-- 양식 이력서 다운로드 배너 -->
        <div th:if="${activeResumeTemplate != null}"
             class="alert alert-info d-flex justify-content-between align-items-center mb-3 py-2">
            <span class="small">양식 이력서 <strong th:text="${activeResumeTemplate.fileName}"></strong> 가 등록되어 있습니다.</span>
            <a th:href="@{/my/folder/resume-template/download}" class="btn btn-outline-primary btn-sm ms-2">양식 이력서 다운로드</a>
        </div>

        <!-- 상단 정보 -->
        <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
                <h2 class="mb-0" th:text="${folder.folderName}">내 폴더</h2>
                <small class="text-muted"
                       th:text="'문서 ' + (${documents != null ? #lists.size(documents) : 0}) + '개'"></small>
            </div>
            <a th:href="@{/my/folder/documents/upload}" class="btn btn-primary">+ 문서 업로드</a>
        </div>

        <!-- 필터/검색/정렬 -->
        <div class="row g-2 mb-3">
            <div class="col-auto">
                <select id="filterType" class="form-select form-select-sm" onchange="applyFilter()">
                    <option value="">전체 종류</option>
                    <option value="이력서">이력서</option>
                    <option value="경력기술서">경력기술서</option>
                    <option value="졸업증명서">졸업증명서</option>
                    <option value="자격증">자격증</option>
                    <option value="재직증명서">재직증명서</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="col-sm-4">
                <input id="searchBox" class="form-control form-control-sm" placeholder="제목 또는 파일명 검색"
                       oninput="applyFilter()">
            </div>
            <div class="col-auto">
                <select id="sortOrder" class="form-select form-select-sm" onchange="applySort()">
                    <option value="date">최근 업로드</option>
                    <option value="type">종류</option>
                    <option value="title">제목</option>
                </select>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(documents)}" class="alert alert-info">업로드된 문서가 없습니다.</div>

        <!-- 카드 뷰 -->
        <div id="cardGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3"
             th:if="${!#lists.isEmpty(documents)}">
            <div th:each="doc : ${documents}" class="col doc-card-col"
                 th:with="lv=${latestVersions[doc.id]}"
                 th:data-type="${doc.documentType.name()}"
                 th:data-label="${doc.documentType.displayName}"
                 th:data-title="${doc.title}"
                 th:data-filename="${lv != null ? lv.originalFileName : ''}"
                 th:data-date="${lv != null ? lv.createdAt : ''}">
                <div class="card h-100 doc-card"
                     th:with="ext=${lv != null ? lv.originalFileName.substring(lv.originalFileName.lastIndexOf('.')+1).toLowerCase() : 'etc'}">
                    <!-- 썸네일 또는 파일 형식 배지 -->
                    <a th:if="${lv != null}"
                       th:href="@{/documents/{id}/preview(id=${lv.id})}"
                       target="_blank" class="text-decoration-none">
                        <!-- 썸네일 있으면 이미지 표시 -->
                        <img th:if="${lv.thumbnailStoragePath != null}"
                             th:src="@{/documents/{id}/thumbnail(id=${lv.id})}"
                             class="doc-preview" alt="미리보기"
                             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <!-- 썸네일 없으면 파일 형식 배지 -->
                        <div th:classappend="${lv.thumbnailStoragePath != null} ? 'd-none'"
                             class="doc-icon-area">
                            <div th:class="'doc-ext-label ' + (${ext == 'pdf'} ? 'ext-pdf' : (${ext == 'jpg' or ext == 'jpeg' or ext == 'png'} ? 'ext-img' : (${ext == 'docx'} ? 'ext-word' : (${ext == 'hwp' or ext == 'hwpx'} ? 'ext-hwp' : 'ext-etc'))))"
                                 th:text="${ext.toUpperCase()}"></div>
                        </div>
                    </a>
                    <div th:if="${lv == null}" class="doc-icon-area">
                        <span class="doc-ext-label ext-etc">?</span>
                    </div>

                    <div class="card-body p-2">
                        <div class="d-flex gap-1 flex-wrap mb-1">
                            <span th:text="${doc.documentType.displayName}"
                                  class="badge bg-secondary"></span>
                            <!-- 검토 상태 배지 -->
                            <span th:if="${lv != null and lv.reviewStatus.name() == 'PENDING_REVIEW'}"
                                  class="badge bg-warning text-dark">검토 대기</span>
                            <span th:if="${lv != null and lv.reviewStatus.name() == 'APPROVED'}"
                                  class="badge bg-success">승인됨</span>
                            <span th:if="${lv != null and lv.reviewStatus.name() == 'REJECTED'}"
                                  class="badge bg-danger">반려됨</span>
                            <span th:if="${lv != null and lv.reviewStatus.name() == 'ARCHIVED'}"
                                  class="badge bg-secondary">보관됨</span>
                            <!-- 만료 배지 -->
                            <span th:if="${doc.expiresAt != null and doc.expiresAt.isBefore(#temporals.createToday())}"
                                  class="badge bg-danger">만료됨</span>
                            <span th:if="${doc.expiresAt != null and !doc.expiresAt.isBefore(#temporals.createToday()) and doc.expiresAt.isBefore(#temporals.createToday().plusDays(30))}"
                                  class="badge bg-warning text-dark">만료임박</span>
                        </div>
                        <h6 class="card-title mb-1 text-truncate" th:text="${doc.title}"></h6>
                        <small class="text-muted d-block text-truncate"
                               th:text="${lv != null ? lv.originalFileName : '-'}"></small>
                        <small class="text-muted"
                               th:text="${lv != null ? 'v' + lv.versionNo : ''}"></small>
                        <small class="text-muted ms-1"
                               th:text="${lv != null ? #temporals.format(lv.createdAt, 'yyyy-MM-dd') : ''}"></small>
                    </div>
                    <div class="card-footer p-2 d-flex gap-1 flex-wrap">
                        <a th:if="${lv != null}"
                           th:href="@{/documents/{id}/download(id=${lv.id})}"
                           class="btn btn-outline-secondary btn-sm flex-fill">다운로드</a>
                        <a th:href="@{/my/folder/documents/{id}(id=${doc.id})}"
                           class="btn btn-outline-primary btn-sm flex-fill">상세</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function applyFilter() {
    const type = document.getElementById('filterType').value;
    const query = document.getElementById('searchBox').value.toLowerCase();
    document.querySelectorAll('.doc-card-col').forEach(col => {
        const label = col.dataset.label || '';
        const title = (col.dataset.title || '').toLowerCase();
        const fname = (col.dataset.filename || '').toLowerCase();
        const typeMatch = !type || label === type;
        const searchMatch = !query || title.includes(query) || fname.includes(query);
        col.style.display = typeMatch && searchMatch ? '' : 'none';
    });
}
function applySort() {
    const sort = document.getElementById('sortOrder').value;
    const grid = document.getElementById('cardGrid');
    if (!grid) return;
    const cols = Array.from(grid.querySelectorAll('.doc-card-col'));
    cols.sort((a, b) => {
        if (sort === 'type') return (a.dataset.label || '').localeCompare(b.dataset.label || '');
        if (sort === 'title') return (a.dataset.title || '').localeCompare(b.dataset.title || '');
        return (b.dataset.date || '').localeCompare(a.dataset.date || '');
    });
    cols.forEach(c => grid.appendChild(c));
}
</script>
</body>
</html>
