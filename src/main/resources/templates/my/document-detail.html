<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${document.title + ' — eActive Resource Hub'}">문서 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: .6rem 1rem; }
        .topnav .navbar-brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.35); color: #fff; font-size: .8rem; }
        .btn-nav:hover { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.6); color: #fff; }
        .page-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); border-radius: 14px; padding: 1.4rem 1.75rem; color: #fff; margin-bottom: 1.5rem; }
        .page-header h4 { font-weight: 700; margin-bottom: .2rem; }
        .page-header p { margin: 0; opacity: .75; font-size: .9rem; }
        .side-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 1rem; }
        .side-card .card-header-custom { background: #0d6efd; color: #fff; padding: .8rem 1rem; font-weight: 600; font-size: .85rem; }
        .side-card .card-body { padding: 1rem; }
        .info-row { display: flex; align-items: flex-start; padding: .4rem 0; border-bottom: 1px solid #f0f2f5; gap: .6rem; font-size: .83rem; }
        .info-row:last-child { border-bottom: none; }
        .info-label { min-width: 70px; color: #9ca3af; flex-shrink: 0; }
        .info-val { color: #374151; font-weight: 500; word-break: break-all; }
        .preview-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
        .preview-card .card-header-custom { background: #0d6efd; color: #fff; padding: .8rem 1rem; font-weight: 600; font-size: .85rem; }
        .version-item { display: flex; justify-content: space-between; align-items: center; padding: .4rem 0; border-bottom: 1px solid #f0f2f5; font-size: .8rem; }
        .version-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
<nav class="topnav navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i>eActive Resource Hub
        </a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/my/folder}" class="btn btn-nav btn-sm">
                <i class="bi bi-arrow-left me-1"></i>내 폴더
            </a>
            <a th:href="@{/dashboard}" class="btn btn-nav btn-sm">
                <i class="bi bi-house me-1"></i>대시보드
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="page-header">
        <h4><i class="bi bi-file-earmark-text me-2"></i><span th:text="${document.title}">문서 제목</span></h4>
        <p th:text="${document.documentType.displayName}"></p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3">
        <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">
        <div class="col-lg-4">
            <!-- 문서 정보 -->
            <div class="side-card">
                <div class="card-header-custom"><i class="bi bi-info-circle me-2"></i>문서 정보</div>
                <div class="card-body">
                    <div class="info-row"><span class="info-label">종류</span><span class="info-val"><span class="badge bg-secondary rounded-pill" th:text="${document.documentType.displayName}"></span></span></div>
                    <div class="info-row" th:if="${currentVersion != null}">
                        <span class="info-label">현재 버전</span>
                        <span class="info-val"><span class="badge bg-dark rounded-pill" th:text="'v' + ${currentVersion.versionNo}"></span></span>
                    </div>
                    <div class="info-row" th:if="${currentVersion != null}">
                        <span class="info-label">검토 상태</span>
                        <span class="info-val">
                            <span th:if="${currentVersion.reviewStatus.name() == 'PENDING_REVIEW'}" class="badge rounded-pill" style="background:#fff3cd; color:#856404; border:1px solid #ffc107; font-size:.72rem;">검토 대기</span>
                            <span th:if="${currentVersion.reviewStatus.name() == 'APPROVED'}" class="badge bg-success rounded-pill" style="font-size:.72rem;">승인됨</span>
                            <span th:if="${currentVersion.reviewStatus.name() == 'REJECTED'}" class="badge bg-danger rounded-pill" style="font-size:.72rem;">반려됨</span>
                            <span th:if="${currentVersion.reviewStatus.name() == 'ARCHIVED'}" class="badge bg-secondary rounded-pill" style="font-size:.72rem;">보관됨</span>
                        </span>
                    </div>
                    <div class="info-row" th:if="${currentVersion != null and currentVersion.reviewStatus.name() == 'REJECTED' and currentVersion.rejectReason != null}">
                        <span class="info-label">반려 사유</span><span class="info-val text-danger small" th:text="${currentVersion.rejectReason}"></span>
                    </div>
                    <div class="info-row" th:if="${currentVersion != null}"><span class="info-label">파일명</span><span class="info-val text-muted small" th:text="${currentVersion.originalFileName}"></span></div>
                    <div class="info-row" th:if="${currentVersion != null}"><span class="info-label">크기</span><span class="info-val text-muted" th:text="${#numbers.formatDecimal(currentVersion.fileSize / 1024.0, 1, 1) + ' KB'}"></span></div>
                    <div class="info-row" th:if="${currentVersion != null}"><span class="info-label">업로드일</span><span class="info-val text-muted" th:text="${#temporals.format(currentVersion.createdAt, 'yyyy-MM-dd HH:mm')}"></span></div>
                    <div class="info-row">
                        <span class="info-label">만료일</span>
                        <span class="info-val">
                            <span th:if="${document.expiresAt == null}" class="text-muted small">미설정</span>
                            <span th:if="${document.expiresAt != null and document.expiresAt.isBefore(#temporals.createToday())}"
                                  class="badge bg-danger rounded-pill" style="font-size:.72rem;"
                                  th:text="${#temporals.format(document.expiresAt, 'yyyy-MM-dd') + ' (만료됨)'}"></span>
                            <span th:if="${document.expiresAt != null and !document.expiresAt.isBefore(#temporals.createToday()) and document.expiresAt.isBefore(#temporals.createToday().plusDays(30))}"
                                  class="badge bg-warning text-dark rounded-pill" style="font-size:.72rem;"
                                  th:text="${#temporals.format(document.expiresAt, 'yyyy-MM-dd') + ' (임박)'}"></span>
                            <span th:if="${document.expiresAt != null and !document.expiresAt.isBefore(#temporals.createToday().plusDays(30))}"
                                  class="text-success small fw-semibold"
                                  th:text="${#temporals.format(document.expiresAt, 'yyyy-MM-dd')}"></span>
                        </span>
                    </div>
                </div>
                <div class="p-3 border-top d-flex flex-column gap-2" th:if="${currentVersion != null}">
                    <a th:href="@{/documents/{id}/download(id=${currentVersion.id})}"
                       class="btn btn-primary btn-sm w-100">
                        <i class="bi bi-download me-1"></i>다운로드
                    </a>
                    <form th:action="@{/documents/{id}/thumbnail/regenerate(id=${currentVersion.id})}"
                          method="post" class="d-inline">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-secondary btn-sm w-100">
                            <i class="bi bi-arrow-clockwise me-1"></i>썸네일 재생성
                        </button>
                    </form>
                </div>
                <div class="p-3 border-top">
                    <form th:action="@{/my/folder/documents/{id}/delete(id=${document.id})}" method="post"
                          onsubmit="return confirm('문서를 삭제하시겠습니까? 모든 버전과 파일이 영구 삭제됩니다.')">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                            <i class="bi bi-trash me-1"></i>문서 삭제
                        </button>
                    </form>
                </div>
            </div>

            <!-- 만료일 수정 -->
            <div class="side-card">
                <div class="card-header-custom"><i class="bi bi-calendar-check me-2"></i>만료일 수정</div>
                <div class="card-body">
                    <form th:action="@{/my/folder/documents/{id}/expiry(id=${document.id})}" method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                        <div class="d-flex gap-2 align-items-center mb-1">
                            <input type="date" name="expiresAt" class="form-control form-control-sm"
                                   th:value="${document.expiresAt != null ? #temporals.format(document.expiresAt, 'yyyy-MM-dd') : ''}">
                            <button type="submit" class="btn btn-outline-primary btn-sm text-nowrap">저장</button>
                        </div>
                        <div class="text-muted" style="font-size:.75rem;">비워두면 만료일 없음으로 설정됩니다.</div>
                    </form>
                </div>
            </div>

            <!-- 버전 목록 -->
            <div class="side-card" th:if="${not #lists.isEmpty(versions)}">
                <div class="card-header-custom"><i class="bi bi-layers me-2"></i>버전 목록</div>
                <div class="card-body">
                    <div th:each="v : ${versions}" class="version-item">
                        <span>
                            <span class="badge bg-secondary rounded-pill me-1" th:text="'v' + ${v.versionNo}"></span>
                            <span th:if="${v.reviewStatus.name() == 'PENDING_REVIEW'}" class="badge rounded-pill ms-1" style="background:#fff3cd; color:#856404; font-size:.68rem;">대기</span>
                            <span th:if="${v.reviewStatus.name() == 'APPROVED'}" class="badge bg-success rounded-pill ms-1" style="font-size:.68rem;">승인</span>
                            <span th:if="${v.reviewStatus.name() == 'REJECTED'}" class="badge bg-danger rounded-pill ms-1" style="font-size:.68rem;">반려</span>
                            <span th:if="${v.reviewStatus.name() == 'ARCHIVED'}" class="badge bg-secondary rounded-pill ms-1" style="font-size:.68rem;">보관</span>
                        </span>
                        <span class="text-muted" style="font-size:.75rem;" th:text="${#temporals.format(v.createdAt, 'MM-dd HH:mm')}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 미리보기 -->
        <div class="col-lg-8">
            <div class="preview-card">
                <div class="card-header-custom"><i class="bi bi-eye me-2"></i>미리보기</div>
                <div class="card-body p-2" style="min-height:550px;">
                    <iframe th:if="${previewType == 'pdf'}"
                            th:src="@{/documents/{id}/preview(id=${currentVersion.id})}"
                            width="100%" height="620" style="border:none; border-radius:6px;"></iframe>
                    <img th:if="${previewType == 'image'}"
                         th:src="@{/documents/{id}/preview(id=${currentVersion.id})}"
                         class="img-fluid rounded" alt="미리보기">
                    <div th:if="${previewType == 'none' or currentVersion == null}"
                         class="d-flex align-items-center justify-content-center text-muted"
                         style="min-height:300px;">
                        <div class="text-center">
                            <i class="bi bi-file-earmark-x" style="font-size:3rem; opacity:.3; display:block; margin-bottom:.75rem;"></i>
                            <p class="mb-1">미리보기를 지원하지 않는 파일 형식입니다.</p>
                            <p class="small text-muted">DOCX·HWP·HWPX는 미리보기 PDF를 업로드하면 표시됩니다.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
