<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${document.title + ' — eActive Resource Hub'}">문서 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto">
            <a th:href="@{/my/folder}" class="btn btn-outline-light btn-sm">← 내 폴더</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row">
        <div class="col-md-4">
            <div class="card mb-3">
                <div class="card-header fw-bold" th:text="${document.title}">제목</div>
                <div class="card-body">
                    <table class="table table-sm mb-0">
                        <tr>
                            <th class="text-muted fw-normal" style="width:90px;">문서 종류</th>
                            <td>
                                <span th:switch="${document.documentType.name()}">
                                    <span th:case="'RESUME'">이력서</span>
                                    <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                                    <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                                    <span th:case="'LICENSE'">자격증</span>
                                    <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                                    <span th:case="*">기타</span>
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">현재 버전</th>
                            <td th:text="'v' + ${currentVersion.versionNo}"></td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">검토 상태</th>
                            <td>
                                <span th:if="${currentVersion.reviewStatus.name() == 'PENDING_REVIEW'}"
                                      class="badge bg-warning text-dark">검토 대기</span>
                                <span th:if="${currentVersion.reviewStatus.name() == 'APPROVED'}"
                                      class="badge bg-success">승인됨</span>
                                <span th:if="${currentVersion.reviewStatus.name() == 'REJECTED'}"
                                      class="badge bg-danger">반려됨</span>
                                <span th:if="${currentVersion.reviewStatus.name() == 'ARCHIVED'}"
                                      class="badge bg-secondary">보관됨</span>
                            </td>
                        </tr>
                        <tr th:if="${currentVersion != null and currentVersion.reviewStatus.name() == 'REJECTED' and currentVersion.rejectReason != null}">
                            <th class="text-muted fw-normal">반려 사유</th>
                            <td class="text-danger small" th:text="${currentVersion.rejectReason}"></td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">파일명</th>
                            <td th:text="${currentVersion.originalFileName}" class="text-break small"></td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">크기</th>
                            <td th:text="${#numbers.formatDecimal(currentVersion.fileSize / 1024.0, 1, 1) + ' KB'}"></td>
                        </tr>
                        <tr th:if="${currentVersion != null}">
                            <th class="text-muted fw-normal">업로드일</th>
                            <td th:text="${#temporals.format(currentVersion.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                        <tr>
                            <th class="text-muted fw-normal">만료일</th>
                            <td>
                                <span th:if="${document.expiresAt == null}" class="text-muted small">미설정</span>
                                <span th:if="${document.expiresAt != null and document.expiresAt.isBefore(#temporals.createToday())}"
                                      class="badge bg-danger"
                                      th:text="${#temporals.format(document.expiresAt, 'yyyy-MM-dd') + ' (만료됨)'}"></span>
                                <span th:if="${document.expiresAt != null and !document.expiresAt.isBefore(#temporals.createToday()) and document.expiresAt.isBefore(#temporals.createToday().plusDays(30))}"
                                      class="badge bg-warning text-dark"
                                      th:text="${#temporals.format(document.expiresAt, 'yyyy-MM-dd') + ' (임박)'}"></span>
                                <span th:if="${document.expiresAt != null and !document.expiresAt.isBefore(#temporals.createToday().plusDays(30))}"
                                      class="text-success small fw-semibold"
                                      th:text="${#temporals.format(document.expiresAt, 'yyyy-MM-dd')}"></span>
                            </td>
                        </tr>
                    </table>
                </div>
                <div class="card-footer d-flex gap-1 flex-wrap" th:if="${currentVersion != null}">
                    <a th:href="@{/documents/{id}/download/reason(id=${currentVersion.id})}"
                       class="btn btn-primary btn-sm flex-fill">다운로드</a>
                    <!-- 본인 문서이므로 썸네일 재생성 항상 허용 -->
                    <form th:action="@{/documents/{id}/thumbnail/regenerate(id=${currentVersion.id})}"
                          method="post" class="d-inline flex-fill">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-secondary btn-sm w-100">썸네일 재생성</button>
                    </form>
                </div>
            </div>

            <!-- 만료일 수정 -->
            <div class="card mb-3">
                <div class="card-header fw-bold small">만료일 수정</div>
                <div class="card-body">
                    <form th:action="@{/my/folder/documents/{id}/expiry(id=${document.id})}" method="post">
                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                        <div class="d-flex gap-2 align-items-center">
                            <input type="date" name="expiresAt" class="form-control form-control-sm"
                                   th:value="${document.expiresAt != null ? #temporals.format(document.expiresAt, 'yyyy-MM-dd') : ''}">
                            <button type="submit" class="btn btn-outline-primary btn-sm text-nowrap">저장</button>
                        </div>
                        <div class="form-text mt-1">비워두면 만료일 없음으로 설정됩니다.</div>
                    </form>
                </div>
            </div>

            <!-- 버전 목록 -->
            <div class="card" th:if="${not #lists.isEmpty(versions)}">
                <div class="card-header fw-bold small">버전 목록</div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item small d-flex justify-content-between align-items-center"
                        th:each="v : ${versions}">
                        <span>
                            <span th:text="'v' + ${v.versionNo}" class="fw-bold"></span>
                            <span th:text="${v.originalFileName}" class="text-muted ms-1 text-truncate d-inline-block" style="max-width:100px;vertical-align:middle;"></span>
                            <span th:if="${v.reviewStatus.name() == 'PENDING_REVIEW'}" class="badge bg-warning text-dark ms-1">대기</span>
                            <span th:if="${v.reviewStatus.name() == 'APPROVED'}" class="badge bg-success ms-1">승인</span>
                            <span th:if="${v.reviewStatus.name() == 'REJECTED'}" class="badge bg-danger ms-1">반려</span>
                            <span th:if="${v.reviewStatus.name() == 'ARCHIVED'}" class="badge bg-secondary ms-1">보관</span>
                        </span>
                        <span th:text="${#temporals.format(v.createdAt, 'MM-dd HH:mm')}" class="text-muted"></span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-header fw-bold">미리보기</div>
                <div class="card-body p-2" style="min-height:500px;">
                    <!-- PDF / 미리보기 PDF -->
                    <iframe th:if="${previewType == 'pdf'}"
                            th:src="@{/documents/{id}/preview(id=${currentVersion.id})}"
                            width="100%" height="600" style="border:none;"></iframe>
                    <!-- 이미지 -->
                    <img th:if="${previewType == 'image'}"
                         th:src="@{/documents/{id}/preview(id=${currentVersion.id})}"
                         class="img-fluid" alt="미리보기">
                    <!-- 미리보기 불가 -->
                    <div th:if="${previewType == 'none' or currentVersion == null}"
                         class="d-flex align-items-center justify-content-center h-100 text-muted"
                         style="min-height:200px;">
                        <div class="text-center">
                            <div class="fs-1 mb-2">📄</div>
                            <div>미리보기를 지원하지 않는 파일 형식입니다.</div>
                            <div class="small mt-1">DOCX·HWP·HWPX는 미리보기 PDF를 업로드하면 표시됩니다.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
