<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>승인 대기 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-sm text-center" style="width:100%;max-width:480px;">
        <div class="card-body p-5">
            <div class="mb-3" style="font-size:3rem;">&#10003;</div>
            <h1 class="h4 mb-3">이메일 인증 완료</h1>
            <p class="text-muted">
                이메일 인증이 완료되었습니다.<br>
                관리자 승인 후 로그인하실 수 있습니다.<br>
                승인 완료 시 등록하신 이메일로 안내드립니다.
            </p>
            <a th:href="@{/login}" class="btn btn-outline-primary mt-3">로그인 페이지로</a>
        </div>
    </div>
</div>
</body>
</html>
