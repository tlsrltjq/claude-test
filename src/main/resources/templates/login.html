<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; min-height: 100vh; }
        .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .login-card { width: 100%; max-width: 420px; border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.10); overflow: hidden; }
        .login-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: 2.25rem 2rem; text-align: center; color: #fff; }
        .login-header .brand { font-size: .8rem; opacity: .85; letter-spacing: .08em; text-transform: uppercase; }
        .login-header .logo-icon { font-size: 2.5rem; margin-bottom: .5rem; display: block; }
        .login-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
        .login-body { padding: 2rem; background: #fff; }
        .form-label { font-size: .85rem; font-weight: 600; color: #343a40; margin-bottom: .3rem; }
        .input-icon { position: relative; }
        .input-icon .bi { position: absolute; left: .75rem; top: 50%; transform: translateY(-50%); color: #adb5bd; font-size: 1rem; pointer-events: none; }
        .input-icon .form-control { padding-left: 2.25rem; }
        .input-icon .pw-toggle { position: absolute; right: .75rem; top: 50%; transform: translateY(-50%); color: #adb5bd; cursor: pointer; font-size: 1rem; border: none; background: none; padding: 0; line-height: 1; }
        .input-icon .pw-toggle:hover { color: #6c757d; }
        .input-icon .form-control.has-toggle { padding-right: 2.5rem; }
        .btn-login { padding: .75rem; font-size: 1rem; font-weight: 600; border-radius: 10px; letter-spacing: .02em; }
        .divider { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; color: #adb5bd; font-size: .8rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e9ecef; }
        .bottom-links { display: flex; justify-content: space-between; font-size: .83rem; }
        .bottom-links a { color: #6c757d; text-decoration: none; }
        .bottom-links a:hover { color: #0d6efd; }
        .bottom-links .signup-link { color: #0d6efd; font-weight: 600; }
        .bottom-links .signup-link:hover { text-decoration: underline; }
        .alert { border-radius: 8px; font-size: .875rem; padding: .65rem 1rem; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card card">

        <div class="login-header">
            <i class="bi bi-grid-3x3-gap-fill logo-icon"></i>
            <div class="brand">eActive Resource Hub</div>
            <h1>로그인</h1>
        </div>

        <div class="login-body">
            <div th:if="${param.signup}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-check-circle-fill"></i>
                <span>회원가입이 완료되었습니다. 로그인해 주세요.</span>
            </div>
            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>이메일 또는 비밀번호가 올바르지 않습니다.</span>
            </div>
            <div th:if="${param.logout}" class="alert alert-secondary d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-box-arrow-left"></i>
                <span>로그아웃되었습니다.</span>
            </div>
            <div th:if="${param.reset}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-shield-check-fill"></i>
                <span>비밀번호가 재설정되었습니다. 새 비밀번호로 로그인해 주세요.</span>
            </div>
            <div th:if="${param.expired}" class="alert alert-warning d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-person-x-fill"></i>
                <span>관리자에 의해 계정이 비활성화되어 세션이 종료되었습니다.</span>
            </div>

            <form th:action="@{/login}" method="post" id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">이메일</label>
                    <div class="input-icon">
                        <i class="bi bi-envelope-fill"></i>
                        <input type="email" id="username" name="username"
                               class="form-control" placeholder="이름@eactive.co.kr"
                               required autocomplete="username">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <div class="input-icon">
                        <i class="bi bi-lock-fill"></i>
                        <input type="password" id="password" name="password"
                               class="form-control has-toggle"
                               required autocomplete="current-password">
                        <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1">
                            <i class="bi bi-eye" id="pwToggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check mb-0">
                        <input type="checkbox" class="form-check-input" id="rememberEmail" name="rememberEmail" value="on">
                        <label class="form-check-label small text-muted" for="rememberEmail">이메일 기억하기</label>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary w-100 btn-login">
                    <i class="bi bi-box-arrow-in-right me-1"></i> 로그인
                </button>
            </form>

            <div class="divider">또는</div>

            <div class="bottom-links">
                <a th:href="@{/login/forgot}"><i class="bi bi-key me-1"></i>비밀번호 찾기</a>
                <a th:href="@{/signup}" class="signup-link"><i class="bi bi-person-plus me-1"></i>회원가입</a>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    /* 이메일 기억하기 복원 */
    var em = document.cookie.split('; ').find(function (r) { return r.startsWith('RESOURCEHUB_LAST_EMAIL='); });
    if (em) {
        document.getElementById('username').value = decodeURIComponent(em.split('=')[1]);
        document.getElementById('rememberEmail').checked = true;
        document.getElementById('password').focus();
    }

    /* 비밀번호 표시/숨김 토글 */
    document.getElementById('pwToggle').addEventListener('click', function () {
        var pw = document.getElementById('password');
        var icon = document.getElementById('pwToggleIcon');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pw.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });

    /* 로그인 중 스피너 */
    document.getElementById('loginForm').addEventListener('submit', function () {
        var btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>로그인 중...';
    });
})();
</script>
</body>
</html>
