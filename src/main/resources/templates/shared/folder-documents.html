<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공유 폴더 문서 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .doc-thumbnail { width:100%; height:140px; object-fit:cover; }
        .doc-thumbnail-placeholder { width:100%; height:140px; display:flex; align-items:center; justify-content:center; background:#f5f5f5; color:#aaa; font-size:2.5rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/shared/folders}" class="btn btn-outline-light btn-sm">← 공유 폴더</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="mb-3">
        <h2 class="mb-0">문서 목록</h2>
        <p class="text-muted mb-0"
           th:text="${folder.folderName + ' — ' + folder.owner.name +
                      (folder.owner.team != null ? ' (' + folder.owner.team.name + ')' : '')}"></p>
    </div>

    <div class="row g-2 mb-3">
        <div class="col-auto">
            <select id="filterType" class="form-select form-select-sm" onchange="applyFilter()">
                <option value="">전체 종류</option>
                <option value="이력서">이력서</option>
                <option value="경력기술서">경력기술서</option>
                <option value="졸업증명서">졸업증명서</option>
                <option value="자격증">자격증</option>
                <option value="재직증명서">재직증명서</option>
                <option value="기타">기타</option>
            </select>
        </div>
        <div class="col-sm-4">
            <input id="searchBox" class="form-control form-control-sm" placeholder="제목 또는 파일명 검색" oninput="applyFilter()">
        </div>
        <div class="col-auto">
            <select id="sortOrder" class="form-select form-select-sm" onchange="applySort()">
                <option value="date">최근 업로드</option>
                <option value="type">종류</option>
                <option value="title">제목</option>
            </select>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(documents)}" class="alert alert-info">업로드된 문서가 없습니다.</div>

    <div id="cardGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3"
         th:if="${!#lists.isEmpty(documents)}">
        <div th:each="doc : ${documents}" class="col doc-card-col"
             th:data-label="${doc.documentType.name() == 'RESUME' ? '이력서' :
                              doc.documentType.name() == 'CAREER_DESCRIPTION' ? '경력기술서' :
                              doc.documentType.name() == 'GRADUATION_CERTIFICATE' ? '졸업증명서' :
                              doc.documentType.name() == 'LICENSE' ? '자격증' :
                              doc.documentType.name() == 'EMPLOYMENT_CERTIFICATE' ? '재직증명서' : '기타'}"
             th:data-title="${doc.title}"
             th:data-filename="${doc.currentVersion != null ? doc.currentVersion.originalFileName : ''}"
             th:data-date="${doc.currentVersion != null ? doc.currentVersion.createdAt : ''}">
            <div class="card h-100">
                <div th:if="${doc.currentVersion != null and doc.currentVersion.thumbnailStoragePath != null}">
                    <img th:src="@{/documents/{id}/thumbnail(id=${doc.currentVersion.id})}"
                         class="card-img-top doc-thumbnail" alt="썸네일"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="doc-thumbnail-placeholder" style="display:none;">📄</div>
                </div>
                <div th:if="${doc.currentVersion == null or doc.currentVersion.thumbnailStoragePath == null}"
                     class="doc-thumbnail-placeholder">📄</div>
                <div class="card-body p-2">
                    <span th:text="${doc.documentType.name() == 'RESUME' ? '이력서' :
                                     doc.documentType.name() == 'CAREER_DESCRIPTION' ? '경력기술서' :
                                     doc.documentType.name() == 'GRADUATION_CERTIFICATE' ? '졸업증명서' :
                                     doc.documentType.name() == 'LICENSE' ? '자격증' :
                                     doc.documentType.name() == 'EMPLOYMENT_CERTIFICATE' ? '재직증명서' : '기타'}"
                          class="badge bg-secondary mb-1"></span>
                    <h6 class="card-title mb-1 text-truncate" th:text="${doc.title}"></h6>
                    <small class="text-muted d-block text-truncate"
                           th:text="${doc.currentVersion != null ? doc.currentVersion.originalFileName : '-'}"></small>
                    <small class="text-muted"
                           th:text="${doc.currentVersion != null ? 'v' + doc.currentVersion.versionNo : ''}"></small>
                </div>
                <div class="card-footer p-2 d-flex gap-1">
                    <a th:if="${doc.currentVersion != null}"
                       th:href="@{/documents/{id}/preview(id=${doc.currentVersion.id})}"
                       target="_blank" class="btn btn-outline-secondary btn-sm flex-fill">미리보기</a>
                    <a th:if="${doc.currentVersion != null}"
                       th:href="@{/documents/{id}/download(id=${doc.currentVersion.id})}"
                       class="btn btn-outline-secondary btn-sm flex-fill">다운로드</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function applyFilter() {
    const type = document.getElementById('filterType').value;
    const query = document.getElementById('searchBox').value.toLowerCase();
    document.querySelectorAll('.doc-card-col').forEach(col => {
        const label = col.dataset.label || '';
        const title = (col.dataset.title || '').toLowerCase();
        const fname = (col.dataset.filename || '').toLowerCase();
        col.style.display = (!type || label === type) && (!query || title.includes(query) || fname.includes(query)) ? '' : 'none';
    });
}
function applySort() {
    const sort = document.getElementById('sortOrder').value;
    const grid = document.getElementById('cardGrid');
    if (!grid) return;
    const cols = Array.from(grid.querySelectorAll('.doc-card-col'));
    cols.sort((a, b) => {
        if (sort === 'type') return (a.dataset.label || '').localeCompare(b.dataset.label || '');
        if (sort === 'title') return (a.dataset.title || '').localeCompare(b.dataset.title || '');
        return (b.dataset.date || '').localeCompare(a.dataset.date || '');
    });
    cols.forEach(c => grid.appendChild(c));
}
</script>
</body>
</html>
