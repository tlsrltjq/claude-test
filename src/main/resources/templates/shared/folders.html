<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공유 폴더 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">공유 폴더 목록</h2>

    <div th:if="${#lists.isEmpty(folders)}" class="alert alert-info">
        접근 가능한 공유 폴더가 없습니다.
    </div>

    <table th:if="${!#lists.isEmpty(folders)}" class="table table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>폴더명</th>
            <th>소유자</th>
            <th>팀</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="folder : ${folders}">
            <td th:text="${folder.folderName}"></td>
            <td th:text="${folder.owner.name}"></td>
            <td th:text="${folder.owner.team != null ? folder.owner.team.name : '-'}"></td>
            <td>
                <a th:href="@{/shared/folders/{id}/documents(id=${folder.id})}"
                   class="btn btn-outline-primary btn-sm">문서 보기</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
