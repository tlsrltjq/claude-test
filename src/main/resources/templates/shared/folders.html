<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공유 폴더 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: .6rem 0; }
        .topnav .brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.5); color: #fff; font-size: .8rem; padding: .3rem .75rem; border-radius: 6px; }
        .btn-nav:hover { background: rgba(255,255,255,.15); color: #fff; }

        .page-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); border-radius: 14px; padding: 1.4rem 1.75rem; color: #fff; margin-bottom: 1.25rem; }
        .page-header h2 { font-size: 1.2rem; font-weight: 700; margin: 0 0 .2rem; }
        .page-header .sub { font-size: .85rem; opacity: .8; }

        .folder-card { border: 1.5px solid #e9ecef; border-radius: 12px; background: #fff; transition: box-shadow .18s, transform .18s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .folder-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.12); transform: translateY(-2px); color: inherit; }
        .folder-icon { width: 48px; height: 48px; border-radius: 12px; background: #e7f0ff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .folder-icon i { font-size: 1.5rem; color: #0d6efd; }
        .folder-name { font-size: .95rem; font-weight: 600; color: #212529; margin-bottom: .2rem; }
        .folder-meta { font-size: .78rem; color: #868e96; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: #adb5bd; background: #fff; border-radius: 12px; }
        .empty-state i { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
        .empty-state p { font-size: .95rem; margin-bottom: 0; }
    </style>
</head>
<body>

<nav class="topnav">
    <div class="container d-flex align-items-center gap-3">
        <a th:href="@{/dashboard}" class="brand me-auto">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i>eActive Resource Hub
        </a>
        <a th:href="@{/dashboard}" class="btn btn-nav btn-sm">
            <i class="bi bi-house me-1"></i>대시보드
        </a>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-nav btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>로그아웃
            </button>
        </form>
    </div>
</nav>

<div class="container py-4">

    <div class="page-header">
        <h2><i class="bi bi-folder-symlink-fill me-2"></i>공유 폴더</h2>
        <div class="sub">팀원의 문서를 열람·다운로드할 수 있는 공유 공간입니다.</div>
    </div>

    <div th:if="${#lists.isEmpty(folders)}" class="empty-state">
        <i class="bi bi-folder-x"></i>
        <p>접근 가능한 공유 폴더가 없습니다.</p>
    </div>

    <div th:if="${!#lists.isEmpty(folders)}"
         class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3">
        <div th:each="folder : ${folders}" class="col">
            <a th:href="@{/shared/folders/{id}/documents(id=${folder.id})}" class="folder-card p-3 h-100">
                <div class="d-flex align-items-center gap-3">
                    <div class="folder-icon">
                        <i class="bi bi-folder-fill"></i>
                    </div>
                    <div class="min-w-0">
                        <div class="folder-name text-truncate" th:text="${folder.folderName}">폴더명</div>
                        <div class="folder-meta">
                            <i class="bi bi-person me-1"></i>
                            <span th:text="${folder.owner.name}"></span>
                            <span th:if="${folder.owner.team != null}" class="ms-1 text-muted">
                                · <span th:text="${folder.owner.team.name}"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

</div>
</body>
</html>
