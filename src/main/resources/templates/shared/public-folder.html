<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전사 공용 폴더 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .doc-thumbnail { width:100%; height:140px; object-fit:cover; }
        .doc-thumbnail-placeholder { width:100%; height:140px; display:flex; align-items:center; justify-content:center; background:#f5f5f5; color:#aaa; font-size:2.5rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4" style="max-width:1100px;">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h2 class="mb-0">전사 공용 폴더</h2>
            <p class="text-muted small mb-0">전 사원이 열람·업로드할 수 있는 공유 공간입니다.</p>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="collapse" data-bs-target="#uploadPanel">
            + 문서 업로드
        </button>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- 업로드 패널 -->
    <div id="uploadPanel" class="collapse mb-4">
        <div class="card card-body">
            <form th:action="@{/shared/folders/public/documents}" method="post" enctype="multipart/form-data" id="publicUploadForm">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="row g-2">
                    <div class="col-md-3">
                        <select name="documentType" class="form-select form-select-sm" required>
                            <option value="">종류 선택</option>
                            <option th:each="dt : ${documentTypes}"
                                    th:value="${dt.name()}"
                                    th:text="${dt.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="text" name="title" class="form-control form-control-sm"
                               placeholder="문서 제목" required>
                    </div>
                    <div class="col-md-4">
                        <input type="file" name="file" class="form-control form-control-sm" required
                               accept=".pdf,.jpg,.jpeg,.png,.docx,.hwp,.hwpx,.ppt,.pptx">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" id="publicUploadBtn" class="btn btn-primary btn-sm w-100">업로드</button>
                    </div>
                </div>
                <div class="form-text mt-1">허용 형식: PDF, JPG, PNG, DOCX, HWP, HWPX, PPT, PPTX (최대 20MB)</div>
            </form>
        </div>
    </div>

    <!-- 필터 -->
    <div class="row g-2 mb-3">
        <div class="col-auto">
            <select id="filterType" class="form-select form-select-sm" onchange="applyFilter()">
                <option value="">전체 종류</option>
                <option th:each="dt : ${documentTypes}"
                        th:value="${dt.displayName}"
                        th:text="${dt.displayName}"></option>
            </select>
        </div>
        <div class="col-sm-4">
            <input id="searchBox" class="form-control form-control-sm"
                   placeholder="제목 또는 파일명 검색" oninput="applyFilter()">
        </div>
        <div class="col-auto">
            <select id="sortOrder" class="form-select form-select-sm" onchange="applySort()">
                <option value="date">최근 업로드</option>
                <option value="type">종류</option>
                <option value="title">제목</option>
            </select>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(documents)}" class="alert alert-info">업로드된 문서가 없습니다.</div>

    <div id="cardGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3"
         th:if="${!#lists.isEmpty(documents)}">
        <div th:each="doc : ${documents}" class="col doc-card-col"
             th:data-label="${doc.documentType.displayName}"
             th:data-title="${doc.title}"
             th:data-filename="${doc.currentVersion != null ? doc.currentVersion.originalFileName : ''}"
             th:data-date="${doc.currentVersion != null ? doc.currentVersion.createdAt : ''}"
             th:data-uploader="${doc.currentVersion != null ? doc.currentVersion.uploadedBy.id : ''}">
            <div class="card h-100">
                <div th:if="${doc.currentVersion != null and doc.currentVersion.thumbnailStoragePath != null}">
                    <img th:src="@{/documents/{id}/thumbnail(id=${doc.currentVersion.id})}"
                         class="card-img-top doc-thumbnail" alt="썸네일"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="doc-thumbnail-placeholder" style="display:none;">📄</div>
                </div>
                <div th:if="${doc.currentVersion == null or doc.currentVersion.thumbnailStoragePath == null}"
                     class="doc-thumbnail-placeholder">📄</div>
                <div class="card-body p-2">
                    <span th:text="${doc.documentType.displayName}" class="badge bg-secondary mb-1"></span>
                    <h6 class="card-title mb-1 text-truncate" th:text="${doc.title}"></h6>
                    <small class="text-muted d-block text-truncate"
                           th:text="${doc.currentVersion != null ? doc.currentVersion.originalFileName : '-'}"></small>
                    <small class="text-muted"
                           th:if="${doc.currentVersion != null}"
                           th:text="${doc.currentVersion.uploadedBy.name + ' · v' + doc.currentVersion.versionNo}"></small>
                </div>
                <div class="card-footer p-2 d-flex gap-1 flex-wrap">
                    <a th:if="${doc.currentVersion != null}"
                       th:href="@{/documents/{id}/preview(id=${doc.currentVersion.id})}"
                       target="_blank" class="btn btn-outline-secondary btn-sm flex-fill">미리보기</a>
                    <a th:if="${doc.currentVersion != null}"
                       th:href="@{/documents/{id}/download(id=${doc.currentVersion.id})}"
                       class="btn btn-outline-primary btn-sm flex-fill">다운로드</a>
                    <!-- 본인 업로드 또는 관리자만 삭제 버튼 표시 -->
                    <div th:if="${doc.currentVersion != null and
                                 (isAdmin or doc.currentVersion.uploadedBy.id == currentUserId)}"
                         class="w-100">
                        <form th:action="@{/shared/folders/public/documents/{id}/delete(id=${doc.id})}"
                              method="post"
                              onsubmit="return confirm('문서를 삭제하시겠습니까?')">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-outline-danger btn-sm w-100">삭제</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function applyFilter() {
    const type = document.getElementById('filterType').value;
    const query = document.getElementById('searchBox').value.toLowerCase();
    document.querySelectorAll('.doc-card-col').forEach(col => {
        const label = col.dataset.label || '';
        const title = (col.dataset.title || '').toLowerCase();
        const fname = (col.dataset.filename || '').toLowerCase();
        col.style.display = (!type || label === type) && (!query || title.includes(query) || fname.includes(query)) ? '' : 'none';
    });
}
function applySort() {
    const sort = document.getElementById('sortOrder').value;
    const grid = document.getElementById('cardGrid');
    if (!grid) return;
    const cols = Array.from(grid.querySelectorAll('.doc-card-col'));
    cols.sort((a, b) => {
        if (sort === 'type') return (a.dataset.label || '').localeCompare(b.dataset.label || '');
        if (sort === 'title') return (a.dataset.title || '').localeCompare(b.dataset.title || '');
        return (b.dataset.date || '').localeCompare(a.dataset.date || '');
    });
    cols.forEach(c => grid.appendChild(c));
}
(function() {
    var form = document.getElementById('publicUploadForm');
    if (form) {
        form.addEventListener('submit', function() {
            var btn = document.getElementById('publicUploadBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>업로드 중...';
        });
    }
})();
</script>
</body>
</html>
