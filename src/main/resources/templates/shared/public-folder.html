<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전사 공용 폴더 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">

  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main class="main-content">
    <div class="page-wrap">

      <!-- 알림 -->
      <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
          <i class="bi bi-check-circle-fill"></i><span th:text="${successMessage}"></span>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
          <i class="bi bi-exclamation-triangle-fill"></i><span th:text="${errorMessage}"></span>
      </div>

      <!-- 페이지 헤더 -->
      <div class="page-hd">
        <div>
          <h1 class="page-hd-title"><i class="bi bi-building me-2"></i>전사 공용 폴더</h1>
          <p class="page-hd-sub">전 사원이 열람·업로드할 수 있는 공유 공간입니다.
              <span class="ms-1">문서 <strong th:text="${documents != null ? #lists.size(documents) : 0}">0</strong>개</span>
          </p>
        </div>
        <div class="page-hd-actions">
          <button class="btn btn-sm btn-primary" type="button"
                  data-bs-toggle="collapse" data-bs-target="#uploadPanel">
              <i class="bi bi-plus-lg me-1"></i>문서 업로드
          </button>
        </div>
      </div>

      <!-- 업로드 패널 (collapse) -->
      <div class="collapse mb-3" id="uploadPanel">
          <div class="upload-panel">
              <div class="upload-panel-header">
                  <i class="bi bi-cloud-upload text-primary"></i>새 문서 업로드
              </div>
              <div class="upload-panel-body">
                  <form th:action="@{/shared/folders/public/documents}" method="post"
                        enctype="multipart/form-data" id="publicUploadForm">
                      <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                      <div class="row g-3">
                          <div class="col-md-4">
                              <label class="form-label fw-semibold" style="font-size:.85rem">문서 종류 <span class="text-danger">*</span></label>
                              <select name="documentType" class="form-select form-select-sm" required>
                                  <option value="">선택하세요</option>
                                  <option th:each="dt : ${documentTypes}"
                                          th:value="${dt.name()}"
                                          th:text="${dt.displayName}"></option>
                              </select>
                          </div>
                          <div class="col-md-8">
                              <label class="form-label fw-semibold" style="font-size:.85rem">문서 제목 <span class="text-danger">*</span></label>
                              <input type="text" name="title" class="form-control form-control-sm"
                                     placeholder="예: 2024년 회사 소개서" required>
                          </div>
                          <div class="col-12">
                              <label class="form-label fw-semibold" style="font-size:.85rem">파일 <span class="text-danger">*</span></label>
                              <div class="file-drop" id="publicFileDrop"
                                   onclick="document.getElementById('publicFileInput').click()">
                                  <div class="drop-icon"><i class="bi bi-cloud-arrow-up"></i></div>
                                  <div class="drop-text">클릭하거나 파일을 끌어다 놓으세요</div>
                                  <div class="drop-sub">PDF, JPG, PNG, DOCX, HWP, HWPX, PPT, PPTX · 최대 20MB</div>
                              </div>
                              <input type="file" id="publicFileInput" name="file" class="d-none" required
                                     accept=".pdf,.jpg,.jpeg,.png,.docx,.hwp,.hwpx,.ppt,.pptx"
                                     onchange="onPublicFileChange(this)">
                              <div class="file-name-display" id="publicFileNameDisplay">
                                  <i class="bi bi-file-earmark-fill text-primary"></i>
                                  <span id="publicFileNameText"></span>
                                  <span id="publicFileSizeText" class="text-muted ms-auto"></span>
                              </div>
                          </div>
                      </div>
                      <div id="publicProgressWrap" class="d-none mt-2">
                          <div class="d-flex justify-content-between align-items-center mb-1">
                              <small class="text-muted">업로드 중...</small>
                              <small id="publicProgressText" class="fw-bold text-primary">0%</small>
                          </div>
                          <div class="progress" style="height:6px;">
                              <div id="publicProgressBar"
                                   class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                                   role="progressbar" style="width:0%"></div>
                          </div>
                      </div>
                      <div id="publicXhrErrorBox" class="alert alert-danger d-none mt-2" style="font-size:.85rem">
                          <i class="bi bi-exclamation-triangle-fill me-1"></i>
                          <span id="publicXhrErrorMsg"></span>
                      </div>
                      <div class="d-flex gap-2 mt-3">
                          <button type="submit" id="publicUploadBtn" class="btn btn-primary btn-sm fw-semibold px-4">
                              <i class="bi bi-cloud-upload me-1"></i>업로드
                          </button>
                          <button type="button" class="btn btn-outline-secondary btn-sm"
                                  data-bs-toggle="collapse" data-bs-target="#uploadPanel">취소</button>
                      </div>
                  </form>
              </div>
          </div>
      </div>

      <!-- 필터/검색 바 -->
      <div class="filter-bar">
          <i class="bi bi-funnel text-muted" style="flex-shrink:0"></i>

          <select id="filterType" class="form-select form-select-sm" style="width:auto;min-width:120px"
                  onchange="applyFilter()">
              <option value="">전체 종류</option>
              <option th:each="dt : ${documentTypes}"
                      th:value="${dt.displayName}"
                      th:text="${dt.displayName}"></option>
          </select>

          <div class="input-group input-group-sm" style="width:220px;flex-shrink:0">
              <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
              <input id="searchBox" class="form-control border-start-0" placeholder="제목 또는 파일명" oninput="applyFilter()">
          </div>

          <select id="sortOrder" class="form-select form-select-sm" style="width:auto;min-width:110px"
                  onchange="applySort()">
              <option value="date">최근 업로드</option>
              <option value="type">종류</option>
              <option value="title">제목</option>
          </select>

          <!-- 뷰 토글 -->
          <div class="ms-auto view-toggle btn-group btn-group-sm" role="group">
              <button id="btnCard" type="button" class="btn btn-outline-secondary active"
                      onclick="setView('card')" title="카드 보기">
                  <i class="bi bi-grid-3x3-gap"></i>
              </button>
              <button id="btnList" type="button" class="btn btn-outline-secondary"
                      onclick="setView('list')" title="목록 보기">
                  <i class="bi bi-list-ul"></i>
              </button>
          </div>
      </div>

      <!-- 빈 상태 -->
      <div th:if="${#lists.isEmpty(documents)}" class="empty-state">
          <i class="bi bi-folder2-open"></i>
          <p>아직 업로드된 문서가 없습니다.</p>
      </div>

      <th:block th:if="${!#lists.isEmpty(documents)}">

      <!-- ── 카드 뷰 ─────────────────────────────────────────── -->
      <div id="cardGrid"
           class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3">

          <div th:each="doc : ${documents}" class="col doc-card-col"
               th:data-label="${doc.documentType.displayName}"
               th:data-title="${doc.title}"
               th:data-filename="${doc.currentVersion != null ? doc.currentVersion.originalFileName : ''}"
               th:data-date="${doc.currentVersion != null ? doc.currentVersion.createdAt : ''}"
               th:data-uploader="${doc.currentVersion != null ? doc.currentVersion.uploadedBy.id : ''}">

              <div class="doc-card h-100"
                   th:with="lv=${doc.currentVersion},
                             ext=${doc.currentVersion != null ? doc.currentVersion.originalFileName.substring(doc.currentVersion.originalFileName.lastIndexOf('.')+1).toLowerCase() : 'etc'}">

                  <!-- 썸네일 / 파일 아이콘 -->
                  <a th:if="${lv != null}"
                     th:href="@{/documents/{id}/preview(id=${lv.id})}"
                     target="_blank" class="text-decoration-none d-block">
                      <img th:if="${lv.thumbnailStoragePath != null}"
                           th:src="@{/documents/{id}/thumbnail(id=${lv.id})}"
                           class="doc-thumb" alt="미리보기"
                           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                      <div th:classappend="${lv.thumbnailStoragePath != null} ? 'd-none'" class="doc-icon-area">
                          <div th:class="'doc-ext ' + (${ext == 'pdf'} ? 'ext-pdf' : (${ext == 'jpg' or ext == 'jpeg' or ext == 'png'} ? 'ext-img' : (${ext == 'docx'} ? 'ext-word' : (${ext == 'hwp' or ext == 'hwpx'} ? 'ext-hwp' : 'ext-etc'))))"
                               th:text="${ext.toUpperCase()}"></div>
                      </div>
                  </a>
                  <div th:if="${lv == null}" class="doc-icon-area">
                      <div class="doc-ext ext-etc">?</div>
                  </div>

                  <div class="doc-body">
                      <span class="badge bg-secondary" style="font-size:.7rem;padding:.15rem .45rem;border-radius:4px"
                            th:text="${doc.documentType.displayName}"></span>
                      <div class="doc-title" th:text="${doc.title}">제목</div>
                      <div class="doc-meta" th:if="${lv != null}" th:text="${lv.uploadedBy.name}">업로더</div>
                      <div class="doc-meta">
                          <span th:if="${lv != null}" th:text="'v' + ${lv.versionNo}"></span>
                          <span th:if="${lv != null}" class="ms-1" th:text="${#temporals.format(lv.createdAt, 'yy.MM.dd')}"></span>
                      </div>
                  </div>

                  <div class="doc-footer">
                      <a th:if="${lv != null}"
                         th:href="@{/documents/{id}/preview(id=${lv.id})}"
                         target="_blank"
                         class="btn btn-outline-secondary flex-fill">
                          <i class="bi bi-eye"></i>
                      </a>
                      <a th:if="${lv != null}"
                         th:href="@{/documents/{id}/download(id=${lv.id})}"
                         class="btn btn-outline-primary flex-fill">
                          <i class="bi bi-download"></i>
                      </a>
                      <form th:if="${lv != null and (isAdmin or lv.uploadedBy.id == currentUserId)}"
                            th:action="@{/shared/folders/public/documents/{id}/delete(id=${doc.id})}"
                            method="post" class="flex-fill"
                            onsubmit="return confirm('문서를 삭제하시겠습니까?')">
                          <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                          <button type="submit" class="btn btn-outline-danger w-100">
                              <i class="bi bi-trash"></i>
                          </button>
                      </form>
                  </div>
              </div>
          </div>
      </div>

      <!-- ── 리스트 뷰 ──────────────────────────────────────── -->
      <div id="listView" style="display:none">
          <table class="table table-hover align-middle mb-0"
                 style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
              <thead>
                  <tr>
                      <th style="width:38px"></th>
                      <th style="width:130px">종류</th>
                      <th>제목</th>
                      <th style="width:130px">업로더</th>
                      <th style="width:180px">파일명</th>
                      <th style="width:60px">버전</th>
                      <th style="width:90px">업로드</th>
                      <th style="width:100px"></th>
                  </tr>
              </thead>
              <tbody>
                  <tr th:each="doc : ${documents}" class="doc-list-row"
                      th:with="lv=${doc.currentVersion},
                               ext=${doc.currentVersion != null ? doc.currentVersion.originalFileName.substring(doc.currentVersion.originalFileName.lastIndexOf('.')+1).toLowerCase() : 'etc'}"
                      th:data-label="${doc.documentType.displayName}"
                      th:data-title="${doc.title}"
                      th:data-filename="${doc.currentVersion != null ? doc.currentVersion.originalFileName : ''}"
                      th:data-date="${doc.currentVersion != null ? doc.currentVersion.createdAt : ''}"
                      th:data-uploader="${doc.currentVersion != null ? doc.currentVersion.uploadedBy.id : ''}">

                      <!-- 파일 아이콘 -->
                      <td>
                          <span th:class="'doc-list-icon ' + (${ext == 'pdf'} ? 'ext-pdf' : (${ext == 'jpg' or ext == 'jpeg' or ext == 'png'} ? 'ext-img' : (${ext == 'docx'} ? 'ext-word' : (${ext == 'hwp' or ext == 'hwpx'} ? 'ext-hwp' : 'ext-etc'))))"
                                th:text="${ext.toUpperCase()}"></span>
                      </td>

                      <!-- 종류 -->
                      <td>
                          <span class="badge bg-secondary doc-type-badge" th:text="${doc.documentType.displayName}"></span>
                      </td>

                      <!-- 제목 -->
                      <td class="fw-semibold" style="color:var(--tx1)" th:text="${doc.title}"></td>

                      <!-- 업로더 -->
                      <td class="text-muted" style="font-size:.82rem"
                          th:text="${lv != null ? lv.uploadedBy.name : '-'}"></td>

                      <!-- 파일명 -->
                      <td class="text-muted" style="font-size:.8rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                          th:text="${lv != null ? lv.originalFileName : '-'}"></td>

                      <!-- 버전 -->
                      <td class="text-muted" style="font-size:.8rem"
                          th:text="${lv != null ? 'v' + lv.versionNo : '-'}"></td>

                      <!-- 업로드일 -->
                      <td class="text-muted" style="font-size:.8rem"
                          th:text="${lv != null ? #temporals.format(lv.createdAt, 'yy.MM.dd') : '-'}"></td>

                      <!-- 액션 -->
                      <td>
                          <div class="d-flex gap-1">
                              <a th:if="${lv != null}"
                                 th:href="@{/documents/{id}/preview(id=${lv.id})}"
                                 target="_blank"
                                 class="btn btn-outline-secondary btn-sm" title="미리보기">
                                  <i class="bi bi-eye"></i>
                              </a>
                              <a th:if="${lv != null}"
                                 th:href="@{/documents/{id}/download(id=${lv.id})}"
                                 class="btn btn-outline-primary btn-sm" title="다운로드">
                                  <i class="bi bi-download"></i>
                              </a>
                              <form th:if="${lv != null and (isAdmin or lv.uploadedBy.id == currentUserId)}"
                                    th:action="@{/shared/folders/public/documents/{id}/delete(id=${doc.id})}"
                                    method="post"
                                    onsubmit="return confirm('문서를 삭제하시겠습니까?')">
                                  <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                                  <button type="submit" class="btn btn-outline-danger btn-sm" title="삭제">
                                      <i class="bi bi-trash"></i>
                                  </button>
                              </form>
                          </div>
                      </td>
                  </tr>
              </tbody>
          </table>
      </div>

      </th:block>

    </div><!-- /.page-wrap -->
  </main>

</div><!-- /.app-shell -->

<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div class="spinner-border text-light" style="width:3.5rem;height:3.5rem;" role="status">
    <span class="visually-hidden">처리 중...</span>
  </div>
</div>
<script>
(function(){
    document.querySelectorAll('form').forEach(function(f){
        if(f.id === 'publicUploadForm') return;
        if((f.getAttribute('method')||'get').toLowerCase()!=='get'){
            f.addEventListener('submit',function(){
                document.getElementById('loadingOverlay').style.display='flex';
            });
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
var currentView = localStorage.getItem('publicFolderView') || 'card';

function setView(mode) {
    currentView = mode;
    localStorage.setItem('publicFolderView', mode);
    document.getElementById('cardGrid').style.display = mode === 'card' ? '' : 'none';
    document.getElementById('listView').style.display = mode === 'list' ? '' : 'none';
    document.getElementById('btnCard').classList.toggle('active', mode === 'card');
    document.getElementById('btnList').classList.toggle('active', mode === 'list');
}

function applyFilter() {
    var type  = document.getElementById('filterType').value;
    var query = document.getElementById('searchBox').value.toLowerCase();
    document.querySelectorAll('.doc-card-col, .doc-list-row').forEach(function(row) {
        var label = row.dataset.label || '';
        var title = (row.dataset.title    || '').toLowerCase();
        var fname = (row.dataset.filename || '').toLowerCase();
        row.style.display = (!type || label === type) && (!query || title.includes(query) || fname.includes(query)) ? '' : 'none';
    });
}

function applySort() {
    var sort = document.getElementById('sortOrder').value;

    function sortItems(parent, selector) {
        var items = Array.from(parent.querySelectorAll(selector));
        items.sort(function(a, b) {
            if (sort === 'type')  return (a.dataset.label || '').localeCompare(b.dataset.label || '', 'ko');
            if (sort === 'title') return (a.dataset.title || '').localeCompare(b.dataset.title || '', 'ko');
            return (b.dataset.date || '').localeCompare(a.dataset.date || '');
        });
        items.forEach(function(el) { parent.appendChild(el); });
    }

    var grid = document.getElementById('cardGrid');
    if (grid) sortItems(grid, '.doc-card-col');

    var tbody = document.querySelector('#listView tbody');
    if (tbody) sortItems(tbody, '.doc-list-row');
}

function onPublicFileChange(input) {
    var disp   = document.getElementById('publicFileNameDisplay');
    var nameEl = document.getElementById('publicFileNameText');
    var sizeEl = document.getElementById('publicFileSizeText');
    if (input.files && input.files[0]) {
        var f = input.files[0];
        nameEl.textContent = f.name;
        sizeEl.textContent = (f.size / 1024 / 1024).toFixed(1) + ' MB';
        disp.style.display = 'flex';
        document.getElementById('publicFileDrop').style.borderColor = '#0d6efd';
    }
}

var drop = document.getElementById('publicFileDrop');
if (drop) {
    drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.classList.add('drag-over'); });
    drop.addEventListener('dragleave', function() { drop.classList.remove('drag-over'); });
    drop.addEventListener('drop', function(e) {
        e.preventDefault(); drop.classList.remove('drag-over');
        var fi = document.getElementById('publicFileInput');
        fi.files = e.dataTransfer.files;
        onPublicFileChange(fi);
    });
}

var ALLOWED_EXTS_PUB = ['pdf','jpg','jpeg','png','docx','hwp','hwpx','ppt','pptx'];
var MAX_SIZE_PUB = 20 * 1024 * 1024;

var form = document.getElementById('publicUploadForm');
if (form) {
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var fileInput = document.getElementById('publicFileInput');
        var file = fileInput.files && fileInput.files[0];

        document.getElementById('publicXhrErrorBox').classList.add('d-none');
        if (!file) { showPubError('파일을 선택해주세요.'); return; }
        var ext = file.name.split('.').pop().toLowerCase();
        if (!ALLOWED_EXTS_PUB.includes(ext)) { showPubError('허용되지 않는 파일 형식입니다: ' + ext); return; }
        if (file.size > MAX_SIZE_PUB) { showPubError('파일 크기가 20MB를 초과합니다.'); return; }

        var btn = document.getElementById('publicUploadBtn');
        var progressWrap = document.getElementById('publicProgressWrap');
        var progressBar = document.getElementById('publicProgressBar');
        var progressText = document.getElementById('publicProgressText');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>업로드 중...';
        progressWrap.classList.remove('d-none');

        var xhr = new XMLHttpRequest();

        xhr.upload.onprogress = function(ev) {
            if (!ev.lengthComputable) return;
            var pct = Math.round(ev.loaded / ev.total * 100);
            progressBar.style.width = pct + '%';
            progressText.textContent = pct < 100 ? pct + '%' : '서버 처리 중...';
            if (pct === 100) progressBar.classList.remove('progress-bar-animated');
        };

        xhr.onload = function() {
            window.location.href = xhr.responseURL || '/shared/folders/public';
        };

        xhr.onerror = function() {
            showPubError('네트워크 오류가 발생했습니다. 다시 시도하세요.');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-cloud-upload me-1"></i>업로드';
            progressWrap.classList.add('d-none');
        };

        xhr.open('POST', form.action);
        xhr.send(new FormData(form));
    });
}

function showPubError(msg) {
    var box = document.getElementById('publicXhrErrorBox');
    document.getElementById('publicXhrErrorMsg').textContent = msg;
    box.classList.remove('d-none');
}

// 페이지 로드 시 저장된 뷰 모드 적용
(function() {
    var cardGrid = document.getElementById('cardGrid');
    var listView = document.getElementById('listView');
    if (!cardGrid || !listView) return;
    setView(currentView);
})();
</script>
</body>
</html>
