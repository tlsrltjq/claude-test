<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀원 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">대시보드</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">팀원 목록</h2>

    <div th:if="${#lists.isEmpty(members)}" class="alert alert-info">팀원이 없습니다.</div>

    <table th:if="${!#lists.isEmpty(members)}" class="table table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>이름</th>
            <th>이메일</th>
            <th>팀</th>
            <th>직책</th>
            <th>역할</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="member : ${members}">
            <td th:text="${member.name}"></td>
            <td th:text="${member.email}"></td>
            <td th:text="${member.team != null ? member.team.name : '-'}"></td>
            <td th:text="${member.position != null ? member.position : '-'}"></td>
            <td th:text="${member.role}"></td>
            <td>
                <a th:href="@{/team/members/{id}/documents(id=${member.id})}"
                   class="btn btn-outline-primary btn-sm">문서 보기</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
