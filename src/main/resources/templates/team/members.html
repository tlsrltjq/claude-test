<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀원 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topnav { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); padding: .6rem 1rem; }
        .topnav .navbar-brand { font-weight: 700; font-size: 1.05rem; color: #fff; text-decoration: none; }
        .btn-nav { border-color: rgba(255,255,255,.35); color: #fff; font-size: .8rem; }
        .btn-nav:hover { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.6); color: #fff; }
        .page-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); border-radius: 14px; padding: 1.4rem 1.75rem; color: #fff; margin-bottom: 1.5rem; }
        .page-header h4 { font-weight: 700; margin-bottom: .2rem; }
        .page-header p { margin: 0; opacity: .75; font-size: .9rem; }
        .table-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); overflow: hidden; }
        .table thead th { background: #0d6efd; color: #fff; font-size: .76rem; font-weight: 600; letter-spacing: .4px; border: none; padding: .65rem .8rem; }
        .table tbody td { font-size: .83rem; vertical-align: middle; border-color: #f0f2f5; padding: .55rem .8rem; }
        .table tbody tr:hover { background: #f5f7fa; }
        .avatar-circle { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #0d6efd, #0a58ca); color: #fff; font-size: .75rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .empty-state { text-align: center; padding: 3rem 1rem; color: #9ca3af; }
        .empty-state .bi { font-size: 2.5rem; display: block; margin-bottom: .75rem; opacity: .4; }
    </style>
</head>
<body>
<nav class="topnav navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i>eActive Resource Hub
        </a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-nav btn-sm">
                <i class="bi bi-house me-1"></i>대시보드
            </a>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-nav btn-sm"><i class="bi bi-box-arrow-right me-1"></i>로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="page-header">
        <h4><i class="bi bi-people-fill me-2"></i>팀원 목록</h4>
        <p>같은 팀 구성원의 문서를 확인합니다.</p>
    </div>

    <div th:if="${#lists.isEmpty(members)}" class="table-card">
        <div class="empty-state">
            <i class="bi bi-people"></i>
            <p>팀원이 없습니다.</p>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(members)}" class="table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>이름</th>
                    <th>이메일</th>
                    <th>팀</th>
                    <th>직급</th>
                    <th>역할</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="member : ${members}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <span class="avatar-circle" th:text="${#strings.substring(member.name, 0, 1)}">홍</span>
                            <span class="fw-semibold" th:text="${member.name}"></span>
                        </div>
                    </td>
                    <td class="text-muted small" th:text="${member.email}"></td>
                    <td th:text="${member.team != null ? member.team.name : '-'}"></td>
                    <td th:text="${member.position != null ? member.position.displayName : '-'}"></td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${member.role.name() == 'ADMIN'} ? 'bg-danger' : (${member.role.name() == 'SALES'} ? 'bg-primary' : 'bg-secondary')"
                              th:text="${member.role.displayName}"></span>
                    </td>
                    <td>
                        <a th:href="@{/team/members/{id}/documents(id=${member.id})}"
                           class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-folder2-open me-1"></i>문서 보기
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
