<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀원 문서 목록 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/team/members}" class="btn btn-outline-light btn-sm">← 팀원 목록</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-1">문서 목록</h2>
    <p class="text-muted mb-4" th:text="${member.name + ' (' + member.email + ')'}"></p>

    <div th:if="${documents == null or #lists.isEmpty(documents)}" class="alert alert-info">
        업로드된 문서가 없습니다.
    </div>

    <table th:if="${documents != null and not #lists.isEmpty(documents)}"
           class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>문서 종류</th>
            <th>제목</th>
            <th>원본 파일명</th>
            <th>버전</th>
            <th>업로드일</th>
            <th>미리보기</th>
            <th>다운로드</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="doc : ${documents}">
            <td>
                <span th:switch="${doc.documentType.name()}">
                    <span th:case="'RESUME'">이력서</span>
                    <span th:case="'CAREER_DESCRIPTION'">경력기술서</span>
                    <span th:case="'GRADUATION_CERTIFICATE'">졸업증명서</span>
                    <span th:case="'LICENSE'">자격증</span>
                    <span th:case="'EMPLOYMENT_CERTIFICATE'">재직증명서</span>
                    <span th:case="*">기타</span>
                </span>
            </td>
            <td th:text="${doc.title}"></td>
            <td th:text="${doc.currentVersion != null ? doc.currentVersion.originalFileName : '-'}"></td>
            <td th:text="${doc.currentVersion != null ? 'v' + doc.currentVersion.versionNo : '-'}"></td>
            <td th:text="${doc.currentVersion != null ? #temporals.format(doc.currentVersion.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
            <td>
                <a th:if="${doc.currentVersion != null}"
                   th:href="@{/documents/{id}/preview(id=${doc.currentVersion.id})}"
                   target="_blank" class="btn btn-outline-secondary btn-sm">미리보기</a>
                <span th:if="${doc.currentVersion == null}" class="text-muted">-</span>
            </td>
            <td>
                <a th:if="${doc.currentVersion != null}"
                   th:href="@{/documents/{id}/download/reason(id=${doc.currentVersion.id})}"
                   class="btn btn-outline-secondary btn-sm">다운로드</a>
                <span th:if="${doc.currentVersion == null}" class="text-muted">-</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
