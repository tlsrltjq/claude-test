<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 — eActive Resource Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">eActive Resource Hub</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white small" th:text="${user.name}"></span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h5 mb-3">내 정보</h2>
            <table class="table table-sm mb-0">
                <tbody>
                <tr>
                    <th class="text-muted fw-normal" style="width:120px;">이름</th>
                    <td th:text="${user.name}"></td>
                </tr>
                <tr>
                    <th class="text-muted fw-normal">이메일</th>
                    <td th:text="${user.email}"></td>
                </tr>
                <tr>
                    <th class="text-muted fw-normal">권한</th>
                    <td>
                        <span th:switch="${user.role.name()}">
                            <span th:case="'ADMIN'" class="badge bg-danger">관리자</span>
                            <span th:case="'SALES'" class="badge bg-primary">영업부</span>
                            <span th:case="*" class="badge bg-secondary">일반 직원</span>
                        </span>
                    </td>
                </tr>
                <tr>
                    <th class="text-muted fw-normal">계정 상태</th>
                    <td>
                        <span th:switch="${user.status.name()}">
                            <span th:case="'ACTIVE'" class="badge bg-success">활성</span>
                            <span th:case="'PENDING_ADMIN_APPROVAL'" class="badge bg-warning text-dark">승인 대기</span>
                            <span th:case="'PENDING_EMAIL_VERIFICATION'" class="badge bg-info text-dark">이메일 인증 대기</span>
                            <span th:case="*" class="badge bg-secondary" th:text="${user.status}"></span>
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex flex-wrap gap-2">
        <a th:href="@{/my/folder}" class="btn btn-primary">내 폴더</a>
        <a th:href="@{/search}" class="btn btn-outline-primary">문서 검색</a>
        <a th:href="@{/my/activity}" class="btn btn-outline-secondary">내 다운로드 이력</a>
        <a th:if="${user.role.name() == 'SALES' or user.role.name() == 'ADMIN'}"
           th:href="@{/sales/members}" class="btn btn-primary">전사 인력 조회</a>
        <a th:if="${user.role.name() == 'SALES' or user.role.name() == 'ADMIN'}"
           th:href="@{/sales/profiles}" class="btn btn-outline-primary">인력 표</a>
        <a th:if="${user.role.name() == 'SALES' or user.role.name() == 'ADMIN'}"
           th:href="@{/sales/career-calculator}" class="btn btn-outline-secondary">경력 계산기</a>
        <a th:href="@{/shared/folders}" class="btn btn-info text-dark">공유 폴더</a>
        <a th:if="${user.role.name() == 'ADMIN'}" th:href="@{/admin}" class="btn btn-danger">관리자 패널</a>
        <a th:if="${user.role.name() == 'ADMIN'}" th:href="@{/admin/statistics}" class="btn btn-outline-success">통계</a>
    </div>
</div>

</body>
</html>
