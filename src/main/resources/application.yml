spring:
  application:
    name: eactive-resource-hub

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resourcehub}
    username: ${SPRING_DATASOURCE_USERNAME:resourcehub}
    password: ${SPRING_DATASOURCE_PASSWORD:resourcehub}
    driver-class-name: org.postgresql.Driver

  jpa:
    # 1단계에서는 엔티티/스키마가 없으므로 검증/생성 모두 비활성.
    # 2단계에서 Flyway가 V1 적용 후 'validate'로 올린다.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

server:
  port: 8080

# 애플리케이션 고유 설정
resourcehub:
  upload:
    # 로컬 기본값: ./storage/uploads
    # 운영에서는 환경변수 RESOURCEHUB_UPLOAD_BASE_DIR로 덮어쓴다.
    base-dir: ${RESOURCEHUB_UPLOAD_BASE_DIR:./storage/uploads}

logging:
  level:
    com.eactive.resourcehub: INFO
    org.flywaydb: INFO
