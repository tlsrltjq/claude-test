spring:
  application:
    name: eactive-resource-hub

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resourcehub}
    username: ${SPRING_DATASOURCE_USERNAME:resourcehub}
    password: ${SPRING_DATASOURCE_PASSWORD:resourcehub}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        name: RESOURCEHUB_SESSION
        http-only: true
        same-site: strict
        secure: false   # 운영 전환 시 true로 변경

# 애플리케이션 고유 설정
resourcehub:
  upload:
    base-dir: ${RESOURCEHUB_UPLOAD_BASE_DIR:./storage/uploads}
  company-email-domain: ${RESOURCEHUB_COMPANY_EMAIL_DOMAIN:eactive.co.kr}
  admin:
    email: ${RESOURCEHUB_ADMIN_EMAIL:admin@eactive.co.kr}
    password: ${RESOURCEHUB_ADMIN_PASSWORD:Admin1234!}

logging:
  level:
    com.eactive.resourcehub: INFO
    org.flywaydb: INFO
