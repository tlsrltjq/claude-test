services:
  postgres:
    image: postgres:18
    container_name: resourcehub-postgres
    restart: always
    environment:
      POSTGRES_DB: resourcehub
      POSTGRES_USER: resourcehub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - resourcehub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resourcehub -d resourcehub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  app:
    build: .
    image: eactive-resource-hub:latest
    container_name: resourcehub-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/resourcehub
      SPRING_DATASOURCE_USERNAME: resourcehub
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      RESOURCEHUB_UPLOAD_BASE_DIR: /data/uploads
      RESOURCEHUB_COMPANY_EMAIL_DOMAIN: ${RESOURCEHUB_COMPANY_EMAIL_DOMAIN}
      RESOURCEHUB_ADMIN_EMAIL: ${RESOURCEHUB_ADMIN_EMAIL}
      RESOURCEHUB_ADMIN_PASSWORD: ${RESOURCEHUB_ADMIN_PASSWORD}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
    volumes:
      - resourcehub_uploads:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: resourcehub-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - backend

volumes:
  resourcehub_postgres_data:
  resourcehub_uploads:
  caddy_data:
  caddy_config:

networks:
  backend:
    driver: bridge
