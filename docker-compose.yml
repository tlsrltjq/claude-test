services:
  postgres:
    image: postgres:18
    container_name: resourcehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resourcehub
      POSTGRES_USER: resourcehub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - resourcehub_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resourcehub -d resourcehub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    image: eactive-resource-hub:latest
    container_name: resourcehub-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/resourcehub
      SPRING_DATASOURCE_USERNAME: resourcehub
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      RESOURCEHUB_UPLOAD_BASE_DIR: /data/uploads
      RESOURCEHUB_COMPANY_EMAIL_DOMAIN: ${RESOURCEHUB_COMPANY_EMAIL_DOMAIN:-eactive.co.kr}
      RESOURCEHUB_ADMIN_EMAIL: ${RESOURCEHUB_ADMIN_EMAIL:-admin@eactive.co.kr}
      RESOURCEHUB_ADMIN_PASSWORD: ${RESOURCEHUB_ADMIN_PASSWORD}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-true}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - resourcehub_uploads:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

volumes:
  resourcehub_postgres_data:
  resourcehub_uploads:
